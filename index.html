        const sg=diff>0?'+':diff<0?'−':'';
        return `<div style="padding:10px 0;border-bottom:1px solid var(--ivory-dark);">
          <div style="display:flex;justify-content:space-between;align-items:center;">

          </div>
          <button class="lnk-btn" data-sh="${s.id}" style="margin-top:6px;background:none;border:none;color:var(--forest);font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;padding:0;">📄 ${t('shiftReport')}</button>
        </div>`;
      }).join('');
      html+=`</div>`;
      $('content').innerHTML=html;

      // binding
      if(!myShift){
        $('sh-open-btn').onclick=async()=>{
          const oc=parseFloat($('sh-open-cash').value)||0;
          const b=$('sh-open-btn'); b.disabled=true; b.textContent='...';
          try{
            const data={branchId:currentBranchId,userId:user.uid,userName:profile.name||user.email,openAt:Date.now(),closeAt:null,openCash:oc,closeCash:null,pauses:[],status:'open',createdAt:Date.now()};
            await addDoc(collection(db,'shifts'),data);
            toast(t('shiftOpened')); renderShift();
          }catch(e){ console.error(e); toast(t('errorGen'),true); b.disabled=false; b.textContent='🕐 '+t('openShift'); }
        };
      } else {
        $('sh-pause-btn').onclick=async()=>{
          const ps=myShift.pauses?[...myShift.pauses]:[];
          if(isOnPause(myShift)) ps[ps.length-1].end=Date.now(); else ps.push({start:Date.now(),end:null});
          try{ await updateDoc(doc(db,'shifts',myShift.id),{pauses:ps}); myShift.pauses=ps; renderShift(); }
          catch(e){ console.error(e); toast(t('errorGen'),true); }
        };
        $('sh-close-btn').onclick=async()=>{
          if(!confirm(t('confirmCloseShift'))) return;
          const cc=parseFloat($('sh-close-cash').value)||0;
          const b=$('sh-close-btn'); b.disabled=true; b.textContent='...';
          try{
            const ps=myShift.pauses?[...myShift.pauses]:[];
            if(isOnPause(myShift)) ps[ps.length-1].end=Date.now(); // chiudi pausa aperta
            const closeAt=Date.now();
            const shTmp={...myShift,pauses:ps,closeAt};
            const salesTotal=await shiftSalesTotal(shTmp);
            const workedMs=workedMsOf(shTmp,closeAt);
            const pausedMs=pausedMsOf(shTmp,closeAt);
            const expectedCash=(myShift.openCash||0)+salesTotal;
            const diff=cc-expectedCash;
            await updateDoc(doc(db,'shifts',myShift.id),{pauses:ps,closeAt,closeCash:cc,status:'closed',salesTotal,workedMs,pausedMs,expectedCash,diff});
            toast(t('shiftClosed'));
            const full={...shTmp,closeCash:cc,status:'closed',salesTotal,workedMs,pausedMs,expectedCash,diff};
            myShift=null;
            showShiftReport(full);

        };

      document.querySelectorAll('.lnk-btn[data-sh]').forEach(btn=>btn.onclick=()=>{ const s=shifts.find(x=>x.id===btn.dataset.sh); if(s) showShiftReport(s); });

    function bindReceive(){
      const sel=$('rc-prod'), qEl=$('rc-qty'), cEl=$('rc-cost');
      const refresh=()=>{
        const p=products.find(x=>x.id===sel.value);
        if(!p){ $('rc-cur').textContent=''; $('rc-after').textContent=''; return; }
        const inv=inventory[p.id]||{qty:0,lastCost:0};
        $('rc-cur').innerHTML=`${t('currentQty')}: <span class="num" style="font-weight:700;">${inv.qty||0}</span> · ${t('cost')}: <span class="num">${fmt(inv.lastCost||0)}</span> ${t('currency')}`;
        if(!cEl.value && inv.lastCost) cEl.placeholder=String(inv.lastCost);
        const add=parseInt(qEl.value)||0;
        $('rc-after').textContent = add>0 ? `${t('afterReceive')}: ${(inv.qty||0)+add}` : '';
      };
      sel.onchange=refresh; qEl.oninput=refresh; cEl.oninput=refresh;
      $('rc-save').onclick=async()=>{
        const p=products.find(x=>x.id===sel.value);
        const add=parseInt(qEl.value)||0;
        if(!p){ toast(t('selectProduct'),true); return; }
        if(add<=0){ toast(t('required'),true); return; }
        const inv=inventory[p.id]||{qty:0,threshold:20,lastCost:0};
        const newCost = cEl.value!=='' ? parseFloat(cEl.value) : (inv.lastCost||0);
        const newQty=(inv.qty||0)+add;
        const b=$('rc-save'); b.disabled=true; b.textContent='...';
        try{
          await setDoc(doc(db,'inventory',`${currentBranchId}_${p.id}`),{branchId:currentBranchId,productId:p.id,qty:newQty,threshold:inv.threshold||20,lastCost:newCost},{merge:true});
          inventory[p.id]={qty:newQty,threshold:inv.threshold||20,lastCost:newCost};
          await addDoc(collection(db,'loads'),{branchId:currentBranchId,productId:p.id,name:p.name,qty:add,unitCost:newCost,total:add*newCost,userId:user.uid,userName:profile.name||user.email,createdAt:Date.now()});
          toast(t('receiveDone')); renderWarehouse();
        }catch(e){ console.error(e); toast(t('errorGen'),true); b.disabled=false; b.textContent='📥 '+t('receive'); }
      };
    }

    function whCountView(actives){
      if(actives.length===0) return `<div class="card"><div class="empty">${t('noProdYet')}</div></div>`;
      const rows=actives.map(p=>{
        const inv=inventory[p.id]||{qty:0,lastCost:0};
        const cv=invCounts[p.id]!==undefined?invCounts[p.id]:'';
        return `<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--ivory-dark);">
          <div style="flex:1;min-width:0;"><div class="fr" dir="ltr" style="font-size:14px;">${p.name}</div>
            <div style="font-size:11px;color:rgba(26,26,26,0.5);">${t('systemQty')}: <span class="num">${inv.qty||0}</span></div></div>
          <input class="input num" id="cnt-${p.id}" data-pid="${p.id}" type="number" min="0" dir="ltr" value="${cv}" placeholder="${t('enterCount')}" style="width:90px;padding:8px;">
          <div id="d-${p.id}" class="num" style="width:64px;text-align:end;font-weight:700;font-size:13px;">—</div>
        </div>`;
      }).join('');
      return `<div class="card">
        <div class="card-title">📋 ${t('physInv')}</div>
        <div style="font-size:12px;color:rgba(26,26,26,0.55);margin-bottom:6px;">${t('adjustNote')}</div>
        <div style="font-size:11px;color:rgba(26,26,26,0.45);margin-bottom:10px;">${t('leaveBlank')}</div>
        ${rows}
        <div id="cnt-sum" style="margin-top:12px;font-size:12px;color:rgba(26,26,26,0.6);"></div>
        <button class="btn-gold btn-wide" id="cnt-apply" style="margin-top:12px;">⚖️ ${t('applyInv')}</button>
      </div>`;
    }

    function bindCount(actives){
      const upd=(pid)=>{
        const el=$('cnt-'+pid); const inv=inventory[pid]||{qty:0};
        const dEl=$('d-'+pid);
        if(el.value===''){ invCounts[pid]=undefined; delete invCounts[pid]; dEl.textContent='—'; dEl.style.color='rgba(26,26,26,0.4)'; recompSum(); return; }
        invCounts[pid]=el.value;
        const diff=(parseInt(el.value)||0)-(inv.qty||0);
        dEl.textContent=(diff>0?'+':diff<0?'−':'')+fmt(diff);
        dEl.style.color=diff>0?'var(--amber)':diff<0?'var(--red)':'var(--green)';
        recompSum();
      };
      const recompSum=()=>{
        let counted=0,surplus=0,shortage=0,valImpact=0;
        actives.forEach(p=>{ if(invCounts[p.id]===undefined)return; counted++;
          const inv=inventory[p.id]||{qty:0,lastCost:0}; const diff=(parseInt(invCounts[p.id])||0)-(inv.qty||0);
          if(diff>0)surplus++; else if(diff<0)shortage++; valImpact+=diff*(inv.lastCost||0); });
        $('cnt-sum').innerHTML=`${t('totalItems')}: <b>${counted}</b> · ${t('surplus')}: <b style="color:var(--amber);">${surplus}</b> · ${t('shortage')}: <b style="color:var(--red);">${shortage}</b><br>${t('valueImpact')}: <b class="num" style="color:${valImpact<0?'var(--red)':'var(--green)'};">${valImpact>0?'+':valImpact<0?'−':''}${fmt(valImpact)} ${t('currency')}</b>`;
      };
      actives.forEach(p=>{ const el=$('cnt-'+p.id); el.oninput=()=>upd(p.id); if(invCounts[p.id]!==undefined) upd(p.id); });
      recompSum();
      $('cnt-apply').onclick=async()=>{
        const lines=[];
        actives.forEach(p=>{ if(invCounts[p.id]===undefined)return;
          const inv=inventory[p.id]||{qty:0,lastCost:0}; const counted=parseInt(invCounts[p.id])||0;
          lines.push({pid:p.id,name:p.name,system:inv.qty||0,counted,diff:counted-(inv.qty||0),cost:inv.lastCost||0,threshold:inv.threshold||20}); });
        if(lines.length===0){ toast(t('noChanges'),true); return; }
        if(!confirm(t('confirmApplyInv'))) return;
        const b=$('cnt-apply'); b.disabled=true; b.textContent='...';
        try{
          for(const ln of lines){
            await setDoc(doc(db,'inventory',`${currentBranchId}_${ln.pid}`),{branchId:currentBranchId,productId:ln.pid,qty:ln.counted,threshold:ln.threshold,lastCost:ln.cost},{merge:true});
            inventory[ln.pid]={qty:ln.counted,threshold:ln.threshold,lastCost:ln.cost};
          }
          await addDoc(collection(db,'inventories'),{branchId:currentBranchId,userId:user.uid,userName:profile.name||user.email,createdAt:Date.now(),
            lines:lines.map(l=>({productId:l.pid,name:l.name,system:l.system,counted:l.counted,diff:l.diff,cost:l.cost}))});
          invCounts={};
          toast(t('invApplied'));
          showInvReport(lines);
        }catch(e){ console.error(e); toast(t('errorGen'),true); b.disabled=false; b.textContent='⚖️ '+t('applyInv'); }
      };
    }

    function showInvReport(lines){
      const dt=new Date();
      let counted=lines.length,surplus=0,shortage=0,valImpact=0;
      lines.forEach(l=>{ if(l.diff>0)surplus++; else if(l.diff<0)shortage++; valImpact+=l.diff*l.cost; });
      const bn=(()=>{const b=branches.find(x=>x.id===currentBranchId);return b?(lang==='ar'?b.nameAr:b.nameEn):'';})();
      const sgn=n=>(n>0?'+':n<0?'−':'')+fmt(n);
      const rowsHtml=lines.map(l=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--ivory-dark);">
        <div style="flex:1;min-width:0;"><div class="fr" dir="ltr" style="font-size:14px;">${l.name}</div></div>
        <div class="num" style="width:50px;text-align:center;font-size:12px;color:rgba(26,26,26,0.55);">${l.system}</div>
        <div class="num" style="width:50px;text-align:center;font-size:13px;font-weight:700;">${l.counted}</div>
        <div class="num" style="width:56px;text-align:end;font-weight:700;font-size:13px;color:${l.diff>0?'var(--amber)':l.diff<0?'var(--red)':'var(--green)'};">${sgn(l.diff)}</div>
      </div>`).join('');
      let html=`<div style="font-size:11px;letter-spacing:1px;color:var(--forest);font-weight:700;margin-bottom:12px;">${t('invReport').toUpperCase()}</div>
        <div class="card"><div class="card-title">📄 ${t('invReport')} · ${bn}</div>
        <div style="font-size:12px;color:rgba(26,26,26,0.55);margin-bottom:10px;">${t('invDate')}: <span class="num">${fmtDT(dt.getTime())}</span></div>
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
          <div style="flex:1;background:rgba(31,58,46,0.05);border-radius:10px;padding:9px;text-align:center;min-width:70px;"><div style="font-size:10px;color:rgba(26,26,26,0.55);font-weight:700;">${t('totalItems')}</div><div class="num" style="font-size:17px;font-weight:700;">${counted}</div></div>
          <div style="flex:1;background:rgba(216,142,42,0.1);border-radius:10px;padding:9px;text-align:center;min-width:70px;"><div style="font-size:10px;color:rgba(26,26,26,0.55);font-weight:700;">${t('surplus')}</div><div class="num" style="font-size:17px;font-weight:700;color:var(--amber);">${surplus}</div></div>
          <div style="flex:1;background:rgba(192,72,72,0.08);border-radius:10px;padding:9px;text-align:center;min-width:70px;"><div style="font-size:10px;color:rgba(26,26,26,0.55);font-weight:700;">${t('shortage')}</div><div class="num" style="font-size:17px;font-weight:700;color:var(--red);">${shortage}</div></div>
        </div>
        <div style="background:rgba(61,115,85,0.1);border-radius:10px;padding:8px 12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:12px;font-weight:600;">${t('valueImpact')}</span><span class="num" style="font-weight:700;color:${valImpact<0?'var(--red)':'var(--green)'};">${sgn(valImpact)} ${t('currency')}</span></div>
        <div style="display:flex;gap:8px;padding:6px 0;border-bottom:2px solid var(--ivory-dark);font-size:10px;font-weight:700;color:rgba(26,26,26,0.5);">
          <div style="flex:1;">${t('name')}</div><div style="width:50px;text-align:center;">${t('systemQty')}</div><div style="width:50px;text-align:center;">${t('countedQty')}</div><div style="width:56px;text-align:end;">${t('diff')}</div></div>
        ${rowsHtml}
        <div style="display:flex;gap:8px;margin-top:14px;">
          <button class="btn-forest btn-wide" id="inv-print">🖨️ ${t('print')}</button>
          <button class="btn-secondary btn-wide" id="inv-dl">⬇️ ${t('download')}</button>
        </div></div>`;
      $('content').innerHTML=html;
      const title=`${t('invReport')} · ${bn} · ${fmtDate(dt.getTime())}`;
      $('inv-print').onclick=()=>{
        const body=`<table><thead><tr><th>${t('name')}</th><th>${t('systemQty')}</th><th>${t('countedQty')}</th><th>${t('diff')}</th><th>${t('valueImpact')} (${t('currency')})</th></tr></thead><tbody>
          ${lines.map(l=>`<tr><td>${l.name}</td><td>${l.system}</td><td>${l.counted}</td><td class="${l.diff<0?'neg':'pos'}">${sgn(l.diff)}</td><td>${sgn(l.diff*l.cost)}</td></tr>`).join('')}
          <tr class="tot"><td>${t('totalItems')}: ${counted}</td><td></td><td></td><td>${t('surplus')}:${surplus} / ${t('shortage')}:${shortage}</td><td>${sgn(valImpact)}</td></tr>
          </tbody></table>`;
        printDoc(title,body);
      };
      $('inv-dl').onclick=()=>{
        const header=[t('name'),t('systemQty'),t('countedQty'),t('diff'),t('cost'),t('valueImpact')];
        const rows=lines.map(l=>[l.name,l.system,l.counted,l.diff,l.cost,l.diff*l.cost]);
        downloadCSV(`inventory_${dt.toISOString().slice(0,10)}.csv`,header,rows);
      };
    }

    // ============ STAMPA / DOWNLOAD (rapporti) ============
    function printDoc(title, bodyHtml){
      const dir=T[lang].dir, align=dir==='rtl'?'right':'left';
      const w=window.open('','_blank');
      if(!w){ toast(t('errorGen'),true); return; }
      w.document.write(`<!doctype html><html dir="${dir}" lang="${lang}"><head><meta charset="utf-8"><title>${title}</title>
        <style>body{font-family:Arial,Tahoma,sans-serif;padding:28px;color:#1A1A1A;}
        h1{color:#1F3A2E;font-size:22px;margin:0 0 2px;}.sub{color:#888;font-size:12px;margin-bottom:18px;}
        table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:18px;}
        th,td{border:1px solid #ddd;padding:7px 9px;text-align:${align};}
        th{background:#1F3A2E;color:#fff;font-weight:600;}.tot{font-weight:700;background:#F0EADC;}
        .pos{color:#C04848;}.neg{color:#3D7355;}h2{color:#1F3A2E;font-size:15px;margin:18px 0 8px;}</style></head>
        <body><h1>Le Coin</h1><div class="sub">${title} — ${fmtDT(Date.now())}</div>${bodyHtml}</body></html>`);
      w.document.close(); w.focus(); setTimeout(()=>{ try{w.print();}catch(e){} },400);
    }
    function downloadCSV(filename, header, rows){
      const esc=c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`;
      const csv=[header].concat(rows).map(r=>r.map(esc).join(',')).join('\r\n');
      const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
      const url=URL.createObjectURL(blob); const a=document.createElement('a');
      a.href=url; a.download=filename; document.body.appendChild(a); a.click();
      setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },800);
    }

    // ============ HELPERS ============
    function setToggle(id,init,cb){ let v=init; const el=$(id); el.onclick=()=>{v=!v;el.style.background=v?'var(--forest)':'rgba(26,26,26,0.2)';cb(v);}; }
    function compress(file,maxW=600,q=0.7){ return new Promise(res=>{ const img=new Image(); img.onload=()=>{ const sc=Math.min(1,maxW/img.width); const c=document.createElement('canvas'); c.width=img.width*sc; c.height=img.height*sc; c.getContext('2d').drawImage(img,0,0,c.width,c.height); res(c.toDataURL('image/jpeg',q)); }; img.src=URL.createObjectURL(file); }); }

    function openSettings(){
      const roleLabel=t(profile.role);
      $('sheet-root').innerHTML=`<div class="overlay" id="ov"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${t('settings')}</div><div class="sheet-title">${profile.name||user.email}</div></div><button class="close-x" id="cx">×</button></div>
        <div class="card" style="display:grid;gap:8px;font-size:13px;">
          <div style="display:flex;justify-content:space-between;"><span style="color:rgba(26,26,26,0.6);">${t('email')}</span><span class="num">${user.email}</span></div>
          <div style="display:flex;justify-content:space-between;"><span style="color:rgba(26,26,26,0.6);">${t('role')}</span><span style="font-weight:600;color:var(--forest);">${roleLabel}</span></div>
        </div>
        <button class="btn-secondary btn-wide" id="logout-btn" style="color:var(--red);border-color:rgba(192,72,72,0.3);">${t('logout')}</button>
      </div></div>`;
      $('ov').onclick=closeSheet;$('cx').onclick=closeSheet;
      $('logout-btn').onclick=async()=>{ await signOut(auth); closeSheet(); };
    }

    // ============ INIT ============
    refreshLoginLabels(); applyLang();
    if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
  </script>
</body>
</html>
