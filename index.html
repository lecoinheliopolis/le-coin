    function canRefund(){ return profile && (profile.role==='admin'||profile.role==='manager'); }
    // quantità già resa per prodotto in questa vendita
    function returnedQtyOf(sale,pid){ let q=0; (sale.returns||[]).forEach(r=>(r.lines||[]).forEach(l=>{ if(l.productId===pid)q+=l.qty; })); return q; }
    async function restoreStock(pid,qty){
      const cur=inventory[pid]||{qty:0,threshold:20,lastCost:0};
      const nq=(cur.qty||0)+qty;
      await setDoc(doc(db,'inventory',`${currentBranchId}_${pid}`),{branchId:currentBranchId,productId:pid,qty:nq,threshold:cur.threshold||20,lastCost:cur.lastCost||0},{merge:true});
      inventory[pid]={qty:nq,threshold:cur.threshold||20,lastCost:cur.lastCost||0};
    }
    async function doVoid(sale){
      if(sale.voided){ toast(t('alreadyVoided'),true); return; }
      if(!confirm(t('confirmVoid'))) return;
      try{
        // rimetti in stock tutta la quantità non ancora resa
        const lines=[];
        for(const it of (sale.items||[])){
          const remain=it.qty-returnedQtyOf(sale,it.productId);
          if(remain>0){ await restoreStock(it.productId,remain); lines.push({productId:it.productId,name:it.name,qty:remain,price:it.price,amount:remain*it.price,toStock:true}); }
        }
        const ev={at:Date.now(),byName:profile.name||user.email,type:'void',lines,amount:lines.reduce((a,l)=>a+l.amount,0)};
        const returns=[...(sale.returns||[]),ev];
        const refundTotal=sale.total||0; // storno totale
        await updateDoc(doc(db,'sales',sale.id),{voided:true,refundTotal,returns});
        sale.voided=true; sale.refundTotal=refundTotal; sale.returns=returns;
        // 🆕 v2.7.0 Stage 4b — Decrement soldUnits sulle offerte applicate
        // Quando una vendita è completamente annullata, gli incrementi su offerte sono reversibili
        for(const it of (sale.items||[])){
          if(it.appliedOfferId && typeof registerOfferSale==='function'){
            try{
              await updateDoc(doc(db,'offers',it.appliedOfferId), { soldUnits: increment(-(it.qty||0)) });
              // Se l'offerta era stata auto-chiusa per maxUnits, la riapro
              const snap = await getDoc(doc(db,'offers',it.appliedOfferId));
              if(snap.exists()){
                const o = snap.data();
                if(o.active===false && o.autoEndedReason==='maxUnits' && o.maxUnits && (o.soldUnits||0) < o.maxUnits){
                  await updateDoc(doc(db,'offers',it.appliedOfferId), { active:true, autoEndedReason:null });
                }
              }
            } catch(e){ console.warn('[offers] void decrement failed:', e); }
          }
        }
        invalidateOffersCache();
        // 💎 إذا الفاتورة كانت لعميل: نرجع نقاطه (ضد العملية الأصلية)
        if(sale.customerId){
          const used = sale.pointsUsed||0;   // النقاط اللي اتصرفت → نرجّعها للعميل
          const earned = sale.pointsEarned||0; // النقاط اللي اتكسبت → نسحبها من العميل
          if(used>0 || earned>0){
            try{
              const cs=await getDoc(doc(db,'customers',sale.customerId));
              const curr = cs.exists() ? (cs.data().points||0) : 0;
              const newBal = Math.max(0, Math.round((curr + used - earned) * 100) / 100);
              await updateDoc(doc(db,'customers',sale.customerId),{points:newBal});
              // قيود عكسية في pointsLedger
              const ts=Date.now();
              if(used>0) await addDoc(collection(db,'pointsLedger'),{customerId:sale.customerId,branchId:sale.branchId,type:'void_refund',amount:used,saleId:sale.id,note:'إرجاع نقاط من فاتورة ملغية',createdAt:ts});
              if(earned>0) await addDoc(collection(db,'pointsLedger'),{customerId:sale.customerId,branchId:sale.branchId,type:'void_revoke',amount:earned,saleId:sale.id,note:'سحب نقاط من فاتورة ملغية',createdAt:ts});
            }catch(e){ console.warn('void points reversal',e); }
          }
        }
        toast(t('returnDone')); showReceipt(sale);
      }catch(e){ console.error(e); toast(t('errorGen'),true); }
    }
    function returnForm(sale){
      // righe con quantità ancora restituibile
      const avail=(sale.items||[]).map(it=>({...it,remain:it.qty-returnedQtyOf(sale,it.productId)})).filter(it=>it.remain>0);
      if(avail.length===0){ toast(t('nothingToReturn'),true); return; }
      const toStock={}; avail.forEach(it=>toStock[it.productId]=true);
      const rows=avail.map(it=>`<div style="padding:9px 0;border-bottom:1px solid var(--ivory-dark);">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">

          <input class="input num" id="rt-${it.productId}" data-pid="${it.productId}" type="number" min="0" max="${it.remain}" dir="ltr" value="0" style="width:70px;padding:7px;">

        <label style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:11px;color:rgba(26,26,26,0.6);cursor:pointer;"><input type="checkbox" id="st-${it.productId}" data-pid="${it.productId}" checked> ${t('backToStock')}</label>
      </div>`).join('');
      $('sheet-root').innerHTML=`<div class="overlay" id="ov2" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">#${sale.receiptNo||''}</div><div class="sheet-title">↩️ ${t('returnItems')}</div></div><button class="close-x" id="cx2">×</button></div>
        <div style="font-size:12px;color:rgba(26,26,26,0.55);margin-bottom:8px;">${t('selectReturnQty')}</div>
        <button class="btn-secondary btn-wide" id="rt-scan" style="margin-bottom:10px;">📷 ${t('scanToReturn')}</button>
        ${rows}
        <div id="rt-sum" style="margin:12px 0;font-size:14px;font-weight:700;text-align:center;"></div>
        <button class="btn-forest btn-wide" id="rt-do">↩️ ${t('doReturn')}</button>
      </div></div>`;
      $('ov2').onclick=()=>showReceipt(sale); $('cx2').onclick=()=>showReceipt(sale);
      const recompute=()=>{
        let amt=0; avail.forEach(it=>{ const q=parseInt($('rt-'+it.productId).value)||0; amt+=q*it.price; });
        $('rt-sum').innerHTML=`${t('refundedAmount')}: <span class="num" style="color:var(--red);">${fmt(amt)} ${t('currency')}</span>`;
      };
      avail.forEach(it=>$('rt-'+it.productId).oninput=recompute); recompute();
      $('rt-scan')&&($('rt-scan').onclick=()=>smartScan('refund',{avail,recompute}));
      $('rt-do').onclick=async()=>{
        const lines=[];
        for(const it of avail){
          let q=parseInt($('rt-'+it.productId).value)||0; if(q<=0)continue; if(q>it.remain)q=it.remain;
          const back=$('st-'+it.productId).checked;
          if(back) await restoreStock(it.productId,q);
          lines.push({productId:it.productId,name:it.name,qty:q,price:it.price,amount:q*it.price,toStock:back});
        }
        if(lines.length===0){ toast(t('nothingToReturn'),true); return; }
        const b=$('rt-do'); b.disabled=true; b.textContent='...';
        try{
          const ev={at:Date.now(),byName:profile.name||user.email,type:'return',lines,amount:lines.reduce((a,l)=>a+l.amount,0)};
          const returns=[...(sale.returns||[]),ev];
          const refundTotal=(sale.refundTotal||0)+ev.amount;
          const totalQty=(sale.items||[]).reduce((a,i)=>a+i.qty,0);
          const retQty=returns.reduce((a,r)=>a+r.lines.reduce((x,l)=>x+l.qty,0),0);
          const voided=retQty>=totalQty; // se tutto reso => annullata
          await updateDoc(doc(db,'sales',sale.id),{returns,refundTotal,voided});
          sale.returns=returns; sale.refundTotal=refundTotal; sale.voided=voided;
          // 🆕 v2.7.0 Stage 4b — Decrement soldUnits sulle quantità effettivamente rese se l'item aveva offerta
          for(const l of lines){
            const orig = (sale.items||[]).find(x=>x.productId===l.productId);
            if(orig && orig.appliedOfferId){
              try{
                await updateDoc(doc(db,'offers',orig.appliedOfferId), { soldUnits: increment(-(l.qty||0)) });
                // Riapertura se era auto-chiusa per maxUnits
                const snap = await getDoc(doc(db,'offers',orig.appliedOfferId));
                if(snap.exists()){
                  const o = snap.data();
                  if(o.active===false && o.autoEndedReason==='maxUnits' && o.maxUnits && (o.soldUnits||0) < o.maxUnits){
                    await updateDoc(doc(db,'offers',orig.appliedOfferId), { active:true, autoEndedReason:null });
                  }
                }
              } catch(e){ console.warn('[offers] return decrement failed:', e); }
            }
          }
          invalidateOffersCache();
          toast(t('returnDone')); showReceipt(sale);
        }catch(e){ console.error(e); toast(t('errorGen'),true); b.disabled=false; b.textContent='↩️ '+t('doReturn'); }
      };
    }

    let receiptsCache=[]; // vendite caricate per il filtraggio

    function renderReceiptsList(){
      const f=rcFilter;
      const fromTs=f.from?new Date(f.from+'T00:00:00').getTime():null;
      const toTs=f.to?new Date(f.to+'T23:59:59').getTime():null;
      const minV=f.min!==''?parseFloat(f.min):null;
      const maxV=f.max!==''?parseFloat(f.max):null;
      let list=receiptsCache.filter(s=>{
        if(!f.showVoided && s.voided) return false; // الفواتير الملغاة مخفية افتراضياً
        if(f.q && !String(s.receiptNo||'').includes(f.q.replace('#',''))) return false;
        if(fromTs && (s.createdAt||0)<fromTs) return false;
        if(toTs && (s.createdAt||0)>toTs) return false;
        if(f.cashier && s.userName!==f.cashier) return false;
        const net=Math.max(0,(s.total||0)-(s.refundTotal||0));
        if(minV!=null && net<minV) return false;
        if(maxV!=null && net>maxV) return false;
        return true;
      });
      const totNet=list.reduce((a,s)=>a+Math.max(0,(s.total||0)-(s.refundTotal||0)),0);
      const box=$('rcpt-list'); if(!box)return;

        const net=Math.max(0,(s.total||0)-(s.refundTotal||0));
        const badge = s.voided?`<span style="font-size:10px;color:var(--red);font-weight:700;border:1px solid rgba(192,72,72,0.4);border-radius:6px;padding:1px 6px;">${t('voidedLbl')}</span>`

          <div style="font-weight:700;font-size:14px;">#${s.receiptNo||'—'} <span style="font-weight:400;font-size:11px;color:rgba(26,26,26,0.5);">· ${(s.count||(s.items?s.items.length:0))} ${t('items_n')}</span> ${badge} ${payBadge}</div>
          <div class="num" style="font-size:11px;color:rgba(26,26,26,0.55);">${fmtDT(s.createdAt,s.tzo)} · ${s.userName||''}</div>

      </div>`;}).join('')+`</div>`;
      box.innerHTML=html;
      box.querySelectorAll('.rcpt-row').forEach(r=>r.onclick=()=>{ const s=receiptsCache.find(x=>x.id===r.dataset.id); if(s) showReceipt(s); });

    function branchForm(br){
      // 🆕 v2.7.0 — Default orari settimanali (09:00–22:00 ogni giorno)
      const DEFAULT_HOURS = { mon:{open:'09:00',close:'22:00'}, tue:{open:'09:00',close:'22:00'}, wed:{open:'09:00',close:'22:00'}, thu:{open:'09:00',close:'22:00'}, fri:{open:'09:00',close:'22:00'}, sat:{open:'09:00',close:'22:00'}, sun:{open:'09:00',close:'22:00'} };

      // 🆕 v2.7.0 — Editor orari (mantengo defaults se branch esistente non ha hours)
      let hours = (f.hours && typeof f.hours==='object') ? JSON.parse(JSON.stringify(f.hours)) : JSON.parse(JSON.stringify(DEFAULT_HOURS));

      ['mon','tue','wed','thu','fri','sat','sun'].forEach(d=>{ if(!hours[d]) hours[d]={open:'09:00',close:'22:00'}; if(!hours[d].open) hours[d].open='09:00'; if(!hours[d].close) hours[d].close='22:00'; });

        $('sheet-root').innerHTML=`<div class="overlay" id="ov" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()">

          ${br?`<button class="btn-secondary btn-wide" id="b-del" style="margin-bottom:10px;color:var(--red);border-color:rgba(192,72,72,0.3);">${t('delete')}</button>`:''}

        $('cx').onclick=closeSheet;
        // 🆕 v2.7.0 — Listeners orari
        document.querySelectorAll('.bh-open').forEach(inp=>inp.onchange=e=>{ hours[e.target.dataset.d].open = e.target.value; });
        document.querySelectorAll('.bh-close').forEach(inp=>inp.onchange=e=>{ hours[e.target.dataset.d].close = e.target.value; });
        document.querySelectorAll('.bh-closed').forEach(btn=>btn.onclick=e=>{
          const d = btn.dataset.d;

          else if(!e.target.checked) selectedCatIds = selectedCatIds.filter(x=>x!==cid);
          renderForm();

        $('b-cats-none').onclick=()=>{ selectedCatIds = []; renderForm(); };
        if(br)$('b-del').onclick=async()=>{ if(!confirm(t('confirmDelBranch')))return; try{await deleteDoc(doc(db,'branches',br.id)); closeSheet(); await refreshBranchSelector(); renderBranches(); toast(t('deleted'));}catch(e){console.error(e);toast(t('errorGen'),true);} };
        $('b-save').onclick=async()=>{

          $('b-save').textContent='...';
          try{

        const price=parseFloat($('p-price').value),cost=parseFloat($('p-cost').value);
        const qty=parseInt($('p-stock').value)||0,threshold=parseInt($('p-thr').value)||20;
        if(!barcode||(!name&&!nameAr)||!categoryId||isNaN(price)||price<=0||isNaN(cost)){toast(t('required'),true);return;}
        if(products.find(p=>p.barcode===barcode&&(!prod||p.id!==prod.id))){toast(lang==='ar'?'باركود مستخدم':'Barcode in use',true);return;}
        $('p-save').textContent=t('uploading');
        try{
          let prodId=prod?prod.id:null;
          const data={barcode,name,nameAr,categoryId,descAr,descEn,price,cost,active:act};
          // 🆕 v2.7.0 Stage 3 — Hook firstActivatedAt
          // - Nuovo prodotto creato attivo → setta firstActivatedAt = now
          // - Prodotto esistente passa da inactive → active → aggiorna firstActivatedAt
          // - Altrimenti lascia invariato (così resta "nuovo" finché 7gg sono passati)
          const wasInactive = prod && prod.active===false;
          const becomesActive = act===true;
          if(!prod && becomesActive){
            data.firstActivatedAt = Date.now();
          } else if(prod && wasInactive && becomesActive){
            data.firstActivatedAt = Date.now();
          }
          if(prod){ await updateDoc(doc(db,'products',prodId),data); }
          else{ data.createdAt=Date.now(); data.photoUrl=''; const r=await addDoc(collection(db,'products'),data); prodId=r.id; }
          invalidateCatalogCache();
          // photo upload
          if(pendingPhoto){ data.photoUrl=pendingPhoto; await updateDoc(doc(db,'products',prodId),{photoUrl:pendingPhoto}); }
          else if(prod) data.photoUrl=prod.photoUrl||'';
          // inventory upsert for current branch
          await setDoc(doc(db,'inventory',`${currentBranchId}_${prodId}`),{branchId:currentBranchId,productId:prodId,qty,threshold,lastCost:cost},{merge:true});
          inventory[prodId]={qty,threshold,lastCost:cost};
          // local state
          if(prod) Object.assign(prod,data,{id:prodId});
          else products.push({id:prodId,...data});
          closeSheet();renderProducts();toast(t('saved'));
        }catch(e){console.error(e);toast(t('errorGen'),true);$('p-save').textContent='✓ '+t('save');}
      };
    }

          const qs=await getDocs(query(collection(db,'shifts'),where('status','==','open')));

        } else {
          for(const bid of visibleBranchIds){

    // ============ DASHBOARD / لوحة التحكم (admin + manager) ============
    let dashRange={mode:'today',from:'',to:'',branchId:'all'};
    function dashRangeTs(){
      const now=Date.now();
      if(dashRange.mode==='today') return [dayStart(now), now];

      if(dashRange.mode==='30') return [now-30*86400000, now];

      const vF = dashRange.from?.trim() || '';

        const fTs = new Date(vF+'T00:00:00').getTime();

        if(isNaN(fTs) || isNaN(tTs)) return [dayStart(now-29*86400000), now];
        return [dayStart(fTs), tTs];

    // SVG sparkline inline (no library)
    function sparklineSVG(values, color, w, h){
      w = w||80; h = h||22;
      if(!values || !values.length) return '';
      const max = Math.max(...values, 0), min = Math.min(...values, 0);
      const range = max-min || 1;
      const pts = values.map((v,i)=>{
        const x = values.length>1 ? (i/(values.length-1))*w : w/2;
        const y = h - ((v-min)/range)*h;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');
      return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" style="display:block;"><polyline points="${pts}" fill="none" stroke="${color||'#1F3A2E'}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
    }

    // Helper: trend daily revenues per range
    // 🆕 v2.7.2 — Granularità adattiva: 30min / 1h / 1 giorno a seconda della durata
    // Quando il range è ≤ 24h, raggruppa per ora (o mezz'ora se durata < 6h)
    // Ritorna {buckets, labels, mode}
    function dailyBuckets(salesArr, fromTs, toTs){
      const HOUR_MS = 3600000;
      const DAY_MS = 86400000;
      const rangeMs = Math.max(1, toTs - fromTs);
      let bucketMs, mode;
      if(rangeMs <= DAY_MS + HOUR_MS){
        const hoursSpan = rangeMs / HOUR_MS;
        if(hoursSpan <= 6){ bucketMs = HOUR_MS/2; mode = 'halfHour'; }
        else { bucketMs = HOUR_MS; mode = 'hour'; }
      } else {
        bucketMs = DAY_MS; mode = 'day';
      }
      const nBuckets = Math.max(1, Math.ceil(rangeMs / bucketMs));
      const buckets = new Array(nBuckets).fill(0);
      salesArr.forEach(s=>{
        if(s.voided) return;
        const idx = Math.floor((s.createdAt - fromTs) / bucketMs);
        if(idx>=0 && idx<nBuckets) buckets[idx] += Math.max(0, (s.total||0)-(s.refundTotal||0));
      });
      // Costruisci labels
      const labels = [];
      for(let i=0; i<nBuckets; i++){
        const d = new Date(fromTs + i*bucketMs);
        if(mode === 'day'){
          labels.push(`${d.getDate()}/${d.getMonth()+1}`);
        } else if(mode === 'hour'){
          labels.push(`${String(d.getHours()).padStart(2,'0')}:00`);
        } else { // halfHour
          const h = String(d.getHours()).padStart(2,'0');
          const m = d.getMinutes() === 0 ? '00' : '30';
          labels.push(`${h}:${m}`);
        }
      }
      // Per backward compat: array con properties (.labels, .mode)
      buckets.labels = labels;
      buckets.mode = mode;
      return buckets;
    }

    // Periodo di analyticsState → [fromTs, toTs]
    function analyticsRangeTs(){
      const r = analyticsState.range;
      const now = Date.now();
      let fromTs, toTs;
      if(r.mode==='today'){ fromTs=dayStart(now); toTs=now; }
      else if(r.mode==='7'){ fromTs=dayStart(now-6*86400000); toTs=now; }
      else if(r.mode==='30'){ fromTs=dayStart(now-29*86400000); toTs=now; }
      else if(r.mode==='month'){ const d=new Date(); fromTs=new Date(d.getFullYear(),d.getMonth(),1).getTime(); toTs=now; }
      else if(r.mode==='year'){ const d=new Date(); fromTs=new Date(d.getFullYear(),0,1).getTime(); toTs=now; }
      else { 
        // 🆕 v2.7.2 — Validazione date input (no undefined, no invalid)
        const vF = r.from?.trim() || '';
        const vT = r.to?.trim() || '';
        if(!vF || !vT){ 
          // Se manca una data, fallback a 30 giorni
          console.warn('[analytics] Invalid custom range:', {from:r.from, to:r.to}, '→ fallback 30d');
          fromTs=dayStart(now-29*86400000); toTs=now; 
        } else {
          try{
            const fTs = new Date(vF+'T00:00:00').getTime();
            const tTs = new Date(vT+'T23:59:59').getTime();
            if(isNaN(fTs) || isNaN(tTs)){ 
              console.warn('[analytics] Invalid date parse:', {from:vF, to:vT}, '→ fallback 30d');
              fromTs=dayStart(now-29*86400000); toTs=now; 
            } else {
              fromTs=dayStart(fTs); toTs=tTs;
            }
          }catch(e){ 
            console.warn('[analytics] Date parse error:', e.message, '→ fallback 30d');
            fromTs=dayStart(now-29*86400000); toTs=now; 
          }
        }
      }
      return [fromTs, toTs];
    }

    // Carica dati Analytics
    async function loadAnalyticsData(){
      const [fromTs, toTs] = analyticsRangeTs();
      let visIds = profile.role==='admin' ? branches.map(b=>b.id) : (profile.branchIds||[]);
      if(analyticsState.branchFilter!=='all' && visIds.includes(analyticsState.branchFilter)) visIds = [analyticsState.branchFilter];
      // Sales (filtrati per filiale + periodo)
      let sales=[], loadsArr=[], invAll=[], customersArr=[], shiftsArr=[];
      try{
        if(profile.role==='admin'){ (await getDocs(collection(db,'sales'))).forEach(d=>sales.push({id:d.id,...d.data()})); }
        else { for(const b of visIds){ (await getDocs(query(collection(db,'sales'),where('branchId','==',b)))).forEach(d=>sales.push({id:d.id,...d.data()})); } }
        (await getDocs(collection(db,'loads'))).forEach(d=>loadsArr.push(d.data()));
        (await getDocs(collection(db,'inventory'))).forEach(d=>invAll.push(d.data()));
        (await getDocs(collection(db,'shifts'))).forEach(d=>shiftsArr.push(d.data()));
        if(profile.role==='admin'){ try{ (await getDocs(collection(db,'customers'))).forEach(d=>customersArr.push({id:d.id,...d.data()})); }catch(e){} }
      }catch(e){ console.error('[analytics] load failed:', e); throw e; }
      const inP = ts => ts>=fromTs && ts<=toTs;
      const visOk = bid => visIds.includes(bid);
      sales = sales.filter(s=>visOk(s.branchId) && inP(s.createdAt));
      loadsArr = loadsArr.filter(l=>visOk(l.branchId) && inP(l.createdAt));
      invAll = invAll.filter(i=>visOk(i.branchId));
      shiftsArr = shiftsArr.filter(s=>visOk(s.branchId) && inP(s.openAt||s.openedAt||s.createdAt||0));
      analyticsState._sales = sales;
      analyticsState._loads = loadsArr;
      analyticsState._inv = invAll;
      analyticsState._custs = customersArr;
      analyticsState._shifts = shiftsArr;
      analyticsState._ts = [fromTs, toTs];
      analyticsState._visIds = visIds;
      // buildReportData per drill-down (lazy: solo quando serve)
      analyticsState._data = await buildReportData(fromTs, toTs);
      if(analyticsState.compare){
        const span = toTs - fromTs;
        analyticsState._data2 = await buildReportData(fromTs-span-1, fromTs-1);
      } else { analyticsState._data2 = null; }
    }

    // Pattern ispirato a Stripe Dashboard / Vercel Analytics / Linear Insights:
    // tipografia raffinata, gridlines minimali, tooltip eleganti, altezze fisse.
    const _CHART_BASE = {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 400, easing: 'easeOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1F3A2E',
          titleFont: { size: 11, weight: '600', family: 'inherit' },
          bodyFont: { size: 12, weight: '700', family: 'inherit' },

          titleColor: 'rgba(255,255,255,0.7)',

        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { size: 9.5, family: 'inherit' }, color: '#a8a8a8', maxRotation: 0, autoSkipPadding: 12 },
          border: { display: false }
        },
        y: {

    };
    // Helper: clona base + merge overrides
    function _chartOpts(over){
      const o = JSON.parse(JSON.stringify(_CHART_BASE));
      if(over){
        Object.assign(o.plugins, over.plugins||{});
        Object.assign(o.scales, over.scales||{});
        if(over.indexAxis) o.indexAxis = over.indexAxis;
        // Per bar h: spegne grid X invece di Y
        if(over.indexAxis==='y'){
          o.scales.x.grid = { color: 'rgba(26,26,26,0.04)', drawBorder: false };
          o.scales.y.grid = { display: false };
        }
      }
      return o;
    }
    // Empty state quando dataset non significativo
    function _isMeaningfulData(values, minNonZero){
      minNonZero = minNonZero || 2;
      if(!values || !values.length) return false;
      const nonZero = values.filter(v=>(parseFloat(v)||0)>0).length;
      return nonZero >= minNonZero;
    }
    function _emptyChartHtml(msg){

    function _wireKpiDrill(){

    }
    function _compareDeltaBadge(curVal, prevVal){
      if(!analyticsState.compare || !analyticsState._data2 || prevVal===undefined) return '';
      const d = curVal - prevVal;
      const pct = prevVal!==0 ? Math.round(d/Math.abs(prevVal)*1000)/10 : (curVal>0?100:0);
      const col = d>0?_AN_COLORS.green : d<0?_AN_COLORS.red : 'rgba(26,26,26,0.5)';
      const arr = d>0?'▲':d<0?'▼':'━';
      return `<div style="font-size:10.5px;font-weight:700;color:${col};margin-top:3px;">${arr} ${pct>=0?'+':''}${pct}% ${t('vsBefore')}</div>`;
    }
    function _prevTotalFor(reportKey, colIdx){
      // estrae il valore dalla riga TOTALE del report nel dataset precedente
      if(!analyticsState._data2) return undefined;
      const rep = analyticsState._data2[reportKey];
      if(!rep) return undefined;
      const totalLabel = 'Σ '+t('totalRow');
      const row = rep.rows.find(r=>String(r[0]||'')===totalLabel);
      if(!row) return undefined;
      return parseFloat(String(row[colIdx]).replace(/[^0-9.\-]/g,''))||0;
    }
    function _curTotalFor(reportKey, colIdx){
      if(!analyticsState._data) return 0;
      const rep = analyticsState._data[reportKey];
      if(!rep) return 0;
      const totalLabel = 'Σ '+t('totalRow');
      const row = rep.rows.find(r=>String(r[0]||'')===totalLabel);
      if(!row) return 0;
      return parseFloat(String(row[colIdx]).replace(/[^0-9.\-]/g,''))||0;
    }

    function renderStaffTab(){
      const cur = t('currency');
      const sales = analyticsState._sales || [];

      const activeStaff = new Set();
      sales.forEach(s=>{ if(!s.voided && s.userId) activeStaff.add(s.userId); });

      const stList = Object.entries(stStats).map(([uid,s])=>{ const u=users.find(x=>x.uid===uid); return {name:u?(u.name||u.email):'—', count:s.count, rev:s.rev, hours:(stHours[uid]||0)}; }).sort((a,b)=>b.rev-a.rev);

    async function renderDashboard(){
      $('content').innerHTML=`<div class="spinner"></div>`;
      console.log('[DASH] renderDashboard start');
      const [fromTs,toTs]=dashRangeTs();
      console.log('[DASH] Date range:', new Date(fromTs).toISOString(), '→', new Date(toTs).toISOString());
      let visIds = profile.role==='admin' ? branches.map(b=>b.id) : (profile.branchIds||[]);
      // 🆕 v2.5.4 — filtro filiale dashboard
      if(dashRange.branchId && dashRange.branchId!=='all'){
        if(visIds.includes(dashRange.branchId)) visIds = [dashRange.branchId];
      }
      // حمّل البيانات
      let sales=[], loadsArr=[], invAll=[], shiftsArr=[], customersArr=[];
      try{
        console.log('[DASH] Loading sales with date filter...');
        const t0 = Date.now();
        // 🆕 v2.7.2 — Query Firestore CON filtro data (non dopo download) per evitare blocco memoria
        const salesConds = [
          where('createdAt','>=',fromTs),
          where('createdAt','<=',toTs)
        ];
        if(profile.role==='admin'){ 
          try{ 
            const qs = await getDocs(query(collection(db,'sales'), ...salesConds));
            console.log('[DASH] Admin sales loaded:', qs.docs.length, 'docs in', Date.now()-t0, 'ms');
            qs.forEach(d=>sales.push({id:d.id,...d.data()})); 
          }
          catch(e){ 
            console.warn('[DASH] Admin sales error:', e.code, e.message);
            if(e.code==='failed-precondition') { 
              console.warn('[DASH] ⚠️ Firestore index needed for date range query. This should auto-create.');
              $('content').innerHTML=`<div class="empty" style="padding:20px;text-align:center;"><div style="font-size:14px;color:var(--amber);margin-bottom:10px;">⏳ Index creato (2-5 min)</div><div style="font-size:12px;color:rgba(26,26,26,0.5);">Firestore sta creando un indice per le query di data.<br/>Riprova tra 1-2 minuti.</div></div>`; 
              sales=[]; 
            } else throw e; 
          }
        }
        else { 
          for(const b of visIds){ 
            try{ 
              const qs = await getDocs(query(collection(db,'sales'), where('branchId','==',b), ...salesConds));
              console.log('[DASH] Branch', b, 'sales:', qs.docs.length);
              qs.forEach(d=>sales.push({id:d.id,...d.data()})); 
            }
            catch(e){ console.warn('[DASH] Branch sales error:', e.code); if(e.code!=='failed-precondition') throw e; }
          } 
        }
        console.log('[DASH] Total sales loaded:', sales.length, 'in', Date.now()-t0, 'ms');
        // loads: same filtering
        const loadsConds = [where('createdAt','>=',fromTs), where('createdAt','<=',toTs)];
        try{ 
          const ql = await getDocs(query(collection(db,'loads'), ...loadsConds));
          console.log('[DASH] Loads loaded:', ql.docs.length);
          ql.forEach(d=>loadsArr.push(d.data())); 
        }
        catch(e){ if(e.code!=='failed-precondition') console.warn('[dash] loads:',e.message); }
        (await getDocs(collection(db,'inventory'))).forEach(d=>invAll.push(d.data()));
        (await getDocs(collection(db,'shifts'))).forEach(d=>shiftsArr.push(d.data()));
        // 🆕 v2.5.4 — clienti (solo admin)

      const topCats=Object.entries(catRev).map(([cid,rev])=>{ const c=categories.find(x=>x.id===cid); return {cid, name:c?(lang==='ar'?c.nameAr:c.nameEn):'—', rev, qty:catQty[cid]||0}; }).sort((a,b)=>b.rev-a.rev).slice(0,5);

    async function renderReports(){
      $('content').innerHTML=`<div class="spinner"></div><div style="text-align:center;color:rgba(26,26,26,0.5);font-size:13px;">${t('loadingReports')}</div>`;
      // quali branch può vedere
      const visibleBranchIds = profile.role==='admin' ? branches.map(b=>b.id) : (profile.branchIds||[]);
      let sales=[];
      try{
        // admin: tutte le vendite; manager: solo i suoi branch (query per branch)
        if(profile.role==='admin'){
          const qs=await getDocs(collection(db,'sales'));
          qs.forEach(d=>sales.push({id:d.id,...d.data()}));
        } else {
          for(const bid of visibleBranchIds){
            const qs=await getDocs(query(collection(db,'sales'),where('branchId','==',bid)));
            qs.forEach(d=>sales.push({id:d.id,...d.data()}));
          }
        }
      }catch(e){ console.error(e); $('content').innerHTML=`<div class="card"><div class="empty">${t('errorGen')}</div></div>`; return; }

      if(sales.length===0){ $('content').innerHTML=`<div class="card"><div class="empty">${t('noSales')}</div></div>`; return; }
      reportSales=sales; // للفلترة التفاعلية لأكتر المنتجات

      const now=Date.now(); const todayStart=dayStart(now); const weekStart=todayStart-6*86400000;
      const monthD=new Date(now); const monthStart=new Date(monthD.getFullYear(),monthD.getMonth(),1).getTime();
      const todaySales=sales.filter(s=>s.createdAt>=todayStart);
      const weekSales=sales.filter(s=>s.createdAt>=weekStart);
      const monthSales=sales.filter(s=>s.createdAt>=monthStart);

    // ============ TURNO / الوردية (shift) ============
    // shifts/{id}: branchId,userId,userName,openAt,closeAt,openCash,closeCash,
    //   pauses:[{start,end}], status:'open'|'closed', salesTotal, expectedCash, diff,
    //   workedMs, pausedMs, createdAt   (i dati servono poi per il salario)
    function fmtDur(ms){ if(!ms||ms<0)ms=0; const tot=Math.floor(ms/60000); const h=Math.floor(tot/60), m=tot%60; return `${h}${t('hShort')} ${m}${t('mShort')}`; }
    function pausedMsOf(sh, until){ const end=until||Date.now(); return (sh.pauses||[]).reduce((a,p)=>a+((p.end||end)-p.start),0); }
    function workedMsOf(sh, until){ const end=until||sh.closeAt||Date.now(); return Math.max(0,(end-sh.openAt)-pausedMsOf(sh,end)); }
    function isOnPause(sh){ const ps=sh.pauses||[]; return ps.length>0 && !ps[ps.length-1].end; }
    function fmtTime(ts, tzo){ const off=(tzo!=null)?tzo:tzOffsetMin(ts); return fmtFromOffShort(ts,off); }

    async function loadShifts(){
      shifts=[];
      await loadMyOpenShift(); // turno aperto (in qualsiasi filiale) — definisce la filiale
      // storico: admin/manager => tutti del branch corrente; cassiere => i suoi
      let qs;
      if(profile.role==='admin'||profile.role==='manager') qs=await getDocs(query(collection(db,'shifts'),where('branchId','==',currentBranchId)));
      else qs=await getDocs(query(collection(db,'shifts'),where('branchId','==',currentBranchId),where('userId','==',user.uid)));
      qs.forEach(d=>shifts.push({id:d.id,...d.data()}));
      shifts.sort((a,b)=>(b.openAt||0)-(a.openAt||0));
      await loadCustodyTx();
    }

    async function shiftSalesTotal(sh){
      const sp=await shiftSalesSplit(sh); return sp.total;
    }
    // يفصل مبيعات الوردية: كاش / Instapay / الإجمالي
    // إحصائيات الوردية الحيّة من مصفوفة مبيعات: صافي/كاش/Instapay/فواتير/منتجات/مرتجعات
    function computeShiftStats(salesArr, sh){
      const end=sh.closeAt||Date.now();
      let net=0,cash=0,insta=0,invoices=0,products=0,stornoVal=0,stornoCnt=0,pointsUsed=0;
      salesArr.forEach(s=>{
        if(s.userId!==sh.userId || s.branchId!==sh.branchId) return;
        if(!(s.createdAt>=sh.openAt && s.createdAt<=end)) return;
        const eff = s.voided?0:Math.max(0,(s.total||0)-(s.refundTotal||0));
        const pu = s.voided?0:(s.pointsUsed||0); // النقاط المستخدمة في الفاتورة (لا تدخل الدرج)
        const cashOrInsta = Math.max(0, eff - pu); // الفلوس اللي فعلاً دخلت
        net+=eff; pointsUsed+=pu;
        if(s.payMethod==='instapay') insta+=cashOrInsta; else cash+=cashOrInsta;
        if(!s.voided){ invoices++; (s.items||[]).forEach(it=>products+=(it.qty||0)); (s.returns||[]).forEach(r=>(r.lines||[]).forEach(l=>products-=(l.qty||0))); }
        if(s.voided){ stornoVal+=(s.total||0); stornoCnt++; }
        else if(s.refundTotal>0){ stornoVal+=(s.refundTotal||0); stornoCnt++; }
      });
      return {net,cash,insta,invoices,products,stornoVal,stornoCnt,pointsUsed};
    }
    async function shiftSalesSplit(sh){
      const qs=await getDocs(query(collection(db,'sales'),where('branchId','==',sh.branchId),where('userId','==',sh.userId)));
      let cash=0, insta=0, pointsUsed=0; const end=sh.closeAt||Date.now();
      qs.forEach(d=>{ const s=d.data(); if(s.createdAt>=sh.openAt && s.createdAt<=end && !s.voided){
        const eff = Math.max(0,(s.total||0)-(s.refundTotal||0));
        const pu  = s.pointsUsed||0;
        const v   = Math.max(0, eff - pu); // الفلوس اللي فعلاً اتقبضت (الدرج/Instapay)
        pointsUsed += pu;
        if(s.payMethod==='instapay') insta+=v; else cash+=v;
      } });
      return { cash, insta, pointsUsed, total: cash+insta+pointsUsed };
    }

    // ===== العُهدة: تسليم النقدية بين الورديات (بتأكيد المستلِم) =====
    // المبيعات تفضل مسجّلة باسم صاحبها؛ اللي بيتنقل هو حيازة الكاش بس.
    function custInSum(sh){ return custodyTx.filter(x=>x.status==='confirmed' && x.toShiftId===sh.id).reduce((a,x)=>a+(x.amount||0),0); }
    function custOutSum(sh){ return custodyTx.filter(x=>x.status==='confirmed' && x.fromShiftId===sh.id).reduce((a,x)=>a+(x.amount||0),0); }
    function custPendingOut(sh){ return custodyTx.filter(x=>x.status==='pending' && x.fromShiftId===sh.id); }
    function custNet(sh){ return custInSum(sh)-custOutSum(sh); } // صافي العهدة المؤكَّدة لهذه الوردية
    async function loadCustodyTx(){
      custodyTx=[];
      try{ const qs=await getDocs(query(collection(db,'custodyTransfers'),where('branchId','==',currentBranchId)));
        qs.forEach(d=>custodyTx.push({id:d.id,...d.data()})); }catch(e){ console.error('loadCustodyTx',e); }
    }
    // يفتح شيت تسليم العهدة من الوردية fromSh لزميل ورديته مفتوحة في نفس الفرع (يتسجّل pending)
    // 🆕 v2.7.1 — Supporta sia EDIT (opts={...record}) sia preselect destinatario (opts={preselectToShiftId})
    async function openHandSheet(fromSh, opts){
      // opts può essere: null | record existing (per edit) | {preselectToShiftId: '...'} (per pre-select)
      const isEdit = !!(opts && opts.id);
      const existing = isEdit ? opts : null;
      const preselectToShiftId = isEdit ? existing.toShiftId : (opts && opts.preselectToShiftId) || null;
      // 🆕 Fix: escludo per userId (non per shiftId), così Ahmed non vede mai sé stesso anche se per qualche motivo avesse più turni
      const targets=shifts.filter(s=>s.status==='open' && s.branchId===fromSh.branchId && s.userId!==fromSh.userId);
      if(targets.length===0){ toast(t('noOpenColleague'),true); return; }
      // 🆕 v2.7.1 — Calcola cash live in cassa per validare importo (Regola 5)
      let cashLive = 0;
      try{
        const split = await shiftSalesSplit(fromSh);
        const custIn = custInSum(fromSh);
        const custOut = custOutSum(fromSh); // include solo confirmed (i pending non scalano ancora)
        cashLive = (fromSh.openCash||0) + split.cash + custIn - custOut;
        // Se in edit, l'importo dell'existing non è ancora "uscito" quindi è già incluso in cashLive
      } catch(e){ console.warn('[custody] cashLive calc failed:', e); }
      const preselectTo = isEdit ? existing.toShiftId : (preselectToShiftId || (targets[0]?targets[0].id:''));
      const preselectAmt = isEdit ? (existing.amount||0) : '';
      $('sheet-root').innerHTML=`<div class="overlay" id="ov" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${t('custodyTitle')}</div><div class="sheet-title">${isEdit?'✏️ '+t('custModify'):'🤝 '+t('handOver')}</div></div><button class="close-x" id="cx">×</button></div>
        <div style="font-size:13px;margin-bottom:6px;">${t('custFrom')}: <b>${fromSh.userName||''}</b></div>
        <div style="background:rgba(31,58,46,0.06);border-radius:10px;padding:10px 12px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:12px;color:rgba(26,26,26,0.65);">💰 ${t('custCashLive')}</span>
          <span class="num" style="font-weight:700;font-size:15px;color:var(--forest);">${fmt(cashLive)} ${t('currency')}</span>
        </div>
        <div class="field"><label class="lbl">${t('handTo')}</label><select class="input" id="hand-to">${targets.map(s=>`<option value="${s.id}" ${preselectTo===s.id?'selected':''}>${s.userName||''}</option>`).join('')}</select></div>
        <div class="field"><label class="lbl">${t('handAmount')} (${t('currency')})</label><input class="input num" id="hand-amt" type="number" min="0" step="0.01" dir="ltr" placeholder="0" value="${preselectAmt}"></div>
        <button class="btn-forest btn-wide" id="hand-confirm">✓ ${isEdit?t('save'):t('handOver')}</button>
      </div></div>`;
      $('ov').onclick=closeSheet;$('cx').onclick=closeSheet;
      $('hand-confirm').onclick=async()=>{
        const amt=parseFloat($('hand-amt').value)||0;
        const toId=$('hand-to').value;
        const toSh=targets.find(s=>s.id===toId);
        if(amt<=0||!toSh){ toast(t('errorGen'),true); return; }
        // 🆕 Guard hard: blocco se sender e receiver coincidono (sanity check, oltre al filtro UI)
        if(toSh.userId === fromSh.userId){ toast(t('errorGen'),true); console.warn('[custody] blocked self-directed transfer attempt'); return; }
        // 🆕 v2.7.1 — Regola 5: blocca se amount > cashLive
        if(amt > cashLive){ toast(t('custInsufficientCash')+' ('+fmt(cashLive)+' '+t('currency')+')',true); return; }
        const b=$('hand-confirm'); b.disabled=true; b.textContent='...';
        try{
          if(isEdit){
            // Modifica richiesta esistente: aggiorna amount + dest, mantieni status=pending
            await updateDoc(doc(db,'custodyTransfers',existing.id),{
              amount:amt, toShiftId:toSh.id, toUserId:toSh.userId, toUserName:toSh.userName||'',
              modifiedAt:Date.now()
            });
            closeSheet(); toast(t('custModified')); await loadCustodyTx(); renderShift();
          } else {
            const createdAt=Date.now();
            await addDoc(collection(db,'custodyTransfers'),{
              branchId:fromSh.branchId, fromShiftId:fromSh.id, fromUserId:fromSh.userId, fromUserName:fromSh.userName||'',
              toShiftId:toSh.id, toUserId:toSh.userId, toUserName:toSh.userName||'',
              amount:amt, status:'pending', createdAt, tzo:tzOffsetMin(createdAt)
            });
            closeSheet(); toast(t('custSent')); await loadCustodyTx(); renderShift();
          }
        }catch(e){ console.error(e); toast(t('errorGen'),true); b.disabled=false; b.textContent='✓ '+(isEdit?t('save'):t('handOver')); }
      };
    }
    // 🆕 v2.7.1 — Cancellazione richiesta da parte del sender (Ahmed)

    // فحص دوري للعُهد المستنية تأكيد المستخدم الحالي (شبه فوري)

          try{
            // ١) رجوع المخزون (لأن الطلب اتجهّز والمخزون اتخصم منه)
            const invSnap=await getDocs(query(collection(db,'inventory'),where('branchId','==',o.branchId)));
            const stockMap={}; invSnap.forEach(d=>{ const x=d.data(); stockMap[x.productId]={id:d.id,qty:x.qty||0}; });
            for(const it of (o.items||[])){ const s=stockMap[it.productId]; if(s) await updateDoc(doc(db,'inventory',s.id),{qty:s.qty+it.qty}); }
            // ٢) تعليم الطلب ملغي
            await updateDoc(doc(db,'orders',o.id),{status:'cancelled',cancelledBy:user.uid,cancelledByName:profile.name||user.email,cancelledAt:Date.now(),stockRestored:true});
            toast(t('stockRestored')); renderCassa();

    // فتح دفع طلب عميل: نعرض الفاتورة + خصم النقاط + اختيار طريقة الدفع

    async function payClientOrder(order){
      const items=order.items||[]; const subtotal=items.reduce((a,i)=>a+i.qty*i.price,0);
      // نحمّل رصيد العميل الحالي (لو موجود) عشان نعرض زر استخدام النقاط
      let custBalance = 0;
      if(order.customerId){
        try{ const cs=await getDoc(doc(db,'customers',order.customerId)); if(cs.exists()) custBalance = cs.data().points || 0; }catch(e){}
      }
      // النقاط اللي العميل اختار يستخدمها وقت تقديم الطلب (لو فيه)
      let ptsApplied = Math.min(order.pointsToRedeem||0, subtotal);
      // حالة الرسم: تتعاد لما الكاشير يستخدم نقاط إضافية
      const renderPanel=()=>{
        const total = Math.max(0, subtotal - ptsApplied);
        // قاعدة عرض زر استخدام النقاط: 
        // - العميل عنده customerId
        // - رصيده (بعد ما اختاره وقت الطلب) ≥ MIN_POINTS_REDEEM
        // - لسه فيه مبلغ يدفعه (total > 0)
        const remainingPts = custBalance - (order.pointsToRedeem||0); // الرصيد المتبقي بعد اللي اتحجز وقت الطلب
        const canCashierUsePts = order.customerId && !order.cashierPtsApproved && remainingPts >= MIN_POINTS_REDEEM && total > 0;
        $('sheet-root').innerHTML=`<div class="overlay" id="ov" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()">
          <div class="sheet-head"><div><div class="sheet-sub">💰 ${t('payOrderBtn')}</div><div class="sheet-title">${order.customerName||''}</div></div><button class="close-x" id="cx">×</button></div>
          ${order.customerPhone?`<div class="num" dir="ltr" style="background:rgba(31,58,46,0.06);border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:13px;">📞 ${order.customerPhone}</div>`:''}
          <div style="background:#fff;border:1px solid var(--ivory-dark);border-radius:10px;padding:10px;margin-bottom:12px;">
            ${items.map(i=>`<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px;"><span>${i.name} ×${i.qty}</span><span class="num">${fmt(i.qty*i.price)} ${t('currency')}</span></div>`).join('')}
            <div style="display:flex;justify-content:space-between;padding:7px 0 2px;margin-top:6px;border-top:1px solid var(--ivory-dark);font-size:13px;"><span>${t('total')}</span><span class="num">${fmt(subtotal)} ${t('currency')}</span></div>
            ${ptsApplied>0?`<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:var(--gold);"><span>💎 ${t('loyaltyDiscount')}</span><span class="num">−${fmt(ptsApplied)} ${t('currency')}</span></div>`:''}
            <div style="display:flex;justify-content:space-between;padding:9px 0 2px;margin-top:6px;border-top:2px solid var(--forest);font-weight:800;font-size:15px;"><span>${t('amountToPay')}</span><span class="num" style="color:var(--forest);">${fmt(total)} ${t('currency')}</span></div>
          </div>
          ${order.customerId?`<div style="background:rgba(201,168,76,0.10);border:1px solid var(--gold);border-radius:10px;padding:9px 12px;margin-bottom:10px;font-size:12px;display:flex;justify-content:space-between;align-items:center;">
            <span style="color:rgba(26,26,26,0.65);">💎 ${t('pointsBalance')}</span><span class="num" style="font-weight:800;color:var(--gold);">${fmt(custBalance)} ${t('currency')}</span>
          </div>`:''}
          ${canCashierUsePts?`<button class="btn-secondary btn-wide" id="poc-use-pts" style="margin-bottom:10px;padding:11px;">💎 ${t('useCustomerPoints')}</button>`:''}
          ${total>0?`<!-- المبلغ المستلم + الباقي (كاش) -->
          <div style="background:rgba(31,58,46,0.06);border-radius:10px;padding:10px 12px;margin-bottom:12px;">
            <div style="font-size:11.5px;color:var(--forest);font-weight:700;margin-bottom:6px;">💵 ${t('cash')||'كاش'}</div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
              <label class="lbl" style="flex:0 0 auto;font-size:12.5px;margin:0;">${t('received')||'المستلم'}</label>
              <input class="input num" id="poc-amt" type="number" inputmode="decimal" dir="ltr" placeholder="${fmt(total)}" style="flex:1;text-align:end;">
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;">
              <span style="color:rgba(26,26,26,0.6);">${t('changeDue')||'الباقي'}</span>
              <span class="num" id="poc-change" style="font-weight:800;font-size:16px;color:var(--green);">${fmt(0)} ${t('currency')}</span>
            </div>
          </div>`:''}
          <div style="display:flex;gap:8px;">
            <button class="btn-forest" id="po-cash" style="flex:1;padding:14px 0;">💵 ${t('mCash')||'كاش'}</button>
            <button class="btn-gold" id="po-insta" style="flex:1;padding:14px 0;" ${total<=0?'disabled style="opacity:0.4;"':''}>📲 ${t('mInstapay')||'Instapay'}</button>
          </div>
          ${total<=0?`<div style="font-size:11.5px;color:rgba(26,26,26,0.55);text-align:center;margin-top:8px;">💎 ${t('loyaltyDiscount')} = 100%</div>`:''}
        </div></div>`;
        $('cx').onclick=closeSheet;
        // حساب الباقي تلقائياً
        const amtEl=$('poc-amt'), chEl=$('poc-change');
        if(amtEl && chEl){
          amtEl.oninput=()=>{ const v=parseFloat(amtEl.value)||0; const ch=Math.max(0, v - total); chEl.textContent=`${fmt(ch)} ${t('currency')}`; chEl.style.color = v>=total ? 'var(--green)' : 'var(--red)'; };
        }
        // كاش
        $('po-cash').onclick=()=>{
          if(total<=0){ finalizeOrderPayment(order,subtotal,0,ptsApplied,'cash',null,0,0); return; }
          const paid = amtEl ? (parseFloat(amtEl.value)||0) : 0;
          if(paid < total){ toast(t('insufficient'),true); return; }
          const change = paid - total;
          finalizeOrderPayment(order,subtotal,total,ptsApplied,'cash',null,change,paid);
        };
        if(total>0) $('po-insta').onclick=()=>openInstapayPay(total, dataUrl=>finalizeOrderPayment(order,subtotal,total,ptsApplied,'instapay',dataUrl||null,0,total));
        // 💎 طلب استخدام نقاط بموافقة العميل
        const usePtsBtn=$('poc-use-pts');
        if(usePtsBtn){
          usePtsBtn.onclick=async()=>{
            const wantUse = Math.min(remainingPts, Math.ceil(total));
            if(wantUse < MIN_POINTS_REDEEM){ toast(t('minPointsHint')+MIN_POINTS_REDEEM,true); return; }
            usePtsBtn.disabled=true; usePtsBtn.textContent='⏳ '+t('waitingCustomerApproval');
            try{
              const reqId='r'+Date.now();
              await updateDoc(doc(db,'customers',order.customerId),{pointsRequest:{id:reqId,amount:wantUse,cashierName:profile.name||user.email,branchId:order.branchId,status:'pending',createdAt:Date.now(),expiresAt:Date.now()+90000}});
              toast(t('requestSent'));
              const start=Date.now(); const timer=setInterval(async()=>{
                try{
                  const cs=await getDoc(doc(db,'customers',order.customerId)); const r=cs.data().pointsRequest;
                  if(!r || r.id!==reqId){ clearInterval(timer); usePtsBtn.disabled=false; usePtsBtn.textContent='💎 '+t('useCustomerPoints'); return; }
                  if(r.status==='approved'){ clearInterval(timer); ptsApplied += r.amount; order.cashierPtsApproved=true; toast(t('customerApproved')); renderPanel(); }
                  else if(r.status==='rejected'){ clearInterval(timer); usePtsBtn.disabled=false; usePtsBtn.textContent='💎 '+t('useCustomerPoints'); toast(t('customerRejected'),true); }
                  else if(Date.now()-start>90000){ clearInterval(timer); usePtsBtn.disabled=false; usePtsBtn.textContent='💎 '+t('useCustomerPoints'); toast(t('requestTimeout'),true); }
                }catch(e){ console.warn(e); }
              },2000);
            }catch(e){ console.error(e); toast(t('errorGen'),true); usePtsBtn.disabled=false; usePtsBtn.textContent='💎 '+t('useCustomerPoints'); }
          };
        }
      };
      renderPanel();
    }
    // إتمام دفع الطلب: تسجيل فاتورة + خصم نقاط مستخدمة + إضافة نقاط جديدة
    async function finalizeOrderPayment(order,subtotal,paidNow,pointsUsed,payMethod,payProof,change,paidActual){
      try{
        change = change || 0;
        paidActual = (paidActual!=null) ? paidActual : paidNow;
        const saleBranchId = order.branchId;
        const saleShiftId = (myShift&&myShift.status==='open'&&myShift.branchId===saleBranchId)?myShift.id:'';
        const createdAt=Date.now();
        const receiptNo=Number(String(createdAt).slice(-6));
        const tzo=tzOffsetMin(createdAt);
        // النقاط الجديدة المكتسبة على الجزء المدفوع (كاش/إنستا) — حسب نسبة العميل أو نسبة الفرع
        // نحمّل أحدث بيانات العميل عشان نقرأ customPointsPctByBranch إن وجد
        let custForPct = null;
        if(order.customerId){
          try{ const cs=await getDoc(doc(db,'customers',order.customerId)); if(cs.exists()) custForPct={id:cs.id,...cs.data()}; }catch(e){}
        }
        const pct = getEffectivePointsPct(custForPct, saleBranchId);
        // 🆕 v2.7.2 — Base eligibile per i punti: esclude items in offerta (già scontati)
        const eligibleSubtotalOrd = (order.items||[]).reduce((s,it)=> it.appliedOfferId ? s : s + ((it.price||0) * (it.qty||0)), 0);
        const eligibleForPtsOrd = Math.max(0, Math.min(paidNow, eligibleSubtotalOrd - (pointsUsed||0)));
        // النقاط الجديدة المكتسبة (تقريب لأعلى — حد أدنى 1 نقطة لو فيه دفع فعلي ومنتجات غير في عرض)
        const pointsEarned = eligibleForPtsOrd>0 ? Math.max(1, Math.ceil(eligibleForPtsOrd * pct / 100)) : 0;
        // احسب رصيد العميل بعد العملية (نحفظه في الفاتورة عشان يطلع في الإيصال)
        let pointsBalanceAfter = null;
        if(order.customerId){
          const csnap=await getDoc(doc(db,'customers',order.customerId));
          const curr = csnap.exists() ? (csnap.data().points||0) : 0;
          pointsBalanceAfter = Math.max(0, Math.round((curr - (pointsUsed||0) + (pointsEarned||0)) * 100) / 100);
        }
        // 1) سجّل الفاتورة
        const saleRef=await addDoc(collection(db,'sales'),{
          branchId:saleBranchId, shiftId:saleShiftId, userId:user.uid, userName:profile.name||user.email,
          items:order.items, total:subtotal, count:(order.items||[]).reduce((a,i)=>a+i.qty,0),
          receiptNo, paid:paidActual, change, payMethod, payProof:payProof||'',
          customerId:order.customerId, customerName:order.customerName, orderId:order.id,
          pointsUsed:pointsUsed||0, pointsEarned:pointsEarned||0, pointsBalanceAfter,
          createdAt, tzo
        });
        // 2) تحديث رصيد العميل (خصم المستخدم + إضافة المكتسب)
        if(order.customerId){
          await updateDoc(doc(db,'customers',order.customerId),{points:pointsBalanceAfter});
          // 3) سجل النقاط
          if(pointsUsed>0) await addDoc(collection(db,'pointsLedger'),{customerId:order.customerId,branchId:saleBranchId,type:'spend',amount:pointsUsed,saleId:saleRef.id,orderId:order.id,createdAt});
          if(pointsEarned>0) await addDoc(collection(db,'pointsLedger'),{customerId:order.customerId,branchId:saleBranchId,type:'earn',amount:pointsEarned,saleId:saleRef.id,orderId:order.id,createdAt});
        }
        // 4) علّم الطلب مدفوع
        await updateDoc(doc(db,'orders',order.id),{status:'paid',paidAt:createdAt,saleId:saleRef.id,payMethod,pointsUsed:pointsUsed||0,pointsEarned:pointsEarned||0});
        closeSheet(); toast(t('orderPaid'));
        renderCassa();
      }catch(e){ console.error(e); toast(t('errorGen'),true); }
    }

        const ctx=_orderSoundCtx;
        [0,180,360].forEach(delay=>{
          setTimeout(()=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g);g.connect(ctx.destination); o.frequency.value=880; g.gain.value=0.15; o.start(); setTimeout(()=>{o.stop();},150); },delay);
        });
      }catch(e){}
    }
    // 🎉 صوت احتفالي عند تأكيد الطلب (3 نغمات صاعدة)
    function playSuccessSound(){

        _orderSoundCtx = _orderSoundCtx || new (window.AudioContext||window.webkitAudioContext)();
        const ctx=_orderSoundCtx;
        [{f:523,d:0},{f:659,d:120},{f:784,d:240},{f:1047,d:360}].forEach(n=>{

    async function checkPendingOrders(){
      if(!user||_ordersChecking||!profile) return; _ordersChecking=true;
      try{
        // إيه الفروع اللي اليوزر مسؤول عنها؟
        const branchIds = profile.role==='admin' ? branches.map(b=>b.id) : (profile.branchIds||[]);
        if(!branchIds.length){ _ordersChecking=false; return; }
        // الكاشير يشوف بس طلبات الفرع اللي فاتح فيه وردية
        let lookBranches=branchIds;
        if(profile.role==='cashier'){
          if(!myShift||myShift.status!=='open'){ _ordersChecking=false; return; }
          lookBranches=[myShift.branchId];
        }
        // ندوّر على أقدم طلب pending في فروعنا
        let oldest=null;
        for(const bid of lookBranches){
          const qs=await getDocs(query(collection(db,'orders'),where('branchId','==',bid),where('status','==','pending')));
          qs.forEach(d=>{ const x={id:d.id,...d.data()}; if(!oldest||x.createdAt<oldest.createdAt) oldest=x; });
        }
        if(oldest && oldest.id!==_shownOrderId && !document.getElementById('order-popup-ov')){
          _shownOrderId=oldest.id; playOrderSound(); showIncomingOrder(oldest);
        }
      }catch(e){ console.error('checkPendingOrders',e); } finally{ _ordersChecking=false; }
    }

          if(order.paidByClient===true){

            const subtot = order.total||0;
            const ptsUsed = Math.min(order.pointsToRedeem||0, subtot);
            const paidActual = Math.max(0, subtot - ptsUsed);
            await finalizeOrderPayment({...order, items:order.items, total:subtot}, subtot, paidActual, ptsUsed, order.payMethod||'instapay', order.payProof||'', 0, paidActual);
            closeSheet(); _shownOrderId=null; toast(t('orderReady'));

            await updateDoc(doc(db,'orders',order.id),{status:'ready',items:order.items,total:order.total,preparedBy:user.uid,preparedByName:profile.name||user.email,preparedAt:Date.now()});

        catch(e){ console.error(e); toast(t('errorGen'),true); }
      };
    }

    async function checkPendingCustody(){
      if(!user||_custodyChecking) return; _custodyChecking=true;
      try{
        // 1) Notifiche al RECEIVER (Sara): richieste pending in entrata
        const qs=await getDocs(query(collection(db,'custodyTransfers'),where('toUserId','==',user.uid),where('status','==','pending')));
        let pend=null; qs.forEach(d=>{ if(!pend) pend={id:d.id,...d.data()}; });
        // 🆕 Guard: ignora e auto-rifiuta richieste self-directed (corrotte/legacy)
        if(pend && pend.fromUserId === pend.toUserId){
          try{
            await updateDoc(doc(db,'custodyTransfers',pend.id),{status:'rejected',rejectedAt:Date.now(),autoFixed:'self_directed'});
            console.warn('[custody] auto-fixed self-directed pending:', pend.id);
          } catch(e){ console.warn('[custody] autoFix self-directed failed:', e); }
          await loadCustodyTx();
          pend = null;
        }
        if(pend && !document.getElementById('cust-confirm-ov') && !document.getElementById('cust-sender-notif-ov')) showCustodyConfirm(pend);
        // 🆕 v2.7.1 — 2) Notifiche al SENDER (Ahmed): sue richieste rifiutate/cancellate/scadute
        // Trova richieste fromUserId === me, in stato finale negativo, e non ancora notificate
        if(!document.getElementById('cust-confirm-ov') && !document.getElementById('cust-sender-notif-ov')){
          const qs2=await getDocs(query(collection(db,'custodyTransfers'),where('fromUserId','==',user.uid)));
          let notif=null;
          qs2.forEach(d=>{
            const x={id:d.id,...d.data()};
            if(notif) return;
            if(x.notifiedSender===true) return;
            if(x.status==='rejected' || x.status==='expired_on_close'){ notif=x; }
          });
          if(notif) showCustodySenderNotification(notif);
        }
      }catch(e){ console.error('checkPendingCustody',e); } finally{ _custodyChecking=false; }
    }

            const pausedMs=pausedMsOf(shTmp,closeAt);

            const custIn=custInSum(myShift), custOut=custOutSum(myShift);
            await updateDoc(doc(db,'shifts',myShift.id),{pauses:ps,closeAt,closeCash:cc,status:'closed',salesTotal,cashTotal,instaTotal,pointsUsedTotal,workedMs,pausedMs,expectedCash,diff,custodyInTotal:custIn,custodyOutTotal:custOut});

    // ============ MAGAZZINO (المخزن: استلام + جرد) ============
    let whSubTab='receive';
    let recvCart=[]; // قائمة استلام متعددة المنتجات
    let recvSupplier=''; // المورد المختار للاستلام
    let invCounts={}; // productId -> counted (string)

    // ===== سكانر الباركود بالكاميرا (يستخدم مكتبة html5-qrcode) =====
    let _bcScanner=null;
    function stopScanner(){ if(_bcScanner){ try{ _bcScanner.stop().then(()=>{try{_bcScanner.clear();}catch(e){} _bcScanner=null;}).catch(()=>{_bcScanner=null;}); }catch(e){ _bcScanner=null; } } }
    // صوت "بيب" زي ماسح السوبر ماركت — متولّد بدون ملفات (Web Audio)
    let _audioCtx=null;
    function beep(){
      try{
        _audioCtx = _audioCtx || new (window.AudioContext||window.webkitAudioContext)();
        if(_audioCtx.state==='suspended') _audioCtx.resume();
        const o=_audioCtx.createOscillator(), g=_audioCtx.createGain();
        o.type='square'; o.frequency.value=2000; // نغمة عالية واضحة زي السوبر ماركت
        g.gain.setValueAtTime(0.0001,_audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.25,_audioCtx.currentTime+0.01);
        g.gain.exponentialRampToValueAtTime(0.0001,_audioCtx.currentTime+0.12);
        o.connect(g); g.connect(_audioCtx.destination);
        o.start(); o.stop(_audioCtx.currentTime+0.13);
      }catch(e){ /* لو المتصفح مش بيدعم الصوت، يكمّل عادي */ }
    }
    function openScanner(onResult){
      $('sheet-root').innerHTML=`<div class="overlay" id="ov" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${t('scanBarcode')}</div><div class="sheet-title">📷 ${t('scanHint')}</div></div><button class="close-x" id="cx">×</button></div>
        <div id="bc-reader" style="width:100%;border-radius:12px;overflow:hidden;background:#000;min-height:420px;max-height:75vh;"></div>
        <div id="bc-msg" style="font-size:12px;color:var(--red);margin-top:10px;text-align:center;"></div>
        <div class="field" style="margin-top:12px;"><label class="lbl">${t('barcode')}</label><input class="input num" id="bc-manual" dir="ltr" placeholder="..."></div>
        <button class="btn-secondary btn-wide" id="bc-manual-ok">✓ ${t('barcode')}</button>
      </div></div>`;
      const close=()=>{ stopScanner(); closeSheet(); };
      $('ov').onclick=close; $('cx').onclick=close;
      $('bc-manual-ok').onclick=()=>{ const v=$('bc-manual').value.trim(); if(v){ beep(); close(); onResult(v); } };
      if(typeof Html5Qrcode==='undefined'){ $('bc-msg').textContent=t('camNoAccess'); return; }
      // إطار المسح: أكبر ما يمكن (95% من أقل بُعد) لتسهيل المسح
      const qrboxFn = (vw, vh) => { const m=Math.min(vw,vh); const s=Math.floor(m*0.95); return { width:Math.max(280,s), height:Math.max(280,s) }; };
      const cfg={ fps:10, qrbox:qrboxFn, formatsToSupport:[
        Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.CODE_93,Html5QrcodeSupportedFormats.ITF,Html5QrcodeSupportedFormats.CODABAR,Html5QrcodeSupportedFormats.QR_CODE ] };
      _bcScanner=new Html5Qrcode('bc-reader');
      const ok=(txt)=>{ if(!txt)return; beep(); stopScanner(); closeSheet(); onResult(String(txt).trim()); };
      _bcScanner.start({facingMode:'environment'},cfg,ok,()=>{}).catch(()=>{
        Html5Qrcode.getCameras().then(ds=>{ if(ds&&ds.length){ _bcScanner.start(ds[0].id,cfg,ok,()=>{}).catch(()=>{ $('bc-msg').textContent=t('camNoAccess'); }); } else { $('bc-msg').textContent=t('camNoAccess'); } }).catch(()=>{ $('bc-msg').textContent=t('camNoAccess'); });
      });
    }
    // مسح باركود لإنشاء منتج جديد (من الكاشير أو المنتجات): موجود => فتح للتعديل؛ جديد => فورم بالباركود
    // البحث بالباركود بطريقة آمنة (مسافات/فراغات مش هتفرق)
    function findByBarcode(code){
      const c=String(code||'').trim();
      if(!c) return null;
      return products.find(p=>String(p.barcode||'').trim()===c);
    }
    // ============ المسح الذكي: زرار واحد بسلوك مختلف حسب الصفحة ============
    function smartScan(ctx, opts){
      openScanner(async code=>{
        const c=String(code||'').trim();
        // 🧠 Universal: prima di tutto controlla se è un QR cliente Le Coin
        // Format: JSON {t:'lecoin-cust', id:<docId>, n:<name>}
        let asCust=null;
        try{ const j=JSON.parse(c); if(j&&j.t==='lecoin-cust'&&j.id) asCust=j; }catch(e){}
        if(asCust){
          try{
            const cs=await getDoc(doc(db,'customers',asCust.id));
            if(!cs.exists()){ toast(t('customerNotFound'),true); return; }
            const cust={id:cs.id,...cs.data()};
            if(cust.suspended){ toast(t('accountSuspended'),true); return; }
            // Comportamento dipende dal context dello scanner
            if(ctx==='sell'){
              // Cassa: seleziona cliente per la vendita corrente
              currentCustomer=cust;
              toast(`🛍️ ${cust.name||''}`);
              if(activeTab==='cassa') renderCassa();
            } else if(ctx==='dashboard'){
              // Dashboard: apri profilo cliente
              openCustomerSheet(cust);
            } else {
              // Altri ctx (refund/receive/count/transfer/edit_product): avviso informativo
              // — l'utente ha scansionato un QR cliente in un contesto sbagliato
              toast(`🛍️ ${t('qrIsCustomerNotProduct').replace('{name}', cust.name||asCust.n||'')}`);
            }
            return;
          }catch(e){ console.error('[smartScan] customer QR error:',e); toast(t('customerNotFound'),true); return; }
        }
        // — منطق المنتج العادي (non era un QR cliente, prova come barcode prodotto) —
        const p=findByBarcode(c);
        // -- لو المنتج مش موجود --
        if(!p){
          if(ctx==='refund'){ toast(t('notInThisInvoice'),true); return; }
          if(ctx==='dashboard'){ toast(t('barcodeNotFound'),true); return; } // 🛡️ Dashboard: niente "crea prodotto"
          if(ctx==='edit_product' && activeTab==='products'){ prodSearch=c; renderProducts(); }
          if(confirm(t('createNewWithBarcode'))) prodForm(null, c);
          return;
        }
        // -- لو موجود: سلوك حسب الصفحة --
        if(ctx==='sell'){
          if(p.active===false){ toast(t('outOfStock'),true); return; }
          addToCart(p);
          const it=cart.find(i=>i.id===p.id);
          toast(`${pName(p)} ×${it?it.qty:1}`);
        }
        else if(ctx==='edit_product'){ toast(t('prodExistsScan')); prodForm(p); }
        else if(ctx==='receive'){ askReceiveQty(p); }
        else if(ctx==='count'){ askCountQty(p); }
        else if(ctx==='transfer'){
          const sel=$('tr-prod'); if(sel){ sel.value=p.id; sel.dispatchEvent(new Event('change')); }
          toast(`${pName(p)}`);
        }
        else if(ctx==='refund'){
          const it=opts&&opts.avail&&opts.avail.find(a=>a.productId===p.id);
          if(!it){ toast(t('notInThisInvoice'),true); return; }
          const el=$('rt-'+it.productId); const cur=parseInt(el.value)||0;
          if(cur+1>it.remain){ toast(t('nothingToReturn'),true); return; }
          el.value=cur+1; if(opts.recompute) opts.recompute();
          toast(`${pName(p)} ×${cur+1}`);
        }
        else if(ctx==='dashboard'){ showProductDetail(p); }
      });
    }
    // نافذة الجرد السريع لمنتج واحد (لما تمسح في تبويب الجرد)
    function askCountQty(p){
      const inv=inventory[p.id]||{qty:0};
      $('sheet-root').innerHTML=`<div class="overlay" id="ov" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()">

    // كارت تفاصيل المنتج للـ Dashboard
    // 📊 popup تفاصيل بطاقات الـ Dashboard (الربح / الفواتير / المنتجات المباعة)
    // customSub: نص اختياري يحل محل "لوحة التحكم" في عنوان الـ popup (مفيد لاستخدامه من شاشة الوردية)
    function showDashDetail(key, sales, customSub){
      const cur = t('currency');
      // فلتر مساعد: المبيعات الصافية (مش ملغية)
      const validSales = sales.filter(s=>!s.voided);
      const rmFn=s=>{ const m={}; (s.returns||[]).forEach(r=>(r.lines||[]).forEach(l=>m[l.productId]=(m[l.productId]||0)+l.qty)); return m; };
      const eff=s=>Math.max(0,(s.total||0)-(s.refundTotal||0));
      let title='', body='';
      if(key==='profit'){
        // breakdown الربح + أعلى المنتجات ربحاً
        let revenue=0, cogs=0, pointsDiscount=0;
        const profitByProd={}; // pid -> {qty, revenue, cost, profit, name}
        validSales.forEach(s=>{
          revenue += eff(s);
          pointsDiscount += (s.pointsUsed||0); // النقاط المستخدمة = خصم على الربح
          const rm=rmFn(s);
          (s.items||[]).forEach(it=>{
            const net=Math.max(0,it.qty-(rm[it.productId]||0)); if(net<=0)return;
            const p=products.find(x=>x.id===it.productId);
            const c=p?(p.cost||0):0;
            const rev=net*(it.price||0); const cst=net*c;
            cogs += cst;
            const pp = profitByProd[it.productId] = profitByProd[it.productId] || {qty:0,revenue:0,cost:0,name:p?pName(p):'—'};
            pp.qty+=net; pp.revenue+=rev; pp.cost+=cst;
          });
        });
        const grossProfit = revenue - cogs;
        const netProfit = grossProfit - pointsDiscount;
        const topProds = Object.entries(profitByProd).map(([pid,x])=>({pid,...x,profit:x.revenue-x.cost})).sort((a,b)=>b.profit-a.profit).slice(0,10);
        title = `📊 ${t('dashProfitTitle')}`;
        const statCard=(lbl,val,col)=>`<div style="background:#fff;border-radius:10px;padding:10px 12px;text-align:center;flex:1;min-width:0;"><div style="font-size:11px;color:rgba(26,26,26,0.55);margin-bottom:4px;">${lbl}</div><div class="num" style="font-size:16px;font-weight:800;color:${col};">${val}</div></div>`;
        // إذا فيه نقاط مستخدمة: نعرض الربح الإجمالي + خصم النقاط + الربح الصافي
        // إذا مفيش نقاط: نعرض ربح واحد بس (نفس الشكل القديم)
        let topRow;
        if(pointsDiscount>0){
          topRow = `<div style="display:flex;gap:6px;margin-bottom:8px;">
            ${statCard(t('dashRevenue'), fmt(revenue)+' '+cur, 'var(--forest)')}
            ${statCard(t('dashCosts'), fmt(cogs)+' '+cur, 'var(--red)')}
          </div>
          <div style="display:flex;gap:6px;margin-bottom:8px;">
            ${statCard(t('dashGrossProfit'), fmt(grossProfit)+' '+cur, 'var(--forest)')}
            ${statCard('💎 '+t('pointsUsed'), '− '+fmt(pointsDiscount)+' '+cur, 'var(--gold)')}
          </div>
          <div style="background:linear-gradient(135deg,var(--gold),#E8C76A);color:#fff;border-radius:12px;padding:14px;text-align:center;margin-bottom:14px;box-shadow:0 3px 12px rgba(201,168,76,0.3);">
            <div style="font-size:12px;font-weight:700;opacity:0.92;margin-bottom:4px;">${t('dashNetProfit')}</div>
            <div class="num" style="font-size:24px;font-weight:800;">${fmt(netProfit)} ${cur}</div>
          </div>`;
        } else {
          topRow = `<div style="display:flex;gap:6px;margin-bottom:12px;">
            ${statCard(t('dashRevenue'), fmt(revenue)+' '+cur, 'var(--forest)')}
            ${statCard(t('dashCosts'), fmt(cogs)+' '+cur, 'var(--red)')}
            ${statCard(t('dashNetProfit'), fmt(netProfit)+' '+cur, 'var(--gold)')}
          </div>`;
        }
        body = topRow + `
        <div style="font-size:11px;letter-spacing:0.5px;color:var(--forest);font-weight:700;margin-bottom:6px;">💎 ${t('dashTopByProfit')}</div>
        ${topProds.length===0 ? `<div class="empty">${t('dashNothingInPeriod')}</div>` : topProds.map(p=>`<button class="dash-prod-row" data-pid="${p.pid}" style="width:100%;background:#fff;border:1px solid var(--ivory-dark);border-radius:10px;padding:9px 11px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;font-family:inherit;text-align:start;">
            <div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:12.5px;">${p.name}</div><div style="font-size:11px;color:rgba(26,26,26,0.5);">${p.qty} ${t('mPcs')} · ${fmt(p.revenue)} ${cur}</div></div>
            <div class="num" style="font-weight:800;color:var(--gold);font-size:14px;white-space:nowrap;">${fmt(p.profit)} ${cur}</div>
          </button>`).join('')}`;
      } else if(key==='orders'){
        // قائمة الفواتير، الأحدث أولاً (نشمل الملغية مع علامة)
        const arr=[...sales].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
        title = `🛒 ${t('dashOrdersTitle')} (${validSales.length})`;
        body = arr.length===0 ? `<div class="empty">${t('dashNothingInPeriod')}</div>` : arr.map(s=>{
          const b=branches.find(x=>x.id===s.branchId); const bn=b?(lang==='ar'?b.nameAr:b.nameEn):'';
          const isV = !!s.voided;
          return `<button class="dash-sale-row" data-sid="${s.id}" style="width:100%;background:#fff;border:1px solid var(--ivory-dark);border-radius:10px;padding:9px 11px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;font-family:inherit;text-align:start;${isV?'opacity:0.55;':''}">
            <div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:12.5px;">#${s.receiptNo||'—'} · ${bn}${isV?` <span style="color:var(--red);font-size:10px;">[${t('voidedLbl')||'ملغية'}]</span>`:''}</div><div style="font-size:11px;color:rgba(26,26,26,0.5);">${fmtDT(s.createdAt,s.tzo)}</div></div>
            <div class="num" style="font-weight:800;color:${isV?'rgba(26,26,26,0.4)':'var(--forest)'};font-size:14px;white-space:nowrap;${isV?'text-decoration:line-through;':''}">${fmt(s.total||0)} ${cur}</div>
          </button>`;
        }).join('');
      } else if(key==='items'){
        // المنتجات المباعة مع كمية صافية وإيراد، مرتبة بالإيراد
        const agg={}; // pid -> {qty, revenue, name}
        validSales.forEach(s=>{ const rm=rmFn(s); (s.items||[]).forEach(it=>{ const net=Math.max(0,it.qty-(rm[it.productId]||0)); if(net<=0)return; const p=products.find(x=>x.id===it.productId); const a=agg[it.productId]=agg[it.productId]||{qty:0,revenue:0,name:p?pName(p):'—'}; a.qty+=net; a.revenue+=net*(it.price||0); }); });
        const arr=Object.entries(agg).map(([pid,x])=>({pid,...x})).sort((a,b)=>b.revenue-a.revenue);
        const totalQty=arr.reduce((a,x)=>a+x.qty,0);
        title = `📦 ${t('dashItemsTitle')} (${totalQty})`;
        body = `<div style="font-size:11.5px;color:rgba(26,26,26,0.55);margin-bottom:8px;">${t('dashSortedByRevenue')}</div>`+ (arr.length===0 ? `<div class="empty">${t('dashNothingInPeriod')}</div>` : arr.map(p=>`<button class="dash-prod-row" data-pid="${p.pid}" style="width:100%;background:#fff;border:1px solid var(--ivory-dark);border-radius:10px;padding:9px 11px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;font-family:inherit;text-align:start;">
          <div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:12.5px;">${p.name}</div><div style="font-size:11px;color:rgba(26,26,26,0.5);">${p.qty} ${t('mPcs')}</div></div>

        </button>`).join(''));
      } else if(key==='revenue' || key==='gross'){
        // Revenue/Gross usano la stessa logica di Sales Orders (fatture)
        const arr=[...sales].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
        const totRev = validSales.reduce((a,s)=>a + eff(s), 0);
        title = (key==='revenue'?`💰 ${t('mSalesRevenue')}`:`٪ ${t('mGrossProfit')}`) + ` (${fmt(totRev)} ${cur})`;
        body = arr.length===0 ? `<div class="empty">${t('dashNothingInPeriod')}</div>` : arr.map(s=>{
          const b=branches.find(x=>x.id===s.branchId); const bn=b?(lang==='ar'?b.nameAr:b.nameEn):'';
          const isV = !!s.voided; const netVal = eff(s);
          return `<button class="dash-sale-row" data-sid="${s.id}" style="width:100%;background:#fff;border:1px solid var(--ivory-dark);border-radius:10px;padding:9px 11px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;font-family:inherit;text-align:start;${isV?'opacity:0.55;':''}">
            <div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:12.5px;">#${s.receiptNo||'—'} · ${bn}${isV?` <span style="color:var(--red);font-size:10px;">[${t('voidedLbl')||'ملغية'}]</span>`:''}</div><div style="font-size:11px;color:rgba(26,26,26,0.5);">${fmtDT(s.createdAt,s.tzo)}</div></div>
            <div class="num" style="font-weight:800;color:${isV?'rgba(26,26,26,0.4)':'var(--forest)'};font-size:14px;white-space:nowrap;${isV?'text-decoration:line-through;':''}">${fmt(netVal)} ${cur}</div>
          </button>`;
        }).join('');
      } else if(key==='returns'){
        // فواتير ملغية + مرتجعات جزئية فقط
        const arr=sales.filter(s=>s.voided||(s.refundTotal>0)).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
        const totRet = arr.reduce((a,s)=>a + (s.voided?(s.total||0):(s.refundTotal||0)),0);
        title = `↩️ ${t('dashReturnsTitle')} (${fmt(totRet)} ${cur})`;
        body = arr.length===0 ? `<div class="empty">${t('dashNothingInPeriod')}</div>` : arr.map(s=>{
          const b=branches.find(x=>x.id===s.branchId); const bn=b?(lang==='ar'?b.nameAr:b.nameEn):'';

    // 📊 أداء منتج واحد في الفترة المختارة: إحصائيات + قائمة فواتير قابلة للنقر
    function showProductPerformance(pid, sales){
      const p = products.find(x=>x.id===pid);
      if(!p) return;
      const cur = t('currency');
      // نحسب كل فاتورة فيها المنتج: الكمية الصافية بعد المرتجعات/الإلغاء، الربح
      const rows=[]; // {sale, qty, revenue, profit}
      let totalQty=0, totalRev=0, totalCost=0;
      const cost = p.cost||0;
      sales.forEach(s=>{
        if(s.voided) return; // فاتورة ملغية بالكامل = نتجاهلها
        const items = (s.items||[]).filter(it=>it.productId===pid);
        if(!items.length) return;
        // الكميات المرتجعة لهذا المنتج
        let returnedQty=0;
        (s.returns||[]).forEach(r=>(r.lines||[]).forEach(l=>{ if(l.productId===pid) returnedQty+=(l.qty||0); }));
        let qty=0, rev=0;
        items.forEach(it=>{ qty+=it.qty||0; rev+=(it.qty||0)*(it.price||0); });
        const netQty = Math.max(0, qty - returnedQty);
        if(netQty<=0) return;
        // لو فيه ترجيع جزئي، نحسب الـ revenue المتبقي بشكل نسبي
        const netRev = qty>0 ? rev * (netQty/qty) : rev;
        const netProfit = netRev - (netQty * cost);
        rows.push({sale:s, qty:netQty, revenue:netRev, profit:netProfit});
        totalQty += netQty;
        totalRev += netRev;
        totalCost += netQty * cost;
      });
      rows.sort((a,b)=>(b.sale.createdAt||0)-(a.sale.createdAt||0));
      const totalProfit = totalRev - totalCost;
      const profitPerPiece = totalQty>0 ? (totalProfit/totalQty) : 0;
      // عرض الـ popup
      const statCard = (label,value,color)=>`<div style="background:#fff;border-radius:10px;padding:10px 12px;text-align:center;flex:1;min-width:0;"><div style="font-size:11px;color:rgba(26,26,26,0.55);margin-bottom:4px;">${label}</div><div class="num" style="font-size:17px;font-weight:800;color:${color};">${value}</div></div>`;
      $('sheet-root').innerHTML=`<div class="overlay" id="ov" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">📊 ${t('mItemPerf')}</div><div class="sheet-title">${p.name}</div></div><button class="close-x" id="cx">×</button></div>
        <div style="display:flex;gap:6px;margin-bottom:12px;">
          ${statCard(t('mProfitPerPiece'), fmt(profitPerPiece)+' '+cur, 'var(--green)')}
          ${statCard(t('mQtySoldP'), totalQty, 'var(--forest)')}
          ${statCard(t('mTotalProfit'), fmt(totalProfit)+' '+cur, 'var(--gold)')}
        </div>
        <div style="font-size:11px;letter-spacing:0.5px;color:var(--forest);font-weight:700;margin-bottom:6px;">🧾 ${t('mInvoicesInPeriod')} (${rows.length})</div>
        <div id="prodperf-list" style="max-height:55vh;overflow:auto;">
          ${rows.length===0 ? `<div class="empty">${t('mNoInvoices')}</div>` : rows.map(r=>{
            const s=r.sale; const b=branches.find(x=>x.id===s.branchId);
            const bn=b?(lang==='ar'?b.nameAr:b.nameEn):'';
            return `<button class="pp-row" data-sid="${s.id}" style="width:100%;background:#fff;border:1px solid var(--ivory-dark);border-radius:10px;padding:9px 11px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;font-family:inherit;text-align:start;">
              <div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:12.5px;">#${s.receiptNo||'—'} · ${bn}</div><div style="font-size:11px;color:rgba(26,26,26,0.5);">${fmtDT(s.createdAt,s.tzo)}</div></div>
              <div style="text-align:end;white-space:nowrap;"><div class="num" style="font-weight:700;color:var(--forest);font-size:13px;">${fmt(r.revenue)} ${cur}</div><div style="font-size:11px;color:rgba(26,26,26,0.5);">${r.qty} ${t('mPcs')}</div></div>
            </button>`;
          }).join('')}
        </div>
      </div></div>`;
      $('cx').onclick=closeSheet;
      // الضغط على فاتورة يفتحها كاملة
      document.querySelectorAll('.pp-row').forEach(btn=>btn.onclick=()=>{
        const sid=btn.dataset.sid;
        const r=rows.find(x=>x.sale.id===sid);
        if(r) showReceipt(r.sale);
      });
    }

    function scanForNewProduct(){

        prodSearch=c;
        if(activeTab==='products') renderProducts();
        if(confirm(t('createNewWithBarcode'))) prodForm(null, c);
      });
    }

        const p=findByBarcode(code);

        if(p.active===false){ toast(t('outOfStock'),true); return; }
        addToCart(p); // addToCart فيها البيب + فحص المخزون
        const it=cart.find(i=>i.id===p.id);
        toast(`${pName(p)} ×${it?it.qty:1}`);
      });
    }

      async function autoBackupBeforeReset(progressEl){

        console.log('[RESET] === Auto-backup start ===');
        try {
          const out = { app:'LeCoinPOS', version:1, exportedAt:Date.now(), preReset:true, collections:{} };
