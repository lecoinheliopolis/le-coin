            <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
              <button class="btn-secondary chk-edit" data-id="${a.id}" style="padding:5px 8px;font-size:11px;">✏️</button>
              <button class="btn-secondary chk-del" data-id="${a.id}" style="padding:5px 8px;font-size:11px;color:var(--red);border-color:rgba(192,72,72,0.3);">🗑️</button>
            </div>
          </div>`;
        }).join('');
        document.querySelectorAll('.chk-edit').forEach(b=>b.onclick=async()=>{
          const a = items.find(x=>x.id===b.dataset.id); if(a) openChalkboardForm(a);
        });
        document.querySelectorAll('.chk-del').forEach(b=>b.onclick=async()=>{
          if(!confirm(t('chalkboardDelConfirm'))) return;
          b.disabled=true;
          try{
            await deleteDoc(doc(db,'announcements',b.dataset.id));
            toast(t('chalkboardDeleted'));
            await refreshChalkboardList();
            renderChalkboard(); // refresh lavagna live
          }catch(e){ console.error(e); toast(t('errorGen'),true); b.disabled=false; }
        });
      }catch(e){ console.error('[chalkboard list]', e); list.innerHTML=`<div class="empty">${t('errorGen')}</div>`; }
    }
    function openChalkboardForm(existing){
      const isEdit = !!existing;
      const a = existing || {icon:'📢', title:'', message:'', active:true, pinned:false, expiresAt:null, branchIds:[]};
      const expiryDate = a.expiresAt ? new Date(a.expiresAt).toISOString().slice(0,10) : '';
      const iconsHtml = _CHALK_ICONS.map(ic=>`<button type="button" class="chk-ic" data-ic="${ic}" style="width:42px;height:42px;border-radius:10px;border:2px solid ${a.icon===ic?'var(--gold)':'var(--ivory-dark)'};background:${a.icon===ic?'rgba(201,168,76,0.15)':'#fff'};font-size:20px;cursor:pointer;font-family:inherit;">${ic}</button>`).join('');
      const esc = s => String(s==null?'':s).replace(/"/g,'&quot;');
      // 🆕 v2.7.0 Stage 5b — Multi-filiale (default vuoto, deve scegliere)
      const isAllBr = Array.isArray(a.branchIds) && a.branchIds.includes('all');
      const activeBrs = branches.filter(b=>b.active!==false);
      const brChecks = activeBrs.map(b=>{
        const ck = !isAllBr && Array.isArray(a.branchIds) && a.branchIds.includes(b.id);
        return `<label style="display:flex;align-items:center;gap:6px;padding:7px 10px;border:1px solid ${ck?'var(--forest)':'var(--ivory-dark)'};border-radius:8px;background:${ck?'rgba(31,58,46,0.06)':'#fff'};cursor:pointer;font-size:12px;${isAllBr?'opacity:0.5;pointer-events:none;':''}">
          <input type="checkbox" class="chk-br" data-bid="${b.id}" ${ck?'checked':''} style="width:14px;height:14px;cursor:pointer;">
          <span>${esc(lang==='ar'?b.nameAr:b.nameEn)}</span>
        </label>`;
      }).join('');
      $('sheet-root').innerHTML=`<div class="overlay" id="ov2" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${isEdit?'✏️':'➕'}</div><div class="sheet-title">${isEdit?t('chalkboardEdit'):t('chalkboardNew')}</div></div><button class="close-x" id="cx">×</button></div>
        <div class="card" style="display:grid;gap:12px;">
          <div>
            <label class="lbl">${t('chalkboardIcon')}</label>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">${iconsHtml}</div>
          </div>
          <div class="field" style="margin:0;"><label class="lbl">${t('chalkboardTitleField')} 🇪🇬 (عربي)</label><input class="input" id="chk-title-ar" dir="rtl" value="${esc(a.titleAr||a.title||'')}" maxlength="60" placeholder="${t('chalkboardTitlePlaceholder')}"></div>
          <div class="field" style="margin:0;"><label class="lbl">${t('chalkboardTitleField')} 🇬🇧 (English)</label><input class="input" id="chk-title-en" dir="ltr" value="${esc(a.titleEn||a.title||'')}" maxlength="60" placeholder="${t('chalkboardTitlePlaceholder')}"></div>
          <div class="field" style="margin:0;"><label class="lbl">${t('chalkboardMessageField')} 🇪🇬 (عربي)</label><textarea class="input" id="chk-message-ar" dir="rtl" rows="2" maxlength="200" style="resize:vertical;font-family:inherit;" placeholder="${t('chalkboardMessagePlaceholder')}">${esc(a.messageAr||a.message||'')}</textarea></div>
          <div class="field" style="margin:0;"><label class="lbl">${t('chalkboardMessageField')} 🇬🇧 (English)</label><textarea class="input" id="chk-message-en" dir="ltr" rows="2" maxlength="200" style="resize:vertical;font-family:inherit;" placeholder="${t('chalkboardMessagePlaceholder')}">${esc(a.messageEn||a.message||'')}</textarea></div>
          <!-- 🆕 v2.7.0 Stage 5b — Filiali (multi-select, default vuoto) -->
          <div>
            <label class="lbl">${t('offerBranches')}</label>
            <label style="display:flex;align-items:center;gap:6px;padding:7px 10px;border:1px solid ${isAllBr?'var(--gold)':'var(--ivory-dark)'};border-radius:8px;background:${isAllBr?'rgba(201,168,76,0.1)':'#fff'};cursor:pointer;font-size:12px;margin:6px 0;font-weight:700;">
              <input type="checkbox" id="chk-all" ${isAllBr?'checked':''} style="width:14px;height:14px;cursor:pointer;">
              <span>🌍 ${t('allBranches')}</span>
            </label>
            <div id="chk-brwrap" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">${brChecks}</div>
          </div>
          <div class="field" style="margin:0;"><label class="lbl">${t('chalkboardExpiry')}</label><input class="input" id="chk-expiry" type="date" value="${expiryDate}"><div style="font-size:10.5px;color:rgba(26,26,26,0.5);margin-top:3px;">${t('chalkboardExpiryHint')}</div></div>
          <div style="display:flex;gap:14px;flex-wrap:wrap;">
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:600;"><input type="checkbox" id="chk-active" ${a.active!==false?'checked':''} style="width:16px;height:16px;cursor:pointer;"> ${t('chalkboardActive')}</label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:600;"><input type="checkbox" id="chk-pinned" ${a.pinned?'checked':''} style="width:16px;height:16px;cursor:pointer;"> 📌 ${t('chalkboardPinned')}</label>
          </div>
          <button class="btn-forest btn-wide" id="chk-save" style="margin-top:6px;">✓ ${isEdit?t('save'):t('chalkboardCreate')}</button>
          <button class="btn-secondary btn-wide" id="chk-cancel">${t('cancel')}</button>
        </div>
      </div></div>`;
      $('ov2').onclick=closeSheet; $('cx').onclick=closeSheet;
      let pickedIcon = a.icon;
      document.querySelectorAll('.chk-ic').forEach(b=>b.onclick=()=>{
        pickedIcon = b.dataset.ic;
        document.querySelectorAll('.chk-ic').forEach(x=>{ x.style.border = '2px solid var(--ivory-dark)'; x.style.background='#fff'; });
        b.style.border='2px solid var(--gold)'; b.style.background='rgba(201,168,76,0.15)';
      });
      // "Tutte le filiali" toggle: disabilita le checkbox singole
      $('chk-all').onchange=()=>{
        const allOn = $('chk-all').checked;
        document.querySelectorAll('.chk-br').forEach(cb=>{ cb.checked=false; cb.parentElement.style.opacity=allOn?'0.5':'1'; cb.parentElement.style.pointerEvents=allOn?'none':'auto'; });
        $('chk-all').parentElement.style.background = allOn?'rgba(201,168,76,0.1)':'#fff';
        $('chk-all').parentElement.style.borderColor = allOn?'var(--gold)':'var(--ivory-dark)';
      };
      $('chk-cancel').onclick=()=>{ closeSheet(); openChalkboardManager(); };
      $('chk-save').onclick=async()=>{
        const titleAr=$('chk-title-ar').value.trim();
        const titleEn=$('chk-title-en').value.trim();
        const messageAr=$('chk-message-ar').value.trim();
        const messageEn=$('chk-message-en').value.trim();
        if(!titleAr && !titleEn){ toast(t('chalkboardTitleRequired'),true); return; }
        // Fallback: se una lingua è vuota, usa l'altra
        const fTitleAr = titleAr || titleEn;
        const fTitleEn = titleEn || titleAr;
        const fMsgAr = messageAr || messageEn;
        const fMsgEn = messageEn || messageAr;
        // 🆕 Stage 5b — Verifica filiali (vuoto NON ammesso, come decisione Dottore)
        const allOn = $('chk-all').checked;
        let branchIds = [];
        if(allOn) branchIds = ['all'];
        else { document.querySelectorAll('.chk-br:checked').forEach(cb=>branchIds.push(cb.dataset.bid)); }
        if(!branchIds.length){ toast(t('offerBranchRequired'),true); return; }
        const exp = $('chk-expiry').value;
        const expTs = exp ? new Date(exp+'T23:59:59').getTime() : null;
        const active = $('chk-active').checked;
        const pinned = $('chk-pinned').checked;
        const btn=$('chk-save'); btn.disabled=true; btn.textContent='...';
        try{
          // Campi bilingue + title/message legacy (per retrocompatibilità con vecchio codice)
          const payload = { icon:pickedIcon, titleAr:fTitleAr, titleEn:fTitleEn, messageAr:fMsgAr, messageEn:fMsgEn, title:fTitleAr, message:fMsgAr, active, pinned, expiresAt:expTs, branchIds };
          if(isEdit){
            await updateDoc(doc(db,'announcements',existing.id), payload);
            toast(t('chalkboardUpdated'));
          } else {
            await addDoc(collection(db,'announcements'), { ...payload, createdAt:Date.now(), createdBy:user.uid });
            toast(t('chalkboardCreated'));
          }
          closeSheet(); openChalkboardManager();
          renderChalkboard(); // refresh lavagna live
        }catch(e){ console.error(e); toast(t('errorGen'),true); btn.disabled=false; btn.textContent='✓ '+(isEdit?t('save'):t('chalkboardCreate')); }
      };
    }

    function openSettings(){
      const roleLabel=t(profile.role);
      $('sheet-root').innerHTML=`<div class="overlay" id="ov" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${t('settings')}</div><div class="sheet-title">${profile.name||user.email}</div></div><button class="close-x" id="cx">×</button></div>
        <div class="card" style="display:grid;gap:8px;font-size:13px;">
          <div style="display:flex;justify-content:space-between;"><span style="color:rgba(26,26,26,0.6);">${t('email')}</span><span class="num">${user.email}</span></div>
          <div style="display:flex;justify-content:space-between;"><span style="color:rgba(26,26,26,0.6);">${t('role')}</span><span style="font-weight:600;color:var(--forest);">${roleLabel}</span></div>
        </div>
        <div class="card" style="display:grid;gap:10px;">
          <div style="font-size:11px;letter-spacing:0.5px;color:var(--forest);font-weight:700;">👤 ${t('myAccount')}</div>
          <div class="field" style="margin:0;"><label class="lbl">${t('name')}</label><input class="input" id="acc-name" value="${(profile.name||'').replace(/"/g,'&quot;')}"></div>
          <button class="btn-secondary btn-wide" id="acc-name-save">${t('changeName')}</button>
          <div style="height:6px;"></div>
          <div style="font-size:11px;letter-spacing:0.5px;color:var(--forest);font-weight:700;">🔑 ${t('changePassword')}</div>
          <div class="field" style="margin:0;"><label class="lbl">${t('currentPassword')}</label><input class="input" id="acc-cur" type="password" autocomplete="current-password"></div>
          <div class="field" style="margin:0;"><label class="lbl">${t('newPassword')}</label><input class="input" id="acc-new" type="password" autocomplete="new-password"></div>
          <div class="field" style="margin:0;"><label class="lbl">${t('newPasswordAgain')}</label><input class="input" id="acc-new2" type="password" autocomplete="new-password"></div>
          <button class="btn-forest btn-wide" id="acc-pwd-save">✓ ${t('changePassword')}</button>
        </div>
        ${profile.role==='admin'?`<div class="card" style="display:grid;gap:10px;">
          <div style="font-size:11px;letter-spacing:0.5px;color:var(--forest);font-weight:700;">📲 ${t('instapayTitle')}</div>
          <div id="ipay-prev" style="text-align:center;${instapayCfg.qrDataUrl?'':'display:none;'}background:#fff;border:1px solid var(--ivory-dark);border-radius:10px;padding:10px;">
            ${instapayCfg.qrDataUrl?`<img src="${instapayCfg.qrDataUrl}" style="max-width:200px;width:100%;height:auto;border-radius:6px;">`:''}
          </div>
          <button class="btn-secondary btn-wide" id="ipay-up-btn">📷 ${t('uploadQr')}</button>
          <input type="file" id="ipay-up" accept="image/*" class="hidden">
          <div class="field" style="margin:0;"><label class="lbl">${t('instapayAlias')}</label><input class="input" id="ipay-alias" value="${(instapayCfg.alias||'').replace(/"/g,'&quot;')}" dir="ltr" placeholder="amanyfadil@instapay"></div>
          <button class="btn-forest btn-wide" id="ipay-save">✓ ${t('saveCfg')}</button>
        </div>
        <div class="card" style="display:grid;gap:8px;">
          <div style="font-size:11px;letter-spacing:0.5px;color:var(--forest);font-weight:700;">💾 ${t('backupTitle')}</div>
          <div style="font-size:11px;color:rgba(26,26,26,0.55);margin-bottom:4px;">${t('backupHint')}</div>
          <button class="btn-forest btn-wide" id="exp-btn">💾 ${t('exportData')}</button>
          <button class="btn-secondary btn-wide" id="imp-btn">📥 ${t('importData')}</button>
          <input type="file" id="imp-input" accept="application/json,.json" class="hidden">
        </div>
        <div class="card" style="display:grid;gap:8px;">
          <div style="font-size:11px;letter-spacing:0.5px;color:var(--forest);font-weight:700;">🧹 ${t('cleanGhostTitle')}</div>
          <div style="font-size:11px;color:rgba(26,26,26,0.55);">${t('cleanGhostHint')}</div>
          <button class="btn-secondary btn-wide" id="ghost-btn">🧹 ${t('cleanGhostBtn')}</button>
        </div>
        <div class="card" style="display:grid;gap:8px;border:1px solid rgba(192,72,72,0.3);">
          <div style="font-size:11px;letter-spacing:0.5px;color:var(--red);font-weight:700;">🧨 ${t('dataResetTitle')}</div>
          <div style="font-size:11px;color:rgba(26,26,26,0.55);margin-bottom:4px;">${t('dataResetSubtitle')}</div>
          <button class="btn-secondary btn-wide" id="rs-open-center" style="color:var(--red);border-color:rgba(192,72,72,0.4);background:rgba(192,72,72,0.04);">🧨 ${t('openDataResetCenter')}</button>
        </div>`:''}
        <button class="btn-secondary btn-wide" id="logout-btn" style="color:var(--red);border-color:rgba(192,72,72,0.3);">${t('logout')}</button>
      </div></div>`;
      $('ov').onclick=closeSheet;$('cx').onclick=closeSheet;
      if(profile.role==='admin'){
        $('exp-btn').onclick=()=>exportAllData($('exp-btn'));
        $('imp-btn').onclick=()=>$('imp-input').click();
        $('imp-input').onchange=e=>{ const f=e.target.files[0]; if(f) importAllData(f,$('imp-btn')); };
        $('rs-open-center')&&($('rs-open-center').onclick=()=>{ closeSheet(); openDataResetCenter(); });
        $('ghost-btn')&&($('ghost-btn').onclick=()=>cleanGhostInventory($('ghost-btn')));
        // إعدادات Instapay
        let pendingIpayQr=instapayCfg.qrDataUrl||'';
        $('ipay-up-btn')&&($('ipay-up-btn').onclick=()=>$('ipay-up').click());
        $('ipay-up')&&($('ipay-up').onchange=async e=>{ const f=e.target.files&&e.target.files[0]; if(!f) return; try{ pendingIpayQr=await compress(f,500,0.85); const pv=$('ipay-prev'); pv.innerHTML=`<img src="${pendingIpayQr}" style="max-width:200px;width:100%;height:auto;border-radius:6px;">`; pv.style.display='block'; }catch(err){ console.error(err); toast(t('errorGen'),true); } });
        $('ipay-save')&&($('ipay-save').onclick=async()=>{
          const b=$('ipay-save'); b.disabled=true; b.textContent='...';
          try{ const alias=$('ipay-alias').value.trim(); await setDoc(doc(db,'settings','instapay'),{qrDataUrl:pendingIpayQr,alias},{merge:true}); instapayCfg={qrDataUrl:pendingIpayQr,alias}; toast(t('saved')); }
          catch(err){ console.error(err); toast(t('errorGen'),true); }
          finally{ b.disabled=false; b.textContent='✓ '+t('saveCfg'); }
        });
      }
      $('acc-name-save').onclick=async()=>{ const b=$('acc-name-save'); b.disabled=true; const ok=await changeMyName($('acc-name').value); b.disabled=false; };
      $('acc-pwd-save').onclick=()=>changeMyPassword($('acc-cur').value, $('acc-new').value, $('acc-new2').value, $('acc-pwd-save'));
      $('logout-btn').onclick=async()=>{ await signOut(auth); closeSheet(); };
    }

    // ============ INIT ============
    refreshLoginLabels(); applyLang();
    // 🆕 v2.7.2 — Global handler per "async response" errors da extension/service worker
    window.addEventListener('unhandledrejection', ev => {
      const msg = ev.reason?.message || String(ev.reason);
      if(msg.includes('listener indicated an asynchronous response') || msg.includes('message channel closed')){
        console.warn('[sw] Ignored async listener error (Chrome extension issue):', msg);
        ev.preventDefault(); // non propagate
      }
    });
    // Pulisci service worker vecchi e cache in modo sicuro (no "async response" errors)
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations()
        .then(regs => {
          regs.forEach(r => {
            r.unregister().catch(err => console.warn('[sw] unregister error:', err.message));
          });
        })
        .catch(err => console.warn('[sw] getRegistrations error:', err.message));
    }
    if('caches' in window){
      caches.keys()
        .then(keys => {
          Promise.all(keys.map(k => caches.delete(k).catch(()=>null)))
            .catch(err => console.warn('[cache] delete error:', err.message));
        })
        .catch(err => console.warn('[cache] keys error:', err.message));
    }
  </script>
</body>
</html>
