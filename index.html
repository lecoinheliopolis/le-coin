<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1F3A2E">
  <link rel="manifest" href="manifest.json">
  <title>Le Coin · نقطة البيع</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --forest:#1F3A2E; --forest-dark:#152821; --gold:#C9A84C; --gold-light:#E0C880;
      --ivory:#FAF6EE; --ivory-dark:#F0EADC; --charcoal:#1A1A1A;
      --red:#C04848; --green:#3D7355; --amber:#D88E2A;
    }
    body { font-family:'Tajawal',system-ui,sans-serif; background:var(--ivory); color:var(--charcoal); min-height:100vh; padding-bottom:70px; }
    .num { font-family:'JetBrains Mono',monospace; font-variant-numeric:tabular-nums; direction:ltr; unicode-bidi:embed; }
    .serif { font-family:'Cormorant Garamond',serif; font-style:italic; }
    .ltr { direction:ltr; text-align:left; }
    .hidden { display:none !important; }

    header { background:var(--forest); color:var(--ivory); padding:14px 18px; position:sticky; top:0; z-index:20; border-bottom:1px solid rgba(201,168,76,0.2); }
    .header-inner { display:flex; justify-content:space-between; align-items:center; max-width:900px; margin:0 auto; }
    .brand-name { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:26px; font-weight:500; }
    .brand-tag { font-size:11px; letter-spacing:1px; color:var(--gold); font-weight:600; margin-right:8px; }
    .header-right { display:flex; align-items:center; gap:12px; }
    .shift-ind { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--gold); font-weight:600; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .dot { width:7px; height:7px; border-radius:50%; background:var(--gold); animation:pulse 2s ease-in-out infinite; }
    .gear { background:none; border:none; color:var(--ivory); cursor:pointer; font-size:20px; opacity:0.85; }

    main { max-width:900px; margin:0 auto; padding:16px; }
    .card { background:white; border-radius:16px; padding:16px; box-shadow:0 1px 2px rgba(0,0,0,0.04),0 4px 12px rgba(0,0,0,0.04); margin-bottom:14px; }
    .card-title { font-size:11px; letter-spacing:1px; color:var(--forest); font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:6px; }

    .scan-mock { position:relative; height:110px; background:var(--forest-dark); border-radius:10px; overflow:hidden; margin-bottom:10px; display:flex; align-items:center; justify-content:center; }
    .scan-mock span { color:rgba(250,246,238,0.5); font-size:13px; }
    .corner { position:absolute; width:18px; height:18px; }
    @keyframes scanline { 0%{transform:translateY(0);opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{transform:translateY(90px);opacity:0} }
    .scanline { position:absolute; left:10px; right:10px; top:10px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); box-shadow:0 0 12px var(--gold); animation:scanline 2.4s ease-in-out infinite; }
    .reader-box { width:100%; border-radius:12px; overflow:hidden; background:var(--forest-dark); }
    .reader-box video { width:100% !important; height:auto !important; border-radius:12px; }
    .reader-box [id$="__dashboard_section_csr"] button, .reader-box [id$="__dashboard_section_swaplink"], .reader-box [id$="__camera_selection"], .reader-box [id$="__filescan_input"] { display:none !important; }
    .reader-box [id$="__dashboard"] { padding:0 !important; }

    .input { width:100%; padding:10px 12px; font-size:14px; border:1px solid var(--ivory-dark); border-radius:10px; background:var(--ivory); outline:none; color:var(--charcoal); font-family:inherit; }
    .input:focus { border-color:var(--gold); }
    input[type=number].input::-webkit-outer-spin-button, input[type=number].input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
    .input::placeholder { color:rgba(26,26,26,0.35); }
    label.lbl { font-size:10px; letter-spacing:0.5px; color:rgba(26,26,26,0.6); font-weight:600; margin-bottom:5px; display:block; }

    .btn-forest { background:var(--forest); color:var(--ivory); border:none; padding:12px 18px; border-radius:10px; font-weight:600; font-size:13px; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
    .btn-gold { background:var(--gold); color:var(--forest-dark); border:none; padding:12px 22px; border-radius:12px; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 4px 12px rgba(201,168,76,0.3); }
    .btn-secondary { background:white; color:var(--charcoal); border:1px solid var(--ivory-dark); padding:10px 16px; border-radius:10px; font-weight:600; font-size:12px; cursor:pointer; font-family:inherit; }
    .btn-cam { background:rgba(201,168,76,0.12); color:var(--forest); border:1px dashed rgba(201,168,76,0.5); padding:10px; border-radius:10px; font-weight:600; font-size:12px; cursor:pointer; font-family:inherit; width:100%; display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:10px; }
    .btn-wide { width:100%; justify-content:center; }

    .chips { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; scrollbar-width:none; }
    .chips::-webkit-scrollbar { display:none; }
    .chip { flex-shrink:0; padding:6px 12px; border-radius:999px; border:1px solid var(--ivory-dark); background:white; color:var(--charcoal); font-size:11px; font-weight:500; cursor:pointer; white-space:nowrap; font-family:inherit; }
    .chip.active { background:var(--forest); color:var(--ivory); border-color:var(--forest); }

    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
    .ptile { background:white; border:1px solid var(--ivory-dark); border-radius:12px; padding:12px; text-align:right; cursor:pointer; min-height:92px; display:flex; flex-direction:column; justify-content:space-between; position:relative; font-family:inherit; }
    .ptile:disabled { opacity:0.4; cursor:not-allowed; }
    .ptile .cat { font-size:9px; color:rgba(26,26,26,0.6); margin-bottom:3px; }
    .ptile .pname { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:14px; font-weight:500; line-height:1.15; direction:ltr; text-align:left; }
    .ptile .prow { display:flex; justify-content:space-between; align-items:flex-end; margin-top:8px; }
    .ptile .price { font-size:15px; font-weight:600; color:var(--forest); }
    .badge-q { position:absolute; top:6px; left:6px; background:var(--gold); color:var(--forest-dark); font-size:10px; font-weight:700; padding:2px 6px; border-radius:999px; }

    .citem { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--ivory-dark); }
    .citem:last-child { border-bottom:none; }
    .cname { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:14px; font-weight:500; flex:1; direction:ltr; text-align:left; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .qctrl { display:flex; align-items:center; gap:4px; background:var(--ivory); border-radius:999px; padding:2px; }
    .qbtn { width:26px; height:26px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; }
    .qbtn.minus { background:white; color:var(--charcoal); }
    .qbtn.plus { background:var(--forest); color:var(--ivory); }

    .sticky-bar { position:fixed; bottom:60px; left:0; right:0; background:white; border-top:1px solid var(--ivory-dark); padding:12px; box-shadow:0 -4px 16px rgba(0,0,0,0.06); z-index:30; }
    .sticky-inner { max-width:900px; margin:0 auto; display:flex; align-items:center; gap:14px; }

    nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid var(--ivory-dark); z-index:40; }
    .nav-inner { max-width:900px; margin:0 auto; display:grid; grid-template-columns:repeat(5,1fr); }
    .nav-btn { background:transparent; border:none; padding:9px 2px 7px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; color:rgba(26,26,26,0.5); position:relative; font-family:inherit; }
    .nav-btn.active { color:var(--forest); }
    .nav-btn.active::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:30px; height:3px; background:var(--gold); border-radius:0 0 4px 4px; }
    .nav-btn .ico { font-size:18px; }
    .nav-btn .lbl2 { font-size:10px; font-weight:500; }
    .nav-btn.active .lbl2 { font-weight:700; }

    .overlay { position:fixed; inset:0; background:rgba(26,26,26,0.55); display:flex; align-items:flex-end; justify-content:center; z-index:50; }
    @keyframes sheetin { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .sheet { background:var(--ivory); border-radius:20px 20px 0 0; padding:22px; width:100%; max-width:480px; max-height:92vh; overflow-y:auto; animation:sheetin 0.3s cubic-bezier(0.32,0.72,0,1); }
    .sheet-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
    .sheet-sub { font-size:11px; letter-spacing:0.5px; color:var(--gold); font-weight:700; }
    .sheet-title { font-size:22px; font-weight:600; color:var(--forest); }
    .close-x { background:none; border:none; cursor:pointer; font-size:22px; color:var(--charcoal); }

    @keyframes toastin { from{transform:translateX(-50%) translateY(20px);opacity:0} to{transform:translateX(-50%) translateY(0);opacity:1} }
    .toast { position:fixed; bottom:130px; left:50%; transform:translateX(-50%); background:var(--forest); color:var(--ivory); padding:10px 18px; border-radius:999px; font-size:13px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,0.2); z-index:100; animation:toastin 0.3s ease-out; max-width:90%; text-align:center; }

    .empty { text-align:center; padding:24px 16px; color:rgba(26,26,26,0.45); font-size:13px; }
    .mini-stat { background:var(--forest); color:var(--ivory); border-radius:12px; padding:12px; }
    .mini-stat.white { background:white; color:var(--charcoal); }
    .mini-stat .ms-label { font-size:9px; letter-spacing:0.5px; font-weight:600; }
    .mini-stat .ms-value { font-size:22px; font-weight:700; margin-top:4px; }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:14px; }

    .field { margin-bottom:12px; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .pcard { background:white; border-radius:10px; padding:10px; cursor:pointer; margin-bottom:6px; }
    .pcard .ptop { display:flex; justify-content:space-between; margin-bottom:6px; }
    .pcard .pcells { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .cell .cl { font-size:9px; color:rgba(26,26,26,0.6); font-weight:600; }
    .cell .cv { font-size:12px; font-weight:600; margin-top:1px; }
    .toggle { position:relative; width:44px; height:26px; border-radius:999px; border:none; cursor:pointer; padding:0; }
    .toggle .thumb { position:absolute; top:3px; right:3px; width:20px; height:20px; background:var(--ivory); border-radius:50%; transition:transform 0.2s; }

    .flow-row { display:flex; justify-content:space-between; align-items:flex-start; padding:4px 0; }
    .flow-row .fl-label { font-size:12px; font-weight:500; }
    .flow-row .fl-sub { font-size:9px; color:rgba(26,26,26,0.55); }
    .kpi { background:white; border-radius:10px; padding:10px; box-shadow:0 1px 2px rgba(0,0,0,0.04); }
    .kpi.accent { background:var(--forest-dark); color:var(--ivory); }
    .kpi .k-label { font-size:9px; font-weight:600; }
    .kpi .k-value { font-size:18px; font-weight:700; margin-top:3px; }
    .kpi .k-sub { font-size:9px; margin-top:1px; }
    .bar-track { height:4px; background:var(--ivory); border-radius:2px; overflow:hidden; margin-top:3px; }
    .bar-fill { height:100%; transition:width 0.4s; }
    .past-shift { background:var(--ivory); border-radius:8px; padding:8px; display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .ps-num { width:30px; height:30px; border-radius:6px; background:white; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <span class="brand-name">Le Coin</span>
        <span class="brand-tag" id="section-label">الكاشير</span>
      </div>
      <div class="header-right">
        <div class="shift-ind hidden" id="shift-ind"><span class="dot"></span><span id="shift-ind-num"></span></div>
        <button class="gear" id="gear-btn">⚙</button>
      </div>
    </div>
  </header>

  <main>
    <!-- ============ CASSA ============ -->
    <div id="tab-cassa">
      <div class="card">
        <div class="card-title">📷 الماسح الضوئي</div>
        <div class="scan-mock" id="mock-cassa">
          <div class="corner" style="top:10px;right:10px;border-top:2px solid var(--gold);border-right:2px solid var(--gold)"></div>
          <div class="corner" style="top:10px;left:10px;border-top:2px solid var(--gold);border-left:2px solid var(--gold)"></div>
          <div class="corner" style="bottom:10px;right:10px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold)"></div>
          <div class="corner" style="bottom:10px;left:10px;border-bottom:2px solid var(--gold);border-left:2px solid var(--gold)"></div>
          <div class="scanline"></div><span>المسح بالكاميرا متوقف</span>
        </div>
        <div id="reader-cassa" class="reader-box hidden"></div>
        <button class="btn-cam" id="cam-cassa">📷 تشغيل الكاميرا</button>
        <div style="display:flex;gap:8px;">
          <input class="input num ltr" id="bc-cassa" placeholder="كود الباركود (7000005)" style="flex:1;">
          <button class="btn-forest" id="add-cassa">إضافة</button>
        </div>
      </div>
      <div class="chips" id="cassa-chips"></div>
      <div class="grid" id="cassa-grid"></div>
      <div class="card hidden" id="cart-card">
        <div class="card-title">🛒 السلة <span id="cart-count" style="color:rgba(26,26,26,0.5);font-weight:500;margin-right:auto;"></span></div>
        <div id="cart-items"></div>
        <div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--ivory-dark);font-size:12px;color:var(--gold);display:flex;justify-content:space-between;font-weight:600;"><span>الربح</span><span class="num" id="cart-margin"></span></div>
      </div>
    </div>

    <!-- ============ CARICO ============ -->
    <div id="tab-carico" class="hidden">
      <div class="card">
        <div class="card-title">📄 المستند</div>
        <div class="row2">
          <div class="field"><label class="lbl">المورد</label><select class="input" id="load-supplier"><option value="">— اختر —</option><option>كافيه إيطاليا</option><option>حلواني المعادي</option><option>فريش ماركت مصر الجديدة</option><option>بواسون للتوزيع</option><option>أخرى</option></select></div>
          <div class="field" style="margin-bottom:0;"><label class="lbl">رقم الفاتورة</label><input class="input num ltr" id="load-doc" placeholder="2026/0142"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">📷 مسح البضائع المستلمة</div>
        <div class="scan-mock" id="mock-carico">
          <div class="corner" style="top:10px;right:10px;border-top:2px solid var(--gold);border-right:2px solid var(--gold)"></div>
          <div class="corner" style="top:10px;left:10px;border-top:2px solid var(--gold);border-left:2px solid var(--gold)"></div>
          <div class="corner" style="bottom:10px;right:10px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold)"></div>
          <div class="corner" style="bottom:10px;left:10px;border-bottom:2px solid var(--gold);border-left:2px solid var(--gold)"></div>
          <div class="scanline"></div><span>المسح بالكاميرا متوقف</span>
        </div>
        <div id="reader-carico" class="reader-box hidden"></div>
        <button class="btn-cam" id="cam-carico">📷 تشغيل الكاميرا</button>
        <div style="display:flex;gap:8px;">
          <input class="input num ltr" id="bc-carico" placeholder="كود الباركود" style="flex:1;">
          <button class="btn-forest" id="add-carico">إضافة</button>
        </div>
      </div>
      <div class="chips" id="carico-chips"></div>
      <div class="grid" id="carico-grid"></div>
      <div class="card hidden" id="load-card">
        <div class="card-title">📦 الاستلام <span id="load-count" style="color:rgba(26,26,26,0.5);font-weight:500;margin-right:auto;"></span></div>
        <div id="load-items"></div>
      </div>
    </div>

    <!-- ============ PRODOTTI ============ -->
    <div id="tab-prodotti" class="hidden">
      <div class="stat-grid" style="grid-template-columns:1fr 1fr;">
        <div class="mini-stat"><div class="ms-label" style="color:var(--gold)">قيمة المخزون</div><div class="ms-value num" id="stat-value">0</div><div style="font-size:10px;color:rgba(250,246,238,0.7)">ج.م</div></div>
        <div class="mini-stat white"><div class="ms-label" style="color:rgba(26,26,26,0.6)">النشطة</div><div class="ms-value num" id="stat-active">0</div></div>
      </div>
      <div class="card">
        <input class="input" id="prod-search" placeholder="ابحث بالاسم أو الباركود..." style="margin-bottom:10px;">
        <div class="chips" id="status-chips" style="margin-bottom:0;">
          <button class="chip active" data-status="active">نشط</button>
          <button class="chip" data-status="all">الكل</button>
          <button class="chip" data-status="inactive">غير نشط</button>
        </div>
      </div>
      <div id="prod-list"></div>
    </div>

    <!-- ============ TURNO ============ -->
    <div id="tab-turno" class="hidden"></div>

    <!-- ============ REPORT ============ -->
    <div id="tab-report" class="hidden"></div>
  </main>

  <div class="sticky-bar hidden" id="cassa-bar">
    <div class="sticky-inner">
      <div style="flex:1;"><div style="font-size:10px;color:rgba(26,26,26,0.6);font-weight:600;">الإجمالي</div><div class="num" style="font-size:24px;font-weight:700;color:var(--forest);" id="grand-total">0</div></div>
      <button class="btn-gold" id="checkout-btn">💰 تحصيل</button>
    </div>
  </div>
  <div class="sticky-bar hidden" id="load-bar">
    <div class="sticky-inner">
      <div style="flex:1;"><div style="font-size:10px;color:rgba(26,26,26,0.6);font-weight:600;">إجمالي الاستلام</div><div class="num" style="font-size:22px;font-weight:700;color:var(--forest);" id="load-total">0</div></div>
      <button class="btn-gold" id="confirm-load-btn">✓ تأكيد</button>
    </div>
  </div>

  <button class="btn-gold hidden" id="fab-new" style="position:fixed;bottom:76px;left:16px;z-index:25;border-radius:999px;padding:12px 18px;">+ جديد</button>

  <nav>
    <div class="nav-inner">
      <button class="nav-btn active" data-tab="cassa"><span class="ico">🛒</span><span class="lbl2">الكاشير</span></button>
      <button class="nav-btn" data-tab="carico"><span class="ico">🚚</span><span class="lbl2">استلام</span></button>
      <button class="nav-btn" data-tab="prodotti"><span class="ico">📦</span><span class="lbl2">المنتجات</span></button>
      <button class="nav-btn" data-tab="turno"><span class="ico">💼</span><span class="lbl2">الوردية</span></button>
      <button class="nav-btn" data-tab="report"><span class="ico">📊</span><span class="lbl2">التقارير</span></button>
    </div>
  </nav>

  <div id="sheet-root"></div>
  <div id="toast-root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <script>
  // ================= DATA =================
  const SEED=[
    {id:1,barcode:'7000001',name:'Crêpe Nutella',category:'كريب حلو',cost:22,price:85,stock:32,threshold:20,active:true},
    {id:2,barcode:'7000002',name:'Crêpe Sucre-Citron',category:'كريب حلو',cost:12,price:70,stock:41,threshold:20,active:true},
    {id:3,barcode:'7000003',name:'Crêpe Jambon-Fromage',category:'كريب مالح',cost:38,price:110,stock:18,threshold:20,active:true},
    {id:4,barcode:'7000004',name:'Crêpe Chèvre-Miel',category:'كريب مالح',cost:42,price:120,stock:14,threshold:15,active:true},
    {id:5,barcode:'7000005',name:'Espresso',category:'مشروبات ساخنة',cost:8,price:45,stock:142,threshold:50,active:true},
    {id:6,barcode:'7000006',name:'Café Latte',category:'مشروبات ساخنة',cost:14,price:65,stock:88,threshold:40,active:true},
    {id:7,barcode:'7000007',name:'Cappuccino',category:'مشروبات ساخنة',cost:12,price:60,stock:95,threshold:40,active:true},
    {id:8,barcode:'7000008',name:'Croissant',category:'معجنات',cost:12,price:35,stock:8,threshold:20,active:true},

  function completeSale(items,sub){

    </div></div>`;
    $('ov').onclick=closeSheet;$('cx').onclick=closeSheet;
    $('counted').oninput=()=>{const c=parseFloat($('counted').value);if(isNaN(c)){$('diff-box').innerHTML='';return;}const d=c-exp,ab=Math.abs(d),col=ab===0?'var(--green)':ab<=50?'var(--amber)':'var(--red)';$('diff-box').innerHTML=`<div style="background:${col.replace('var(--','rgba(').replace('green','61,115,85').replace('amber','216,142,42').replace('red','192,72,72').replace(')',',0.12)')};border:1px solid ${col.replace('var(--','rgba(').replace('green','61,115,85').replace('amber','216,142,42').replace('red','192,72,72').replace(')',',0.4)')};border-radius:10px;padding:12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:12px;font-weight:700;color:${col};">${ab===0?'✓ مطابق':(d<0?'⚠ عجز':'⚠ فائض')}</span><span class="num" style="font-size:18px;font-weight:700;color:${col};">${d>=0?'+':'−'}${fmt(d)} ج.م</span></div>`;};
    $('do-close').onclick=()=>{
      const c=parseFloat($('counted').value);if(isNaN(c)){toast('أدخل النقد المعدود');return;}
      const ag=shiftAggregates(s);
      const closed={...s,closedAt:new Date().toISOString(),countedCash:c,expectedCash:exp,difference:c-exp,salesCount:ag.count,revenue:ag.revenue,profit:ag.profit,notes:$('close-notes').value};
      const shifts=DB.getShifts();shifts.unshift(closed);DB.setShifts(shifts);
      DB.setCurrentShift(null);
      closeSheet();renderTurno();updateShiftIndicator();toast('أُغلقت الوردية #'+s.shiftNumber);
    };
  }

  // ================= REPORT =================
  function renderReport(){
    const root=$('tab-report');
    const sales=DB.getSales();
    const now=new Date();
    function inPeriod(d){const dt=new Date(d);const days=(now-dt)/(1000*60*60*24);if(reportPeriod==='today')return dt.toDateString()===now.toDateString();if(reportPeriod==='7')return days<=7;if(reportPeriod==='30')return days<=30;return true;}
    const filtered=sales.filter(s=>inPeriod(s.date));
    const revenue=filtered.reduce((a,s)=>a+s.subtotal,0);
    const profit=filtered.reduce((a,s)=>a+s.profit,0);
    const count=filtered.length;
    const avg=count>0?revenue/count:0;
    // product performance
    const perf={};
    filtered.forEach(s=>s.items.forEach(it=>{if(!perf[it.name])perf[it.name]={name:it.name,qty:0,profit:0};perf[it.name].qty+=it.qty;perf[it.name].profit+=(it.price-it.cost)*it.qty;}));
    const arr=Object.values(perf);
    const topQty=[...arr].sort((a,b)=>b.qty-a.qty).slice(0,5);
    const topProfit=[...arr].sort((a,b)=>b.profit-a.profit).slice(0,5);
    const stockValue=products.filter(p=>p.active).reduce((s,p)=>s+p.stock*p.cost,0);
    const lowStock=products.filter(p=>p.active&&p.stock<p.threshold).sort((a,b)=>a.stock-b.stock);
    function listHTML(items,key,suffix){const max=Math.max(...items.map(i=>i[key]),1);return items.map((p,i)=>`<div style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;"><span style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;direction:ltr;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;">${(i+1)}. ${p.name}</span><span class="num" style="font-size:12px;font-weight:700;color:var(--forest);">${fmt(p[key])}<span style="font-size:8px;color:rgba(26,26,26,0.6);">${suffix}</span></span></div><div class="bar-track"><div class="bar-fill" style="width:${p[key]/max*100}%;background:${i===0?'var(--gold)':'var(--forest)'};"></div></div></div>`).join('');}
    root.innerHTML=`
      <div class="chips" style="margin-bottom:14px;" id="period-chips">
        ${[['today','اليوم'],['7','7 أيام'],['30','30 يوم'],['all','الكل']].map(([k,l])=>`<button class="chip ${reportPeriod===k?'active':''}" data-p="${k}">${l}</button>`).join('')}
      </div>
      <div class="stat-grid">
        <div class="mini-stat"><div class="ms-label" style="color:var(--gold)">الإيرادات</div><div class="ms-value num">${fmt(revenue)}</div><div style="font-size:10px;color:rgba(250,246,238,0.7)">ج.م</div></div>
        <div class="mini-stat white"><div class="ms-label" style="color:rgba(26,26,26,0.6)">الربح</div><div class="ms-value num">${fmt(profit)}</div><div style="font-size:10px;color:rgba(26,26,26,0.6)">${revenue>0?Math.round(profit/revenue*100):0}%</div></div>
        <div class="mini-stat white"><div class="ms-label" style="color:rgba(26,26,26,0.6)">المبيعات</div><div class="ms-value num">${count}</div><div style="font-size:10px;color:rgba(26,26,26,0.6)">فواتير</div></div>
        <div class="mini-stat white"><div class="ms-label" style="color:rgba(26,26,26,0.6)">متوسط الفاتورة</div><div class="ms-value num">${fmt(avg)}</div><div style="font-size:10px;color:rgba(26,26,26,0.6)">ج.م</div></div>
      </div>
      ${count>0?`<div class="card"><div class="card-title">🔥 الأكثر مبيعاً</div>${listHTML(topQty,'qty','قطعة')}</div>
      <div class="card"><div class="card-title">🏆 الأعلى ربحية</div>${listHTML(topProfit,'profit','ج.م')}</div>`:`<div class="card"><div class="empty">لا توجد مبيعات في هذه الفترة</div></div>`}
      <div class="stat-grid" style="grid-template-columns:1fr;">
        <div class="card" style="margin-bottom:0;"><div class="card-title">📦 قيمة المخزون</div><div class="num" style="font-size:30px;font-weight:700;color:var(--forest);">${fmt(stockValue)}<span style="font-size:13px;color:rgba(26,26,26,0.6);margin-right:4px;font-weight:500;">ج.م</span></div><div style="font-size:11px;color:rgba(26,26,26,0.6);margin-top:6px;">محسوبة على آخر تكلفة شراء</div></div>
      </div>
      <div class="card"><div class="card-title">⚠ مخزون منخفض (${lowStock.length})</div>${lowStock.length===0?'<div style="font-size:12px;color:var(--green);text-align:center;padding:8px;">كل المنتجات فوق الحد</div>':lowStock.slice(0,6).map(p=>{const crit=p.stock<=5;return `<div style="display:flex;justify-content:space-between;padding:6px 10px;background:${crit?'rgba(192,72,72,0.06)':'var(--ivory)'};border-radius:6px;border-right:3px solid ${crit?'var(--red)':'var(--gold)'};margin-bottom:4px;"><span style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;direction:ltr;">${p.name}</span><span class="num" style="font-size:12px;font-weight:700;color:${crit?'var(--red)':'rgba(26,26,26,0.7)'};">${p.stock} قطعة</span></div>`;}).join('')}</div>
    `;
    document.querySelectorAll('#period-chips .chip').forEach(ch=>ch.onclick=()=>{reportPeriod=ch.dataset.p;renderReport();});
  }

  // ================= SETTINGS / EXPORT-IMPORT =================
  $('gear-btn').onclick=()=>{
    $('sheet-root').innerHTML=`<div class="overlay" id="ov"><div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-head"><div><div class="sheet-sub">الإعدادات</div><div class="sheet-title">البيانات والنسخ الاحتياطي</div></div><button class="close-x" id="cx">×</button></div>
      <div style="font-size:12px;color:rgba(26,26,26,0.7);line-height:1.6;margin-bottom:16px;">بياناتك محفوظة على هذا الجهاز فقط. اعمل نسخة احتياطية بانتظام لتجنب فقدانها.</div>
      <button class="btn-forest btn-wide" id="export-btn" style="margin-bottom:10px;">⬇ تصدير نسخة احتياطية (ملف)</button>
      <button class="btn-secondary btn-wide" id="import-btn" style="margin-bottom:10px;">⬆ استيراد نسخة احتياطية</button>
      <input type="file" id="import-file" accept="application/json" class="hidden">
      <div style="border-top:1px solid var(--ivory-dark);margin:16px 0;padding-top:16px;">
        <button class="btn-secondary btn-wide" id="reset-btn" style="color:var(--red);border-color:rgba(192,72,72,0.3);">🗑 إعادة تعيين كل البيانات</button>
      </div>
      <div style="font-size:10px;color:rgba(26,26,26,0.5);text-align:center;margin-top:14px;">Le Coin POS · النسخة المحلية v2</div>
    </div></div>`;
    $('ov').onclick=closeSheet;$('cx').onclick=closeSheet;
    $('export-btn').onclick=()=>{
      const data={exported:new Date().toISOString(),version:2,products:DB.getProducts(),sales:DB.getSales(),shifts:DB.getShifts(),currentShift:DB.getCurrentShift(),loads:DB.getLoads(),counters:DB.getCounters()};
      const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);const a=document.createElement('a');
      a.href=url;a.download=`lecoin-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
      toast('تم تصدير النسخة الاحتياطية');
    };
    $('import-btn').onclick=()=>$('import-file').click();
    $('import-file').onchange=e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const d=JSON.parse(ev.target.result);
          if(!d.products)throw new Error('ملف غير صالح');
          if(!confirm('سيتم استبدال كل البيانات الحالية. متابعة؟'))return;
          DB.setProducts(d.products);DB.setSales(d.sales||[]);DB.setShifts(d.shifts||[]);DB.setCurrentShift(d.currentShift||null);DB.setLoads(d.loads||[]);if(d.counters)DB.setCounters(d.counters);
          products=DB.getProducts();cart=[];loadLines=[];
          closeSheet();switchTab('cassa');toast('تم استيراد البيانات بنجاح');
        }catch(err){toast('خطأ: الملف غير صالح');}
      };
      reader.readAsText(file);
    };
    $('reset-btn').onclick=()=>{
      if(!confirm('سيتم حذف كل البيانات نهائياً والعودة للبيانات الأولية. متأكد؟'))return;
      ['lecoin_products','lecoin_sales','lecoin_shifts','lecoin_current_shift','lecoin_loads','lecoin_counters'].forEach(k=>localStorage.removeItem(k));
      products=DB.getProducts();cart=[];loadLines=[];
      closeSheet();switchTab('cassa');toast('تمت إعادة التعيين');
    };
  };

  // ================= INIT =================
  if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
  switchTab('cassa');
  updateShiftIndicator();
  </script>
</body>
</html>
