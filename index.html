<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1F3A2E">
  <link rel="manifest" href="manifest.json">
  <title>Le Coin · POS</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    :root {
      --forest:#1F3A2E; --forest-dark:#152821; --gold:#C9A84C; --gold-light:#E0C880;
      --ivory:#FAF6EE; --ivory-dark:#F0EADC; --charcoal:#1A1A1A;
      --red:#C04848; --green:#3D7355; --amber:#D88E2A;
    }
    body { font-family:'Tajawal','Inter',system-ui,sans-serif; background:var(--ivory); color:var(--charcoal); min-height:100vh; }
    body[dir=ltr] { font-family:'Inter',system-ui,sans-serif; }
    .num { font-family:'JetBrains Mono',monospace; font-variant-numeric:tabular-nums; direction:ltr; unicode-bidi:embed; }
    .fr { font-family:'Cormorant Garamond',serif; font-style:italic; direction:ltr; }
    .hidden { display:none !important; }

    /* LOGIN */
    .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; background:var(--forest); }
    .login-card { background:var(--ivory); border-radius:20px; padding:30px 24px; width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
    .login-brand { text-align:center; margin-bottom:24px; }
    .login-brand .lb-name { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:40px; color:var(--forest); font-weight:500; }
    .login-brand .lb-tag { font-size:10px; letter-spacing:3px; color:var(--gold); font-weight:700; text-transform:uppercase; margin-top:2px; }

    header { background:var(--forest); color:var(--ivory); padding:12px 16px; position:sticky; top:0; z-index:20; }
    .header-inner { display:flex; justify-content:space-between; align-items:center; max-width:900px; margin:0 auto; gap:10px; }
    .brand-name { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:22px; font-weight:500; }
    .header-ctrl { display:flex; align-items:center; gap:8px; }
    .branch-sel { background:rgba(255,255,255,0.1); color:var(--ivory); border:1px solid rgba(201,168,76,0.3); border-radius:8px; padding:5px 8px; font-size:11px; font-family:inherit; max-width:120px; }
    .lang-btn { background:rgba(201,168,76,0.2); color:var(--gold); border:none; border-radius:8px; padding:5px 9px; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; }
    .user-btn { background:none; border:none; color:var(--ivory); cursor:pointer; font-size:18px; opacity:0.85; }

    main { max-width:900px; margin:0 auto; padding:16px; padding-bottom:80px; }
    .card { background:white; border-radius:16px; padding:16px; box-shadow:0 1px 2px rgba(0,0,0,0.04),0 4px 12px rgba(0,0,0,0.04); margin-bottom:14px; }
    .card-title { font-size:11px; letter-spacing:1px; color:var(--forest); font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:6px; }

    .input { width:100%; padding:11px 12px; font-size:14px; border:1px solid var(--ivory-dark); border-radius:10px; background:var(--ivory); outline:none; color:var(--charcoal); font-family:inherit; }
    .input:focus { border-color:var(--gold); }
    input[type=number].input::-webkit-outer-spin-button, input[type=number].input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
    .input::placeholder { color:rgba(26,26,26,0.35); }
    label.lbl { font-size:10px; letter-spacing:0.5px; color:rgba(26,26,26,0.6); font-weight:600; margin-bottom:5px; display:block; }
    .field { margin-bottom:12px; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    .btn-forest { background:var(--forest); color:var(--ivory); border:none; padding:12px 18px; border-radius:10px; font-weight:600; font-size:13px; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
    .btn-gold { background:var(--gold); color:var(--forest-dark); border:none; padding:12px 22px; border-radius:12px; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 4px 12px rgba(201,168,76,0.3); }
    .btn-secondary { background:white; color:var(--charcoal); border:1px solid var(--ivory-dark); padding:10px 16px; border-radius:10px; font-weight:600; font-size:12px; cursor:pointer; font-family:inherit; }
    .btn-wide { width:100%; justify-content:center; }

    nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid var(--ivory-dark); z-index:40; }
    .nav-inner { max-width:900px; margin:0 auto; display:grid; }
    .nav-btn { background:transparent; border:none; padding:10px 4px 8px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; color:rgba(26,26,26,0.5); position:relative; font-family:inherit; }
    .nav-btn.active { color:var(--forest); }
    .nav-btn.active::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:32px; height:3px; background:var(--gold); border-radius:0 0 4px 4px; }
    .nav-btn .ico { font-size:20px; }
    .nav-btn .lbl2 { font-size:11px; font-weight:500; }

    .overlay { position:fixed; inset:0; background:rgba(26,26,26,0.55); display:flex; align-items:flex-end; justify-content:center; z-index:50; }
    @keyframes sheetin { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .sheet { background:var(--ivory); border-radius:20px 20px 0 0; padding:22px; width:100%; max-width:480px; max-height:92vh; overflow-y:auto; animation:sheetin 0.3s cubic-bezier(0.32,0.72,0,1); }
    .sheet-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
    .sheet-sub { font-size:11px; letter-spacing:0.5px; color:var(--gold); font-weight:700; }
    .sheet-title { font-size:22px; font-weight:600; color:var(--forest); }
    .close-x { background:none; border:none; cursor:pointer; font-size:22px; color:var(--charcoal); }

    @keyframes toastin { from{transform:translateX(-50%) translateY(20px);opacity:0} to{transform:translateX(-50%) translateY(0);opacity:1} }
    .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--forest); color:var(--ivory); padding:10px 18px; border-radius:999px; font-size:13px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,0.2); z-index:100; animation:toastin 0.3s ease-out; max-width:90%; text-align:center; }
    .toast.err { background:var(--red); }

    .empty { text-align:center; padding:24px 16px; color:rgba(26,26,26,0.45); font-size:13px; }
    .spinner { width:34px; height:34px; border:3px solid var(--ivory-dark); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:30px auto; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* CATEGORY ROW */
    .cat-row { background:white; border-radius:10px; padding:12px; display:flex; align-items:center; gap:12px; margin-bottom:6px; cursor:pointer; }
    .cat-order { width:28px; height:28px; border-radius:6px; background:var(--ivory); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .cat-names { flex:1; min-width:0; }

    /* PRODUCT CARD */
    .prod-card { background:white; border-radius:12px; padding:10px; display:flex; gap:12px; margin-bottom:8px; cursor:pointer; align-items:center; }
    .prod-photo { width:56px; height:56px; border-radius:10px; object-fit:cover; flex-shrink:0; background:var(--ivory-dark); display:flex; align-items:center; justify-content:center; font-size:22px; color:rgba(26,26,26,0.3); }
    .prod-info { flex:1; min-width:0; }
    .prod-meta { display:flex; gap:10px; margin-top:4px; font-size:11px; }
    .photo-upload { width:100%; height:160px; border:2px dashed var(--ivory-dark); border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; gap:6px; color:rgba(26,26,26,0.5); background:white; overflow:hidden; position:relative; }
    .photo-upload img { width:100%; height:100%; object-fit:cover; }
    .toggle { position:relative; width:44px; height:26px; border-radius:999px; border:none; cursor:pointer; padding:0; flex-shrink:0; }
    .toggle .thumb { position:absolute; top:3px; width:20px; height:20px; background:var(--ivory); border-radius:50%; transition:all 0.2s; }
    body[dir=rtl] .toggle .thumb { right:3px; }
    body[dir=ltr] .toggle .thumb { left:3px; }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div class="login-wrap" id="login-screen">
    <div class="login-card">
      <div class="login-brand"><div class="lb-name">Le Coin</div><div class="lb-tag">POINT OF SALE</div></div>
      <div class="field"><label class="lbl" id="l-email-lbl">البريد الإلكتروني</label><input class="input" id="login-email" type="email" autocomplete="username"></div>
      <div class="field"><label class="lbl" id="l-pass-lbl">كلمة المرور</label><input class="input" id="login-pass" type="password" autocomplete="current-password"></div>
      <button class="btn-gold btn-wide" id="login-btn" style="margin-top:6px;">دخول</button>
      <div id="login-error" style="color:var(--red);font-size:12px;text-align:center;margin-top:12px;min-height:16px;"></div>
      <button class="lang-btn" id="login-lang" style="display:block;margin:14px auto 0;background:rgba(31,58,46,0.08);color:var(--forest);">EN</button>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <header>
      <div class="header-inner">
        <span class="brand-name">Le Coin</span>
        <div class="header-ctrl">
          <select class="branch-sel" id="branch-select"></select>
          <button class="lang-btn" id="lang-btn">EN</button>
          <button class="user-btn" id="user-btn">⚙</button>
        </div>
      </div>
    </header>

    <main>
      <div id="content"></div>
    </main>

    <nav><div class="nav-inner" id="nav-inner"></div></nav>
  </div>

  <div id="sheet-root"></div>
  <div id="toast-root"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc, deleteDoc, query, where, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // ============================================================
   // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBPasx-SbUqik32aA6tYSJCF7_XQgolh04",
  authDomain: "lecoin-1f8a5.firebaseapp.com",
  databaseURL: "https://lecoin-1f8a5-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lecoin-1f8a5",
  storageBucket: "lecoin-1f8a5.firebasestorage.app",
  messagingSenderId: "671148497332",
  appId: "1:671148497332:web:a9307722d7ad1857ac3ae1",
  measurementId: "G-93XD4LFQ3K"
};
    // ============================================================

    const fbApp = initializeApp(firebaseConfig);
    const auth = getAuth(fbApp);
    const db = getFirestore(fbApp);
    // NB: Storage non usato — le foto sono salvate in Firestore come base64 (piano gratuito, niente Blaze)

    // ============ i18n ============
    const T = {
      ar: {
        dir:'rtl', langBtn:'EN', email:'البريد الإلكتروني', pass:'كلمة المرور', login:'دخول',
        loginErr:'بيانات الدخول غير صحيحة', noProfile:'لا يوجد ملف مستخدم. تواصل مع المسؤول.', inactive:'حسابك متوقف.',
        noBranch:'لا توجد فروع مخصصة لك.',
        products:'المنتجات', categories:'الفئات', logout:'تسجيل الخروج', settings:'الإعدادات',
        cashierSoon:'واجهة الكاشير', cashierSoonMsg:'وحدة البيع ستُضاف في المرحلة التالية. حالياً يمكن للمسؤول والمدير إدارة الكتالوج.',
        addCategory:'فئة جديدة', editCategory:'تعديل الفئة', nameAr:'الاسم بالعربية', nameEn:'الاسم بالإنجليزية',
        order:'الترتيب', active:'نشط', save:'حفظ', cancel:'إلغاء', delete:'حذف', create:'إنشاء', edit:'تعديل',
        confirmDelCat:'حذف هذه الفئة؟', confirmDelProd:'حذف هذا المنتج؟',
        addProduct:'منتج جديد', editProduct:'تعديل المنتج', barcode:'الباركود', name:'الاسم (فرنسي)',
        descAr:'الوصف بالعربية', descEn:'الوصف بالإنجليزية', category:'الفئة', price:'السعر', cost:'التكلفة',
        photo:'صورة المنتج', addPhoto:'إضافة صورة', stock:'المخزون', threshold:'حد الإنذار',
        margin:'الربح', search:'بحث...', noCategories:'لا توجد فئات بعد', noProducts:'لا توجد منتجات بعد',
        selectCat:'— اختر فئة —', saved:'تم الحفظ', deleted:'تم الحذف', errorGen:'حدث خطأ',
        required:'الحقول المطلوبة ناقصة', branchStock:'مخزون هذا الفرع', uploading:'جارٍ الرفع...',
        currency:'ج.م', loadingPhoto:'صورة', admin:'مسؤول', manager:'مدير', cashier:'كاشير', role:'الدور'
      },
      en: {
        dir:'ltr', langBtn:'ع', email:'Email', pass:'Password', login:'Sign in',
        loginErr:'Invalid login credentials', noProfile:'No user profile. Contact the admin.', inactive:'Your account is disabled.',
        noBranch:'No branches assigned to you.',
        products:'Products', categories:'Categories', logout:'Logout', settings:'Settings',
        cashierSoon:'Cashier interface', cashierSoonMsg:'The sales module arrives in the next stage. For now, admins and managers manage the catalog.',
        addCategory:'New category', editCategory:'Edit category', nameAr:'Name (Arabic)', nameEn:'Name (English)',
        order:'Order', active:'Active', save:'Save', cancel:'Cancel', delete:'Delete', create:'Create', edit:'Edit',
        confirmDelCat:'Delete this category?', confirmDelProd:'Delete this product?',
        addProduct:'New product', editProduct:'Edit product', barcode:'Barcode', name:'Name (French)',
        descAr:'Description (Arabic)', descEn:'Description (English)', category:'Category', price:'Price', cost:'Cost',
        photo:'Product photo', addPhoto:'Add photo', stock:'Stock', threshold:'Low-stock alert',
        margin:'Margin', search:'Search...', noCategories:'No categories yet', noProducts:'No products yet',
        selectCat:'— select category —', saved:'Saved', deleted:'Deleted', errorGen:'An error occurred',
        required:'Required fields missing', branchStock:'Stock for this branch', uploading:'Uploading...',
        currency:'EGP', loadingPhoto:'photo', admin:'Admin', manager:'Manager', cashier:'Cashier', role:'Role'
      }
    };
    let lang = localStorage.getItem('lecoin_lang') || 'ar';
    const t = k => T[lang][k] || k;
    function applyLang() {
      document.documentElement.lang = lang; document.documentElement.dir = T[lang].dir;
      document.body.dir = T[lang].dir;
      $('lang-btn') && ($('lang-btn').textContent = T[lang].langBtn);
      $('login-lang') && ($('login-lang').textContent = T[lang].langBtn);
    }
    function toggleLang() { lang = lang==='ar'?'en':'ar'; localStorage.setItem('lecoin_lang',lang); applyLang(); refreshLoginLabels(); if(profile) render(); }

    // ============ STATE ============
    let user=null, profile=null, branches=[], currentBranchId=null;
    let categories=[], products=[], inventory={}, activeTab='products';

    const $ = id => document.getElementById(id);
    const fmt = n => Math.abs(n||0).toLocaleString('en-US',{maximumFractionDigits:0});
    function toast(m, err=false){ $('toast-root').innerHTML=`<div class="toast ${err?'err':''}">${err?'⚠':'✓'} ${m}</div>`; setTimeout(()=>$('toast-root').innerHTML='',2400); }
    function closeSheet(){ $('sheet-root').innerHTML=''; }

    // ============ LOGIN ============
    function refreshLoginLabels(){
      $('l-email-lbl').textContent=t('email'); $('l-pass-lbl').textContent=t('pass');
      $('login-btn').textContent=t('login');
    }
    $('login-lang').onclick=toggleLang;
    $('login-btn').onclick=async()=>{
      const email=$('login-email').value.trim(), pass=$('login-pass').value;
      $('login-error').textContent='';
      if(!email||!pass){$('login-error').textContent=t('required');return;}
      $('login-btn').textContent='...';
      try{ await signInWithEmailAndPassword(auth,email,pass); }
      catch(e){ $('login-error').textContent=t('loginErr'); $('login-btn').textContent=t('login'); }
    };
    $('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')$('login-btn').click();});

    // ============ AUTH STATE ============
    onAuthStateChanged(auth, async u=>{
      if(!u){ user=null; profile=null; $('login-screen').classList.remove('hidden'); $('app').classList.add('hidden'); return; }
      user=u;
      try{
        const snap=await getDoc(doc(db,'users',u.uid));
        if(!snap.exists()){ $('login-error').textContent=t('noProfile'); await signOut(auth); $('login-btn').textContent=t('login'); return; }
        profile=snap.data();
        if(profile.active===false){ $('login-error').textContent=t('inactive'); await signOut(auth); $('login-btn').textContent=t('login'); return; }
        await loadBranches();
        if(branches.length===0){ $('login-error').textContent=t('noBranch'); await signOut(auth); $('login-btn').textContent=t('login'); return; }
        currentBranchId=branches[0].id;
        $('login-screen').classList.add('hidden'); $('app').classList.remove('hidden');
        $('login-btn').textContent=t('login');
        setupChrome();
        await loadCatalog();
        render();
      }catch(e){ console.error(e); $('login-error').textContent=t('errorGen'); await signOut(auth); }
    });

    // ============ DATA LOADERS ============
    async function loadBranches(){
      branches=[];
      if(profile.role==='admin'){
        const qs=await getDocs(query(collection(db,'branches'),where('active','==',true)));
        qs.forEach(d=>branches.push({id:d.id,...d.data()}));
      } else {
        for(const bid of (profile.branchIds||[])){
          const bs=await getDoc(doc(db,'branches',bid));
          if(bs.exists()&&bs.data().active!==false) branches.push({id:bs.id,...bs.data()});
        }
      }
    }
    async function loadCatalog(){
      categories=[]; products=[]; inventory={};
      const cs=await getDocs(collection(db,'categories'));
      cs.forEach(d=>categories.push({id:d.id,...d.data()}));
      categories.sort((a,b)=>(a.order||0)-(b.order||0));
      const ps=await getDocs(collection(db,'products'));
      ps.forEach(d=>products.push({id:d.id,...d.data()}));
      const inv=await getDocs(query(collection(db,'inventory'),where('branchId','==',currentBranchId)));
      inv.forEach(d=>{ const x=d.data(); inventory[x.productId]={qty:x.qty||0,threshold:x.threshold||20,lastCost:x.lastCost||0}; });
    }

    // ============ CHROME (top bar, nav) ============
    function setupChrome(){
      applyLang();
      $('lang-btn').onclick=toggleLang;
      const bs=$('branch-select');
      bs.innerHTML=branches.map(b=>`<option value="${b.id}">${lang==='ar'?b.nameAr:b.nameEn}</option>`).join('');
      bs.value=currentBranchId;
      bs.onchange=async()=>{ currentBranchId=bs.value; await loadCatalog(); render(); };
      $('user-btn').onclick=openSettings;
      // nav depends on role
      const tabs=[];
      if(profile.role==='admin'||profile.role==='manager'){
        tabs.push({k:'products',ico:'📦',l:t('products')});
        tabs.push({k:'categories',ico:'🏷️',l:t('categories')});
      } else {
        tabs.push({k:'cashier',ico:'🛒',l:t('cashierSoon')});
      }
      $('nav-inner').style.gridTemplateColumns=`repeat(${tabs.length},1fr)`;
      $('nav-inner').innerHTML=tabs.map(x=>`<button class="nav-btn ${x.k===activeTab?'active':''}" data-tab="${x.k}"><span class="ico">${x.ico}</span><span class="lbl2">${x.l}</span></button>`).join('');
      document.querySelectorAll('.nav-btn').forEach(b=>b.onclick=()=>{activeTab=b.dataset.tab;document.querySelectorAll('.nav-btn').forEach(x=>x.classList.toggle('active',x===b));render();});
      if(profile.role==='cashier') activeTab='cashier';
    }

    function render(){
      // refresh nav labels & branch names for language
      const bs=$('branch-select'); if(bs){const cur=bs.value;bs.innerHTML=branches.map(b=>`<option value="${b.id}">${lang==='ar'?b.nameAr:b.nameEn}</option>`).join('');bs.value=cur;}
      document.querySelectorAll('.nav-btn').forEach(b=>{const k=b.dataset.tab;b.querySelector('.lbl2').textContent=k==='products'?t('products'):k==='categories'?t('categories'):t('cashierSoon');});
      if(activeTab==='products') renderProducts();
      else if(activeTab==='categories') renderCategories();
      else renderCashierPlaceholder();
    }

    function renderCashierPlaceholder(){
      $('content').innerHTML=`<div class="card" style="text-align:center;padding:30px 20px;margin-top:20px;">
        <div style="font-size:40px;margin-bottom:12px;">🛒</div>
        <div class="sheet-title">${t('cashierSoon')}</div>
        <div style="font-size:13px;color:rgba(26,26,26,0.7);margin-top:8px;line-height:1.6;">${t('cashierSoonMsg')}</div>
      </div>`;
    }

    // ============ CATEGORIES ============
    function renderCategories(){
      let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><div style="font-size:11px;letter-spacing:1px;color:var(--forest);font-weight:700;">${t('categories').toUpperCase()}</div><button class="btn-gold" id="add-cat" style="padding:8px 14px;">+ ${t('addCategory')}</button></div>`;
      if(categories.length===0) html+=`<div class="card"><div class="empty">${t('noCategories')}</div></div>`;
      else html+=categories.map(c=>`<div class="cat-row" data-id="${c.id}" style="opacity:${c.active===false?0.5:1}">
        <div class="cat-order"><span class="num" style="font-size:12px;font-weight:700;color:var(--forest);">${c.order||0}</span></div>
        <div class="cat-names"><div style="font-weight:600;font-size:15px;">${c.nameAr}</div><div style="font-size:12px;color:rgba(26,26,26,0.6);" class="fr" dir="ltr">${c.nameEn}</div></div>
        <span style="color:rgba(26,26,26,0.4);">✎</span>
      </div>`).join('');
      $('content').innerHTML=html;
      $('add-cat')&&($('add-cat').onclick=()=>catForm(null));
      document.querySelectorAll('.cat-row').forEach(r=>r.onclick=()=>catForm(categories.find(c=>c.id===r.dataset.id)));
    }
    function catForm(cat){
      const f=cat||{nameAr:'',nameEn:'',order:categories.length+1,active:true};
      let act=f.active!==false;
      $('sheet-root').innerHTML=`<div class="overlay" id="ov"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${cat?t('edit'):t('create')}</div><div class="sheet-title">${cat?t('editCategory'):t('addCategory')}</div></div><button class="close-x" id="cx">×</button></div>
        <div class="field"><label class="lbl">${t('nameAr')}</label><input class="input" id="c-ar" value="${f.nameAr}" dir="rtl"></div>
        <div class="field"><label class="lbl">${t('nameEn')}</label><input class="input fr" id="c-en" value="${f.nameEn}" dir="ltr"></div>
        <div class="field"><label class="lbl">${t('order')}</label><input class="input num" id="c-order" type="number" value="${f.order}" dir="ltr"></div>
        <div style="background:white;border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--ivory-dark);margin-bottom:12px;"><span style="font-size:13px;font-weight:600;">${t('active')}</span><button class="toggle" id="c-act" style="background:${act?'var(--forest)':'rgba(26,26,26,0.2)'}"><span class="thumb"></span></button></div>
        ${cat?`<button class="btn-secondary btn-wide" id="c-del" style="margin-bottom:10px;color:var(--red);border-color:rgba(192,72,72,0.3);">${t('delete')}</button>`:''}
        <button class="btn-forest btn-wide" id="c-save">✓ ${t('save')}</button>
      </div></div>`;
      setToggle('c-act',act,v=>act=v);
      $('ov').onclick=closeSheet;$('cx').onclick=closeSheet;
      if(cat)$('c-del').onclick=async()=>{ if(!confirm(t('confirmDelCat')))return; try{await deleteDoc(doc(db,'categories',cat.id));categories=categories.filter(c=>c.id!==cat.id);closeSheet();renderCategories();toast(t('deleted'));}catch(e){toast(t('errorGen'),true);} };
      $('c-save').onclick=async()=>{
        const nameAr=$('c-ar').value.trim(),nameEn=$('c-en').value.trim(),order=parseInt($('c-order').value)||0;
        if(!nameAr||!nameEn){toast(t('required'),true);return;}
        $('c-save').textContent='...';
        try{
          if(cat){ await updateDoc(doc(db,'categories',cat.id),{nameAr,nameEn,order,active:act}); Object.assign(cat,{nameAr,nameEn,order,active:act}); }
          else{ const r=await addDoc(collection(db,'categories'),{nameAr,nameEn,order,active:act,createdAt:Date.now()}); categories.push({id:r.id,nameAr,nameEn,order,active:act}); }
          categories.sort((a,b)=>(a.order||0)-(b.order||0));
          closeSheet();renderCategories();toast(t('saved'));
        }catch(e){console.error(e);toast(t('errorGen'),true);$('c-save').textContent='✓ '+t('save');}
      };
    }

    // ============ PRODUCTS ============
    let prodSearch='';
    function renderProducts(){
      const catName=id=>{const c=categories.find(x=>x.id===id);return c?(lang==='ar'?c.nameAr:c.nameEn):'—';};
      let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;"><input class="input" id="p-search" placeholder="${t('search')}" value="${prodSearch}" style="flex:1;"><button class="btn-gold" id="add-prod" style="padding:8px 14px;white-space:nowrap;">+ ${t('addProduct')}</button></div>`;
      let list=products.filter(p=>!prodSearch||(p.name||'').toLowerCase().includes(prodSearch.toLowerCase())||(p.barcode||'').includes(prodSearch));
      if(list.length===0) html+=`<div class="card"><div class="empty">${t('noProducts')}</div></div>`;
      else html+=list.map(p=>{
        const inv=inventory[p.id]||{qty:0,threshold:20}; const low=inv.qty<=5;
        const m=p.price-p.cost,mPct=p.price>0?Math.round(m/p.price*100):0;
        return `<div class="prod-card" data-id="${p.id}" style="opacity:${p.active===false?0.5:1}">
          ${p.photoUrl?`<img class="prod-photo" src="${p.photoUrl}">`:`<div class="prod-photo">🍽️</div>`}
          <div class="prod-info">
            <div class="fr" dir="ltr" style="font-size:16px;font-weight:500;">${p.name}</div>
            <div style="font-size:11px;color:rgba(26,26,26,0.55);margin-top:1px;">${catName(p.categoryId)}</div>
            <div class="prod-meta">
              <span class="num" style="color:var(--forest);font-weight:700;">${p.price} ${t('currency')}</span>
              <span class="num" style="color:${mPct<30?'var(--red)':'var(--green)'};">${mPct}%</span>
              <span class="num" style="color:${low?'var(--red)':'rgba(26,26,26,0.55)'};">${t('stock')}: ${inv.qty}</span>
            </div>
          </div>
          <span style="color:rgba(26,26,26,0.4);">✎</span>
        </div>`;
      }).join('');
      $('content').innerHTML=html;
      $('add-prod')&&($('add-prod').onclick=()=>prodForm(null));
      const ps=$('p-search'); if(ps){ps.oninput=()=>{prodSearch=ps.value;const pos=ps.selectionStart;renderProducts();const n=$('p-search');n.focus();n.setSelectionRange(pos,pos);};}
      document.querySelectorAll('.prod-card').forEach(r=>r.onclick=()=>prodForm(products.find(p=>p.id===r.dataset.id)));
    }

    let pendingPhoto=null;
    function prodForm(prod){
      pendingPhoto=null;
      const f=prod||{barcode:'',name:'',descAr:'',descEn:'',categoryId:'',price:'',cost:'',active:true,photoUrl:''};
      const inv=prod?(inventory[prod.id]||{qty:0,threshold:20}):{qty:0,threshold:20};
      let act=f.active!==false;
      const opts=categories.filter(c=>c.active!==false).map(c=>`<option value="${c.id}" ${f.categoryId===c.id?'selected':''}>${lang==='ar'?c.nameAr:c.nameEn}</option>`).join('');
      $('sheet-root').innerHTML=`<div class="overlay" id="ov"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${prod?t('edit'):t('create')}</div><div class="sheet-title">${prod?t('editProduct'):t('addProduct')}</div></div><button class="close-x" id="cx">×</button></div>
        <label class="lbl">${t('photo')}</label>
        <div class="photo-upload" id="photo-box">${f.photoUrl?`<img src="${f.photoUrl}" id="photo-prev">`:`<span style="font-size:30px;">📷</span><span style="font-size:12px;">${t('addPhoto')}</span>`}</div>
        <input type="file" id="photo-input" accept="image/*" class="hidden">
        <div class="field" style="margin-top:12px;"><label class="lbl">${t('barcode')}</label><input class="input num" id="p-bc" value="${f.barcode}" dir="ltr"></div>
        <div class="field"><label class="lbl">${t('name')}</label><input class="input fr" id="p-name" value="${f.name}" dir="ltr"></div>
        <div class="field"><label class="lbl">${t('category')}</label><select class="input" id="p-cat"><option value="">${t('selectCat')}</option>${opts}</select></div>
        <div class="field"><label class="lbl">${t('descAr')}</label><textarea class="input" id="p-dar" dir="rtl" style="min-height:50px;resize:vertical;">${f.descAr||''}</textarea></div>
        <div class="field"><label class="lbl">${t('descEn')}</label><textarea class="input" id="p-den" dir="ltr" style="min-height:50px;resize:vertical;">${f.descEn||''}</textarea></div>
        <div class="row2"><div class="field"><label class="lbl">${t('price')} (${t('currency')})</label><input class="input num" id="p-price" type="number" value="${f.price}" dir="ltr"></div><div class="field"><label class="lbl">${t('cost')} (${t('currency')})</label><input class="input num" id="p-cost" type="number" value="${f.cost}" dir="ltr"></div></div>
        <div id="p-margin"></div>
        <div style="background:rgba(31,58,46,0.04);border-radius:10px;padding:12px;margin-bottom:12px;">
          <div style="font-size:10px;letter-spacing:0.5px;color:var(--forest);font-weight:700;margin-bottom:8px;">${t('branchStock')}</div>
          <div class="row2"><div><label class="lbl">${t('stock')}</label><input class="input num" id="p-stock" type="number" value="${inv.qty}" dir="ltr"></div><div><label class="lbl">${t('threshold')}</label><input class="input num" id="p-thr" type="number" value="${inv.threshold}" dir="ltr"></div></div>
        </div>
        <div style="background:white;border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--ivory-dark);margin-bottom:12px;"><span style="font-size:13px;font-weight:600;">${t('active')}</span><button class="toggle" id="p-act" style="background:${act?'var(--forest)':'rgba(26,26,26,0.2)'}"><span class="thumb"></span></button></div>
        ${prod?`<button class="btn-secondary btn-wide" id="p-del" style="margin-bottom:10px;color:var(--red);border-color:rgba(192,72,72,0.3);">${t('delete')}</button>`:''}
        <button class="btn-forest btn-wide" id="p-save">✓ ${t('save')}</button>
      </div></div>`;
      setToggle('p-act',act,v=>act=v);
      $('ov').onclick=closeSheet;$('cx').onclick=closeSheet;
      $('photo-box').onclick=()=>$('photo-input').click();
      $('photo-input').onchange=async e=>{ const file=e.target.files[0]; if(!file)return; const b64=await compress(file); if(b64.length>900000){ toast(lang==='ar'?'الصورة كبيرة جداً':'Image too large',true); return; } pendingPhoto=b64; $('photo-box').innerHTML=`<img src="${b64}">`; };
      function mUpd(){const pr=parseFloat($('p-price').value),co=parseFloat($('p-cost').value);if(isNaN(pr)||isNaN(co)||pr<=0){$('p-margin').innerHTML='';return;}const m=pr-co,pct=Math.round(m/pr*100),bad=pct<30;$('p-margin').innerHTML=`<div style="background:${bad?'rgba(192,72,72,0.07)':'rgba(201,168,76,0.1)'};border-radius:10px;padding:8px 12px;margin-bottom:12px;display:flex;justify-content:space-between;"><span style="font-size:11px;color:${bad?'var(--red)':'var(--forest)'};font-weight:600;">${t('margin')}</span><span class="num" style="font-weight:700;color:${bad?'var(--red)':'var(--forest)'}">${m} ${t('currency')} · ${pct}%</span></div>`;}
      $('p-price').oninput=mUpd;$('p-cost').oninput=mUpd;mUpd();
      if(prod)$('p-del').onclick=async()=>{ if(!confirm(t('confirmDelProd')))return; try{await deleteDoc(doc(db,'products',prod.id));products=products.filter(p=>p.id!==prod.id);closeSheet();renderProducts();toast(t('deleted'));}catch(e){toast(t('errorGen'),true);} };
      $('p-save').onclick=async()=>{
        const barcode=$('p-bc').value.trim(),name=$('p-name').value.trim(),categoryId=$('p-cat').value;
        const descAr=$('p-dar').value.trim(),descEn=$('p-den').value.trim();
        const price=parseFloat($('p-price').value),cost=parseFloat($('p-cost').value);
        const qty=parseInt($('p-stock').value)||0,threshold=parseInt($('p-thr').value)||20;
        if(!barcode||!name||!categoryId||isNaN(price)||price<=0||isNaN(cost)){toast(t('required'),true);return;}
        if(products.find(p=>p.barcode===barcode&&(!prod||p.id!==prod.id))){toast(lang==='ar'?'باركود مستخدم':'Barcode in use',true);return;}
        $('p-save').textContent=t('uploading');
        try{
          let prodId=prod?prod.id:null;
          const data={barcode,name,categoryId,descAr,descEn,price,cost,active:act};
          if(prod){ await updateDoc(doc(db,'products',prodId),data); }
          else{ data.createdAt=Date.now(); data.photoUrl=''; const r=await addDoc(collection(db,'products'),data); prodId=r.id; }
          // photo upload
          if(pendingPhoto){ data.photoUrl=pendingPhoto; await updateDoc(doc(db,'products',prodId),{photoUrl:pendingPhoto}); }
          else if(prod) data.photoUrl=prod.photoUrl||'';
          // inventory upsert for current branch
          await setDoc(doc(db,'inventory',`${currentBranchId}_${prodId}`),{branchId:currentBranchId,productId:prodId,qty,threshold,lastCost:cost},{merge:true});
          inventory[prodId]={qty,threshold,lastCost:cost};
          // local state
          if(prod) Object.assign(prod,data,{id:prodId});
          else products.push({id:prodId,...data});
          closeSheet();renderProducts();toast(t('saved'));
        }catch(e){console.error(e);toast(t('errorGen'),true);$('p-save').textContent='✓ '+t('save');}
      };
    }

    // ============ HELPERS ============
    function setToggle(id,init,cb){ let v=init; const el=$(id); el.onclick=()=>{v=!v;el.style.background=v?'var(--forest)':'rgba(26,26,26,0.2)';cb(v);}; }
    function compress(file,maxW=600,q=0.7){ return new Promise(res=>{ const img=new Image(); img.onload=()=>{ const sc=Math.min(1,maxW/img.width); const c=document.createElement('canvas'); c.width=img.width*sc; c.height=img.height*sc; c.getContext('2d').drawImage(img,0,0,c.width,c.height); res(c.toDataURL('image/jpeg',q)); }; img.src=URL.createObjectURL(file); }); }

    function openSettings(){
      const roleLabel=t(profile.role);
      $('sheet-root').innerHTML=`<div class="overlay" id="ov"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${t('settings')}</div><div class="sheet-title">${profile.name||user.email}</div></div><button class="close-x" id="cx">×</button></div>
        <div class="card" style="display:grid;gap:8px;font-size:13px;">
          <div style="display:flex;justify-content:space-between;"><span style="color:rgba(26,26,26,0.6);">${t('email')}</span><span class="num">${user.email}</span></div>
          <div style="display:flex;justify-content:space-between;"><span style="color:rgba(26,26,26,0.6);">${t('role')}</span><span style="font-weight:600;color:var(--forest);">${roleLabel}</span></div>
        </div>
        <button class="btn-secondary btn-wide" id="logout-btn" style="color:var(--red);border-color:rgba(192,72,72,0.3);">${t('logout')}</button>
      </div></div>`;
      $('ov').onclick=closeSheet;$('cx').onclick=closeSheet;
      $('logout-btn').onclick=async()=>{ await signOut(auth); closeSheet(); };
    }

    // ============ INIT ============
    refreshLoginLabels(); applyLang();
    if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
  </script>
</body>
</html>
