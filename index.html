          }
          const blob = new Blob([JSON.stringify(out)], {type:'application/json'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `lecoin-PRE-RESET-${new Date().toISOString().replace(/[:.]/g,'-')}.json`;

          await new Promise(r=>setTimeout(r,400));

        // 🛡️ tappa 3 — backup automatico forzato

        if(!backupOk){
          toast(t('rstAutoBackupFail'),true);

          return;

    // 🗑️ تنفيذ الحذف الفعلي
    async function executeDataReset(items){
      const progress = $('dr-progress');
      const setProg = (msg)=>{ if(progress) progress.textContent = msg; };
      const currentUid = user.uid;
      let totalDeleted = 0;
      console.log('[RESET-EXEC] currentUid:', currentUid, '| PROTECTED:', PROTECTED_ADMIN_UID);
      // 🛡️ Snapshot pre-execution dell'admin protetto (per auto-repair se serve)
      let protectedAdminSnapshot = null;
      try {
        const snap = await getDoc(doc(db,'users',PROTECTED_ADMIN_UID));
        if(snap.exists()) protectedAdminSnapshot = snap.data();
        console.log('[RESET-EXEC] Protected admin snapshot:', protectedAdminSnapshot ? 'captured' : 'NOT FOUND');
      } catch(e) { console.warn('[RESET-EXEC] Could not snapshot protected admin:', e.message); }
      for(let i=0;i<items.length;i++){
        const it = items[i];
        setProg(`(${i+1}/${items.length}) ${it.id}…`);
        console.log(`[RESET-EXEC] (${i+1}/${items.length}) Processing "${it.id}" coll=${it.coll||'-'} special=${it.special||'-'}`);
        try{
          if(it.special==='productPhotos'){
            // تفريغ صور المنتجات (احتفاظ بالمنتجات)
            const qs = await getDocs(collection(db,'products'));
            for(const d of qs.docs){ await updateDoc(doc(db,'products',d.id),{photoUrl:''}); totalDeleted++; }
          } else if(it.special==='staffPhotos'){
            // تفريغ صور الموظفين (احتفاظ بالحسابات)
            const qs = await getDocs(collection(db,'users'));
            for(const d of qs.docs){ if(d.data().photoUrl){ await updateDoc(doc(db,'users',d.id),{photoUrl:''}); totalDeleted++; } }
          } else if(it.special==='customerPoints'){
            // تصفير نقاط العملاء (احتفاظ بهم) + مسح سجل النقاط
            const cqs = await getDocs(collection(db,'customers'));
            for(const d of cqs.docs){ await updateDoc(doc(db,'customers',d.id),{points:0,notifiedThresholdReached:false}); totalDeleted++; }
            // مسح سجل النقاط كمان (للتنظيف)
            const lqs = await getDocs(collection(db,'pointsLedger'));
            for(const d of lqs.docs){ await deleteDoc(doc(db,'pointsLedger',d.id)); totalDeleted++; }
          } else if(it.coll==='users'){
            // 🛡️ مسح الموظفين — يستثنى الأدمن المحمي + المستخدم الحالي + أي أدمن آخر
            const qs = await getDocs(collection(db,'users'));
            for(const d of qs.docs){
              const x = d.data();
              if(isProtectedAdmin(d.id)){ console.log('[RESET-EXEC]   skip PROTECTED admin', d.id); continue; }
              if(d.id===currentUid){ console.log('[RESET-EXEC]   skip current user', d.id); continue; }
              if(x.role==='admin'){ console.log('[RESET-EXEC]   skip other admin', d.id); continue; }
              await deleteDoc(doc(db,'users',d.id));
              totalDeleted++;
            }
          } else if(it.coll==='branches'){
            // 🛡️ Branches: comportamento speciale per non lockare l'admin
            // La filiale PRIMARIA è preservata, le altre cancellabili normalmente
            const qs = await getDocs(collection(db,'branches'));
            for(const d of qs.docs){
              if(d.id === PRIMARY_BRANCH_ID){
                console.log('[RESET-EXEC]   skip primary branch '+PRIMARY_BRANCH_ID+' (protected admin home)');
                continue;
              }
              await deleteDoc(doc(db,'branches',d.id));
              totalDeleted++;
            }
            console.log('[RESET-EXEC] branches: '+PRIMARY_BRANCH_ID+' preserved to avoid admin lockout');
          } else if(it.coll){
            // حذف عام لـ collection
            const qs = await getDocs(collection(db,it.coll));
            for(const d of qs.docs){ await deleteDoc(doc(db,it.coll,d.id)); totalDeleted++; }
          }
        }catch(err){ console.error('[RESET-EXEC] error for',it.id,err); }
      }
      // 🛡️ Auto-repair finale: garantisci che admin protetto sia integro
      try {
        const snap = await getDoc(doc(db,'users',PROTECTED_ADMIN_UID));
        if(!snap.exists() && protectedAdminSnapshot){
          console.warn('[RESET-EXEC] Protected admin doc was deleted! Restoring from snapshot.');
          await setDoc(doc(db,'users',PROTECTED_ADMIN_UID), protectedAdminSnapshot);
        } else if(snap.exists()){
          const data = snap.data();
          const needsFix = data.role!=='admin' || data.active===false || !Array.isArray(data.branchIds) || data.branchIds.length===0;
          if(needsFix){
            console.warn('[RESET-EXEC] Protected admin needs repair:', data);
            await updateDoc(doc(db,'users',PROTECTED_ADMIN_UID), {
              role:'admin',
              active:true,
              branchIds: (Array.isArray(data.branchIds) && data.branchIds.length>0) ? data.branchIds : [PRIMARY_BRANCH_ID]
            });
          }
        }
        // 🛡️ Garantisci che la filiale PRIMARIA esista (è la home dell'admin protetto)
        const primarySnap = await getDoc(doc(db,'branches',PRIMARY_BRANCH_ID));
        if(!primarySnap.exists()){
          console.warn('[RESET-EXEC] primary branch '+PRIMARY_BRANCH_ID+' missing! Restoring minimal version.');
          await setDoc(doc(db,'branches',PRIMARY_BRANCH_ID), PRIMARY_BRANCH_DEFAULTS);
        }
      } catch(e){ console.error('[RESET-EXEC] Auto-repair failed:', e); }
      setProg(`✓ ${totalDeleted} ${t('rstDocsDeleted')}`);
      console.log(`[RESET-EXEC] Total deleted: ${totalDeleted}`);
      // فاصل صغير للراحة قبل reload
      await new Promise(r=>setTimeout(r,1200));
    }

    function bindTransfer(actives){
      const sel=$('tr-prod'), dEl=$('tr-dest'), qEl=$('tr-qty');
      if(!sel) return;
      const refresh=()=>{
        const p=products.find(x=>x.id===sel.value);
        if(!p){ $('tr-cur').textContent=''; $('tr-after').textContent=''; return; }
        const inv=inventory[p.id]||{qty:0};
        $('tr-cur').innerHTML=`${t('currentQty')}: <span class="num" style="font-weight:700;">${inv.qty||0}</span>`;
        const n=parseInt(qEl.value)||0;
        $('tr-after').textContent = n>0 ? `${p.name}: ${(inv.qty||0)} → ${(inv.qty||0)-n}` : '';
      };
      sel.onchange=refresh; qEl.oninput=refresh;
      $('tr-scan')&&($('tr-scan').onclick=()=>smartScan('transfer'));
      $('tr-save').onclick=async()=>{
        const p=products.find(x=>x.id===sel.value);
        const dest=dEl.value;
        const n=parseInt(qEl.value)||0;
        if(!p){ toast(t('selectProduct'),true); return; }
        if(!dest){ toast(t('selectDestBranch'),true); return; }
        if(n<=0){ toast(t('required'),true); return; }
        const srcInv=inventory[p.id]||{qty:0,threshold:20,lastCost:0};
        if((srcInv.qty||0)<n){ toast(t('notEnoughStock'),true); return; }
        const b=$('tr-save'); b.disabled=true; b.textContent='...';
        try{
          // 1) ينقص من الفرع المصدر
          const srcQty=(srcInv.qty||0)-n;
          await setDoc(doc(db,'inventory',`${currentBranchId}_${p.id}`),{branchId:currentBranchId,productId:p.id,qty:srcQty,threshold:srcInv.threshold||20,lastCost:srcInv.lastCost||0},{merge:true});
          inventory[p.id]={qty:srcQty,threshold:srcInv.threshold||20,lastCost:srcInv.lastCost||0};
          // 2) يزيد في الفرع المستلم (نقرأ مخزونه الحالي مباشرة)
          let destData={qty:0,threshold:20,lastCost:srcInv.lastCost||0};
          try{ const ds=await getDoc(doc(db,'inventory',`${dest}_${p.id}`)); if(ds.exists()){ const x=ds.data(); destData={qty:x.qty||0,threshold:x.threshold||20,lastCost:x.lastCost||srcInv.lastCost||0}; } }catch(e){}
          const destQty=(destData.qty||0)+n;
          await setDoc(doc(db,'inventory',`${dest}_${p.id}`),{branchId:dest,productId:p.id,qty:destQty,threshold:destData.threshold||20,lastCost:destData.lastCost||0},{merge:true});
          // 3) يسجّل التحويل
          const ts=Date.now();
          await addDoc(collection(db,'transfers'),{fromBranchId:currentBranchId,toBranchId:dest,productId:p.id,name:p.name,qty:n,byUserId:user.uid,byName:profile.name||user.email,createdAt:ts,tzo:tzOffsetMin(ts)});
          transfersCache=null;
          toast(t('transferDone')); renderWarehouse();
        }catch(e){ console.error(e); toast(t('errorGen'),true); b.disabled=false; b.textContent='🔄 '+t('doTransfer'); }
      };
      loadTransferLog();
    }

      const upd=(pid)=>{
        const el=$('cnt-'+pid); const inv=inventory[pid]||{qty:0};
        const dEl=$('d-'+pid);
        if(el.value===''){ invCounts[pid]=undefined; delete invCounts[pid]; dEl.textContent='—'; dEl.style.color='rgba(26,26,26,0.4)'; recompSum(); return; }
        invCounts[pid]=el.value;
        const diff=(parseInt(el.value)||0)-(inv.qty||0);
        dEl.textContent=(diff>0?'+':diff<0?'−':'')+fmt(diff);
        dEl.style.color=diff>0?'var(--amber)':diff<0?'var(--red)':'var(--green)';
        recompSum();
      };
      const recompSum=()=>{
        let counted=0,surplus=0,shortage=0,valImpact=0;
        actives.forEach(p=>{ if(invCounts[p.id]===undefined)return; counted++;
          const inv=inventory[p.id]||{qty:0,lastCost:0}; const diff=(parseInt(invCounts[p.id])||0)-(inv.qty||0);
          if(diff>0)surplus++; else if(diff<0)shortage++; valImpact+=diff*(inv.lastCost||0); });
        $('cnt-sum').innerHTML=`${t('totalItems')}: <b>${counted}</b> · ${t('surplus')}: <b style="color:var(--amber);">${surplus}</b> · ${t('shortage')}: <b style="color:var(--red);">${shortage}</b><br>${t('valueImpact')}: <b class="num" style="color:${valImpact<0?'var(--red)':'var(--green)'};">${valImpact>0?'+':valImpact<0?'−':''}${fmt(valImpact)} ${t('currency')}</b>`;
      };
      actives.forEach(p=>{ const el=$('cnt-'+p.id); el.oninput=()=>upd(p.id); if(invCounts[p.id]!==undefined) upd(p.id); });
      // حفظ حد الطلب لكل منتج للفرع الحالي (عند مغادرة الخانة)
      actives.forEach(p=>{ const ro=$('ro-'+p.id); if(!ro)return; ro.onchange=async()=>{
        const v=parseInt(ro.value)||0; const id=currentBranchId+'_'+p.id; const inv=inventory[p.id]||{qty:0,lastCost:0};
        try{ await setDoc(doc(db,'inventory',id),{branchId:currentBranchId,productId:p.id,qty:inv.qty||0,threshold:v,lastCost:inv.lastCost||0},{merge:true});
          if(inventory[p.id]) inventory[p.id].threshold=v; else inventory[p.id]={qty:0,threshold:v,lastCost:0};
          toast(t('reorderSaved')); }catch(e){ console.error(e); toast(t('errorGen'),true); }
      }; });
      $('cnt-scan')&&($('cnt-scan').onclick=()=>smartScan('count'));
      recompSum();
      $('cnt-apply').onclick=async()=>{
        const lines=[];
        actives.forEach(p=>{ if(invCounts[p.id]===undefined)return;
          const inv=inventory[p.id]||{qty:0,lastCost:0}; const counted=parseInt(invCounts[p.id])||0;
          lines.push({pid:p.id,name:p.name,system:inv.qty||0,counted,diff:counted-(inv.qty||0),cost:inv.lastCost||0,threshold:inv.threshold||20}); });
        if(lines.length===0){ toast(t('noChanges'),true); return; }
        if(!confirm(t('confirmApplyInv'))) return;
        const b=$('cnt-apply'); b.disabled=true; b.textContent='...';
        try{
          for(const ln of lines){
            await setDoc(doc(db,'inventory',`${currentBranchId}_${ln.pid}`),{branchId:currentBranchId,productId:ln.pid,qty:ln.counted,threshold:ln.threshold,lastCost:ln.cost},{merge:true});
            inventory[ln.pid]={qty:ln.counted,threshold:ln.threshold,lastCost:ln.cost};
          }
          await addDoc(collection(db,'inventories'),{branchId:currentBranchId,userId:user.uid,userName:profile.name||user.email,createdAt:Date.now(),
            lines:lines.map(l=>({productId:l.pid,name:l.name,system:l.system,counted:l.counted,diff:l.diff,cost:l.cost}))});
          invCounts={};
          toast(t('invApplied'));
          showInvReport(lines);
        }catch(e){ console.error(e); toast(t('errorGen'),true); b.disabled=false; b.textContent='⚖️ '+t('applyInv'); }
      };
    }

    function printDoc(title, bodyHtml){
      const dir=T[lang].dir, align=dir==='rtl'?'right':'left';

      if(!w){ toast(t('errorGen'),true); return; }

        table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:18px;}

    function downloadCSV(filename, header, rows){
      const esc=c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`;
      const csv=[header].concat(rows).map(r=>r.map(esc).join(',')).join('\r\n');
      const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
      const url=URL.createObjectURL(blob); const a=document.createElement('a');
      a.href=url; a.download=filename; document.body.appendChild(a); a.click();
      setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },800);
    }

    // تصدير Excel (ملف .xls يفتح في إكسل مباشرة — بدون مكتبات)
    function downloadXLS(filename, title, header, rows){
      const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const th=header.map(h=>`<th style="background:#1F3A2E;color:#fff;border:1px solid #999;padding:5px;">${esc(h)}</th>`).join('');
      const trs=rows.map(r=>`<tr>${r.map(c=>`<td style="border:1px solid #ccc;padding:5px;">${esc(c)}</td>`).join('')}</tr>`).join('');
      const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body><table><tr><th colspan="${header.length}" style="font-size:15px;">${esc(title)}</th></tr><tr>${th}</tr>${trs}</table></body></html>`;
      const blob=new Blob(['\ufeff'+html],{type:'application/vnd.ms-excel;charset=utf-8;'});
      const url=URL.createObjectURL(blob); const a=document.createElement('a');
      a.href=url; a.download=filename; document.body.appendChild(a); a.click();
      setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },800);
    }
    // يبني جدول HTML من header+rows لاستخدامه في الطباعة/PDF
    function tableHtml(title, header, rows){
      // 🆕 v2.6.4 — Design premium: zebra stripes, header colorato, totale evidenziato
      // 🆕 v2.7.2 — Fix: tolto uppercase forzato (rompeva l'arabo e mostrava chiavi i18n mancanti in raw); scroll orizzontale garantito
      const totalLabel = (typeof t==='function') ? ('Σ '+t('totalRow')) : 'Σ TOTAL';
      const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
      const isSubRow = r => String(r[0]||'').trim().startsWith('↳') || String(r[0]||'').trim().startsWith('  ↳');
      const isAr = (typeof lang==='string' && lang==='ar');
      const th = header.map((h,i) =>
        `<th style="background:#F0EBDF;color:#1F3A2E;padding:11px 10px;text-align:${i===0?'start':'end'};font-weight:700;font-size:11.5px;letter-spacing:0.2px;border-bottom:2px solid #C9A84C;white-space:nowrap;">${esc(h)}</th>`
      ).join('');
      let zebraIdx = 0;
      const trs = rows.map(r => {
        const isTotal = String(r[0]||'') === totalLabel;
        const isSub = !isTotal && isSubRow(r);
        if(isTotal){
          return `<tr style="background:#1F3A2E;color:#FAF6EE;">` +
            r.map((c,i) => `<td style="padding:13px 10px;text-align:${i===0?'start':'end'};font-size:13px;font-weight:800;border-top:2px solid #C9A84C;white-space:nowrap;">${esc(c)}</td>`).join('') +
            `</tr>`;
        }
        if(isSub){
          return `<tr style="background:rgba(31,58,46,0.025);">` +
            r.map((c,i) => `<td style="padding:6px 10px;text-align:${i===0?'start':'end'};font-size:11.5px;color:rgba(26,26,26,0.7);font-style:italic;border-bottom:1px dotted rgba(26,26,26,0.06);white-space:nowrap;${i===0?'padding-'+(isAr?'right':'left')+':24px;':''}">${esc(c)}</td>`).join('') +
            `</tr>`;
        }
        const bg = (zebraIdx++)%2===0 ? '#FFFFFF' : '#FAF6EE';
        return `<tr style="background:${bg};">` +
          r.map((c,i) => `<td style="padding:10px;text-align:${i===0?'start':'end'};font-size:12.5px;color:#1A1A1A;border-bottom:1px solid rgba(26,26,26,0.04);font-weight:${i===0?'600':'500'};white-space:nowrap;">${esc(c)}</td>`).join('') +
          `</tr>`;
      }).join('');
      return `<div style="margin:10px 0;">
        <div style="font-size:14.5px;font-weight:800;color:#1F3A2E;margin:0 0 10px;display:flex;align-items:center;gap:6px;">📋 ${esc(title)}</div>
        <div style="overflow-x:auto;overflow-y:hidden;border-radius:12px;border:1px solid rgba(26,26,26,0.07);box-shadow:0 1px 4px rgba(26,26,26,0.04);background:#fff;-webkit-overflow-scrolling:touch;max-width:100%;">
          <table style="border-collapse:collapse;font-family:inherit;width:auto;min-width:100%;">
            <thead><tr>${th}</tr></thead>
            <tbody>${trs}</tbody>
          </table>
        </div>
      </div>`;
    }

    function compress(file,maxW=600,q=0.7){ return new Promise(res=>{ const img=new Image(); img.onload=()=>{ const sc=Math.min(1,maxW/img.width); const c=document.createElement('canvas'); c.width=img.width*sc; c.height=img.height*sc; c.getContext('2d').drawImage(img,0,0,c.width,c.height); res(c.toDataURL('image/jpeg',q)); }; img.src=URL.createObjectURL(file); }); }

    async function importAllData(file,btn){
      if(!file) return;
      let data;
      try{ data=JSON.parse(await file.text()); }catch(e){ toast(t('importBad'),true); return; }
      if(!data||!data.collections){ toast(t('importBad'),true); return; }
      if(!confirm(t('importConfirm'))) return;
      if(btn){ btn.disabled=true; btn.textContent=t('importing'); }
      try{
        for(const c of BACKUP_COLLECTIONS){
          const arr=data.collections[c]; if(!Array.isArray(arr)) continue;
          for(const rec of arr){ const {id,...rest}=rec; if(!id) continue; await setDoc(doc(db,c,id),rest); }
        }
        toast(t('importDone'));
        setTimeout(()=>location.reload(),1200); // إعادة تحميل عشان البيانات الجديدة تظهر
      }catch(e){ console.error(e); toast(t('errorGen'),true); if(btn){ btn.disabled=false; btn.textContent='📥 '+t('importData'); } }
    }

    // ===== التقارير الشاملة: 5 تقارير + فلتر تاريخ + تصدير PDF/Excel/CSV =====
    // ===== تصفير قاعدة البيانات (أدمن فقط، تأكيد مزدوج + RESET) =====
    // مسح سجلات المخزون لفروع مش موجودة (اتقفلت/اتمسحت)
    async function cleanGhostInventory(btn){
      if(btn){ btn.disabled=true; btn.textContent='...'; }
      try{
        const bs=await getDocs(collection(db,'branches'));
        const validIds=new Set(); bs.forEach(d=>validIds.add(d.id));
        const inv=await getDocs(collection(db,'inventory'));
        const ghosts=[]; inv.forEach(d=>{ const x=d.data(); if(!validIds.has(x.branchId)) ghosts.push(d.id); });
        if(ghosts.length===0){ toast(t('ghostNone')); return; }
        if(!confirm(`${t('ghostFound')}: ${ghosts.length}\n${t('cleanGhostBtn')}?`)) return;
        for(const id of ghosts){ await deleteDoc(doc(db,'inventory',id)); }
        toast(`${t('ghostDeleted')} (${ghosts.length})`);
        setTimeout(()=>location.reload(),1200);
      }catch(e){ console.error(e); toast(t('errorGen'),true); }
      finally{ if(btn){ btn.disabled=false; btn.textContent='🧹 '+t('cleanGhostBtn'); } }
    }
    async function wipeCollection(name){
      const qs=await getDocs(collection(db,name));
      for(const d of qs.docs){ await deleteDoc(doc(db,name,d.id)); }
      return qs.size;
    }
    async function resetDatabase(opts, btn){
      // opts: {sales,loads,transfers,shifts,custody,inventoryZero}
      const any=opts.sales||opts.loads||opts.transfers||opts.shifts||opts.custody||opts.inventories||opts.inventoryZero;
      if(!any){ toast(t('dbResetNothing'),true); return; }
      if(btn){ btn.disabled=true; btn.textContent=t('dbResetting'); }
      try{
        if(opts.sales) await wipeCollection('sales');        // المبيعات (الريفاند والمرتجعات جوّاها فبتتمسح معاها)
        if(opts.loads) await wipeCollection('loads');         // التوريد
        if(opts.transfers) await wipeCollection('transfers'); // التحويلات
        if(opts.shifts) await wipeCollection('shifts');       // الورديات
        if(opts.custody) await wipeCollection('custodyTransfers'); // العُهد
        if(opts.inventories) await wipeCollection('inventories'); // سجلات الجرد
        if(opts.inventoryZero){                               // تصفير كل المخزون لكل الفروع
          const qs=await getDocs(collection(db,'inventory'));
          for(const d of qs.docs){ const x=d.data(); await setDoc(doc(db,'inventory',d.id),{branchId:x.branchId,productId:x.productId,qty:0,threshold:x.threshold||20,lastCost:x.lastCost||0}); }
        }
        toast(t('dbResetDone'));
        setTimeout(()=>location.reload(),1200);
      }catch(e){ console.error(e); toast(t('errorGen'),true); if(btn){ btn.disabled=false; btn.textContent='🧨 '+t('dbResetBtn'); } }
    }

    async function buildReportData(fromTs, toTs){
      const visIds = profile.role==='admin' ? branches.map(b=>b.id) : (profile.branchIds||[]);
      // حمّل المبيعات + الاستلامات + الورديات + كل المخزون + التحويلات + العملاء (للتقارير الجديدة)
      let sales=[], loadsArr=[], shiftsArr=[], invAll=[], transfersArr=[], customersArr=[];
      if(profile.role==='admin'){ (await getDocs(collection(db,'sales'))).forEach(d=>sales.push({id:d.id,...d.data()})); }
      else { for(const b of visIds){ (await getDocs(query(collection(db,'sales'),where('branchId','==',b)))).forEach(d=>sales.push({id:d.id,...d.data()})); } }
      (await getDocs(collection(db,'loads'))).forEach(d=>loadsArr.push(d.data()));
      (await getDocs(collection(db,'shifts'))).forEach(d=>shiftsArr.push(d.data()));
      (await getDocs(collection(db,'inventory'))).forEach(d=>invAll.push(d.data()));
      try{ (await getDocs(collection(db,'transfers'))).forEach(d=>transfersArr.push(d.data())); }catch(e){ console.warn('[reports] transfers load failed:',e.message); }
      try{ (await getDocs(collection(db,'customers'))).forEach(d=>customersArr.push({id:d.id,...d.data()})); }catch(e){ console.warn('[reports] customers load failed:',e.message); }
      const inRange=ts=>ts>=fromTs&&ts<=toTs;
      sales=sales.filter(s=>inRange(s.createdAt) && (profile.role==='admin'||visIds.includes(s.branchId)));
      loadsArr=loadsArr.filter(l=>inRange(l.createdAt) && (profile.role==='admin'||visIds.includes(l.branchId)));
      shiftsArr=shiftsArr.filter(s=>inRange(s.openAt) && (profile.role==='admin'||visIds.includes(s.branchId)));
      invAll=invAll.filter(i=>profile.role==='admin'||visIds.includes(i.branchId));
      const transfersInRange = transfersArr.filter(tr=>inRange(tr.createdAt||0));
      const effTotal=s=>Math.max(0,(s.total||0)-(s.refundTotal||0));
      const rmFn=s=>{ const m={}; if(s.voided)(s.items||[]).forEach(it=>m[it.productId]=(m[it.productId]||0)+it.qty); (s.returns||[]).forEach(r=>(r.lines||[]).forEach(l=>m[l.productId]=(m[l.productId]||0)+l.qty)); return m; };
      const bName=id=>{const b=branches.find(x=>x.id===id);return b?(lang==='ar'?b.nameAr:b.nameEn):id;};
      const pCost=pid=>{const p=products.find(x=>x.id===pid);return p?(p.cost||0):0;};
      const uName=uid=>{const u=users.find(x=>x.uid===uid);return u?(u.name||u.email):'';};
      const catName=id=>{const c=categories.find(x=>x.id===id);return c?(lang==='ar'?c.nameAr:c.nameEn):'—';};
      const pNameOf=pid=>{const p=products.find(x=>x.id===pid);return p?pName(p):'—';};
      const cur=t('currency');

      // 🆕 v2.5.4 — Helper: aggiunge riga totale a un report
      // spec: {count:[idx...], money:[idx...], label?:string}
      function _sumColRow(rep, spec){
        if(!rep.rows || rep.rows.length===0) return rep;
        const ncols = rep.header.length;
        const tot = new Array(ncols).fill('');
        tot[0] = spec.label || ('Σ '+t('totalRow'));
        const sumAt = (idx, isMoney) => {
          let s = 0;
          rep.rows.forEach(r => {
            if(idx>=r.length) return;
            const v = parseFloat(String(r[idx]).replace(/[^0-9.\-]/g, ''));
            if(!isNaN(v)) s += v;
          });
          return isMoney ? fmt(s) : (Math.round(s*100)/100);
        };
        (spec.count||[]).forEach(i => { tot[i] = sumAt(i, false); });
        (spec.money||[]).forEach(i => { tot[i] = sumAt(i, true); });
        rep.rows = [...rep.rows, tot];
        return rep;
      }
      // ===== المبيعات: فاتورة بفاتورة =====
      const sortedSales=[...sales].sort((a,b)=>a.createdAt-b.createdAt);
      const invRows=[];
      const invSubRows=[]; // 🆕 v2.6.3: sub-rows per riga (Full mode espande)
      sortedSales.forEach(s=>{ if(s.voided) return; const rm=rmFn(s);
        let pc=0, prof=0;
        const itemSubs=[];
        (s.items||[]).forEach(it=>{
          const net=Math.max(0,it.qty-(rm[it.productId]||0));
          if(net<=0) return;
          const cost=pCost(it.productId);
          const totalLine = net*(it.price||0);
          const profitLine = net*((it.price||0)-cost);
          pc+=net;
          prof+=profitLine;
          // Sub-row: indent + colonne adattate
          itemSubs.push([
            '  ↳ '+it.name,        // 0: nome prodotto con indent
            fmt(it.price||0),       // 1: prezzo unitario
            '',                     // 2: branch (vuoto per sub)
            '',                     // 3: cashier (vuoto)
            '',                     // 4: payment (vuoto)
            net,                    // 5: qty (allineata con "n prodotti")
            fmt(totalLine),         // 6: totale linea (allineato con totale fattura)
            fmt(profitLine)         // 7: profit linea (allineato con profit)
          ]);
        });
        invRows.push([fmtDT(s.createdAt,s.tzo), '#'+(s.receiptNo||''), bName(s.branchId), s.userName||uName(s.userId), s.payMethod==='instapay'?t('mInstapay'):t('mCash'), pc, fmt(effTotal(s)), fmt(prof)]);
        invSubRows.push(itemSubs);
      });
      const salesByInvoice={ title:t('repSalesByInvoice'), header:[t('colDateTime'),t('colInvoice'),t('branch'),t('cashierLbl'),t('colPayment'),t('colProdCount'),t('colInvTotal'),t('colInvProfit')], rows:invRows, subRows:invSubRows };
      // ===== المبيعات: تفصيل المنتجات (سطر لكل منتج في كل فاتورة) =====
      const detRows=[];
      sortedSales.forEach(s=>{ if(s.voided) return; const rm=rmFn(s);
        (s.items||[]).forEach(it=>{ const net=Math.max(0,it.qty-(rm[it.productId]||0)); if(net<=0) return; const cost=pCost(it.productId);
          detRows.push([fmtDT(s.createdAt,s.tzo), '#'+(s.receiptNo||''), it.name, fmt(cost), fmt(it.price||0), net, fmt(net*(it.price||0)), fmt(net*((it.price||0)-cost))]);
        }); });
      const salesDetail={ title:t('repSalesDetail'), header:[t('colDateTime'),t('colInvoice'),t('colProduct'),t('cost'),t('colSell'),t('colQty'),t('colLineRev'),t('colLineProfit')], rows:detRows };
      // ---- ملخص بالمنتج ----
      const soldMap={};
      sales.forEach(s=>{ if(s.voided)return; const rm=rmFn(s); (s.items||[]).forEach(it=>{ const net=Math.max(0,it.qty-(rm[it.productId]||0)); if(!soldMap[it.productId])soldMap[it.productId]={qty:0,rev:0}; soldMap[it.productId].qty+=net; soldMap[it.productId].rev+=net*(it.price||0); }); });
      const purMap={}; loadsArr.forEach(l=>{ purMap[l.productId]=(purMap[l.productId]||0)+(l.qty||0); });
      const stockMap={}; invAll.forEach(i=>{ stockMap[i.productId]=(stockMap[i.productId]||0)+(i.qty||0); });
      const productsRep={ title:t('repProducts'), header:[t('colProduct'),t('unitsSold'),t('revenue'),t('purchased'),t('stock'),t('cost'),t('price'),t('grossProfit')],
        rows:products.map(p=>{ const sm=soldMap[p.id]||{qty:0,rev:0}; const prof=sm.rev-sm.qty*(p.cost||0);
          return [pName(p), sm.qty, fmt(sm.rev), purMap[p.id]||0, stockMap[p.id]||0, fmt(p.cost||0), fmt(p.price||0), fmt(prof)]; }) };
      // ===== المشتريات: تفصيل (سطر لكل استلام) =====
      const sortedLoads=[...loadsArr].sort((a,b)=>a.createdAt-b.createdAt);
      const purRows=sortedLoads.map(l=>[fmtDT(l.createdAt,l.tzo), l.supplierName||t('noSupplier'), l.name, fmt(l.unitCost||0), l.qty||0, fmt(l.total||0), l.userName||'']);
      const purchasesDetail={ title:t('repPurchasesDetail'), header:[t('colDateTime'),t('supplier'),t('colProduct'),t('colUnitCost'),t('colQty'),t('colInvTotal'),t('colReceivedBy')], rows:purRows };
      // ---- ملخص الموردين ----
      const supMap={};
      loadsArr.forEach(l=>{ const k=l.supplierName||t('noSupplier'); if(!supMap[k])supMap[k]={qty:0,cost:0,cnt:0}; supMap[k].qty+=(l.qty||0); supMap[k].cost+=(l.total||0); supMap[k].cnt++; });
      const suppliersRep={ title:t('repSuppliers'), header:[t('supplier'),t('itemsN'),t('purchased'),t('cogs')+'('+cur+')'],
        rows:Object.entries(supMap).map(([k,v])=>[k,v.cnt,v.qty,fmt(v.cost)]) };
      // ===== الفروع: تفصيل (سطر لكل منتج في كل فرع) =====
      const brProd={}; // branchId -> productId -> {qty,rev,prof}
      sales.forEach(s=>{ if(s.voided)return; const rm=rmFn(s); (s.items||[]).forEach(it=>{ const net=Math.max(0,it.qty-(rm[it.productId]||0)); if(net<=0)return; brProd[s.branchId]=brProd[s.branchId]||{}; const m=brProd[s.branchId]; if(!m[it.productId])m[it.productId]={qty:0,rev:0,prof:0}; m[it.productId].qty+=net; m[it.productId].rev+=net*(it.price||0); m[it.productId].prof+=net*((it.price||0)-pCost(it.productId)); }); });
      const brDetRows=[];
      visIds.forEach(bid=>{ const m=brProd[bid]; if(!m)return; Object.entries(m).sort((a,b)=>b[1].rev-a[1].rev).forEach(([pid,v])=>{ const p=products.find(x=>x.id===pid); brDetRows.push([bName(bid), p?pName(p):'—', v.qty, fmt(v.rev), fmt(v.prof)]); }); });
      const branchesDetail={ title:t('repBranchesDetail'), header:[t('branch'),t('colProduct'),t('colQty'),t('revenue'),t('colLineProfit')], rows:brDetRows };
      // ---- ملخص الفروع ----
      const brRev={}, brCnt={}, brStock={};
      sales.forEach(s=>{ brRev[s.branchId]=(brRev[s.branchId]||0)+effTotal(s); if(!s.voided)brCnt[s.branchId]=(brCnt[s.branchId]||0)+1; });
      invAll.forEach(i=>{ const p=products.find(x=>x.id===i.productId); brStock[i.branchId]=(brStock[i.branchId]||0)+(i.qty||0)*(p?(p.price||0):0); });
      // 🆕 v2.6.4 — subRows branches: top 5 prodotti per filiale
      const brSubRows = visIds.map(bid=>{
        const m=brProd[bid]; if(!m) return [];
        return Object.entries(m).sort((a,b)=>b[1].rev-a[1].rev).slice(0,5).map(([pid,v])=>{
          const p=products.find(x=>x.id===pid);
          return ['↳ '+(p?pName(p):'—'), fmt(v.rev), v.qty, fmt(v.prof||0)];
        });
      });
      const branchesRep={ title:t('repBranches'), header:[t('branch'),t('revenue'),t('invoicesShort'),t('stockVal')],
        rows:visIds.map(id=>[bName(id), fmt(brRev[id]||0), brCnt[id]||0, fmt(brStock[id]||0)]), subRows:brSubRows };
      // ===== الموظفين: تفصيل (سطر لكل فاتورة) =====
      const usrDetRows=[];
      sortedSales.forEach(s=>{ if(s.voided)return; const rm=rmFn(s); let pc=0,prof=0; (s.items||[]).forEach(it=>{ const net=Math.max(0,it.qty-(rm[it.productId]||0)); pc+=net; prof+=net*((it.price||0)-pCost(it.productId)); });
        usrDetRows.push([s.userName||uName(s.userId), fmtDT(s.createdAt,s.tzo), '#'+(s.receiptNo||''), s.payMethod==='instapay'?t('mInstapay'):t('mCash'), pc, fmt(effTotal(s)), fmt(prof)]); });
      usrDetRows.sort((a,b)=>String(a[0]).localeCompare(String(b[0])));
      const usersDetail={ title:t('repUsersDetail'), header:[t('cashierLbl'),t('colDateTime'),t('colInvoice'),t('colPayment'),t('colProdCount'),t('colInvTotal'),t('colInvProfit')], rows:usrDetRows };
      // ---- ملخص المستخدمين ----
      const uSales={}, uCnt={}, uMs={};
      sales.forEach(s=>{ uSales[s.userId]=(uSales[s.userId]||0)+effTotal(s); if(!s.voided)uCnt[s.userId]=(uCnt[s.userId]||0)+1; });
      shiftsArr.forEach(s=>{ if(s.status==='closed'&&s.workedMs) uMs[s.userId]=(uMs[s.userId]||0)+s.workedMs; });
      const usersRep={ title:t('repUsers'), header:[t('name'),t('role'),t('revenue'),t('invoicesShort'),t('hoursWorked')],
        rows:users.map(u=>[u.name||u.email, t(u.role), fmt(uSales[u.uid]||0), uCnt[u.uid]||0, ((uMs[u.uid]||0)/3600000).toFixed(1)]) };
      // ===== الأرباح: إجمالي + لكل فرع =====
      const revTot=sales.reduce((a,s)=>a+effTotal(s),0);
      let cogsTot=0; sales.forEach(s=>{ if(s.voided)return; const rm=rmFn(s); (s.items||[]).forEach(it=>{ const net=Math.max(0,it.qty-(rm[it.productId]||0)); cogsTot+=net*pCost(it.productId); }); });
      const purTot=loadsArr.reduce((a,l)=>a+(l.total||0),0);
      const profRows=[ [t('revenue'),fmt(revTot)], [t('cogs'),fmt(cogsTot)], [t('grossProfit'),fmt(revTot-cogsTot)], [t('purchasesTotal'),fmt(purTot)] ];
      // تفصيل ربح كل فرع
      visIds.forEach(bid=>{ let r=0,c=0; sales.forEach(s=>{ if(s.branchId!==bid||s.voided)return; r+=effTotal(s); const rm=rmFn(s); (s.items||[]).forEach(it=>{ const net=Math.max(0,it.qty-(rm[it.productId]||0)); c+=net*pCost(it.productId); }); });
        if(r>0) profRows.push([bName(bid)+' — '+t('grossProfit'), fmt(r-c)]); });
      const profitsRep={ title:t('repProfits'), header:[t('name'),cur], rows:profRows };

      // ============ 🆕 NUOVI REPORT BUSINESS INTELLIGENCE (v2.5.3) ============

      // === 1. Magazzino — Dettaglio per filiale ===
      const invDetRows = [];
      invAll.forEach(i=>{
        const p=products.find(x=>x.id===i.productId); if(!p) return;
        const qty = i.qty||0;
        if(qty<=0) return;
        const cost = i.lastCost||p.cost||0;
        const price = p.price||0;
        const valCost = qty*cost;
        const valPrice = qty*price;
        invDetRows.push([bName(i.branchId), pName(p), catName(p.categoryId), qty, fmt(cost), fmt(valCost), fmt(valPrice), fmt(valPrice-valCost)]);
      });
      invDetRows.sort((a,b)=>String(a[0]).localeCompare(String(b[0])) || (parseFloat(String(b[5]).replace(/[^0-9.\-]/g,''))-parseFloat(String(a[5]).replace(/[^0-9.\-]/g,''))));
      const inventoryByBranch = { title:t('repInvByBranch'), header:[t('branch'),t('colProduct'),t('category'),t('colQty'),t('cost'),t('valCost'),t('valPrice'),t('marginThe')], rows:invDetRows };

      // === 2. Magazzino — Riassunto per prodotto (cross-filiale) ===
      const prodAgg = {}; // pid -> {qty,valCost,valPrice,cost,price}
      invAll.forEach(i=>{
        const p=products.find(x=>x.id===i.productId); if(!p) return;
        const qty=i.qty||0;
        const cost=i.lastCost||p.cost||0;
        const price=p.price||0;
        if(!prodAgg[p.id]) prodAgg[p.id]={qty:0,valCost:0,valPrice:0,cost,price};
        prodAgg[p.id].qty += qty;
        prodAgg[p.id].valCost += qty*cost;
        prodAgg[p.id].valPrice += qty*price;
      });
      // Per sub-rows: distribuzione per filiale di ogni prodotto
      const invByPB = {}; // pid → {bid → {qty, cost}}
      invAll.forEach(i=>{
        const p=products.find(x=>x.id===i.productId); if(!p) return;
        if(!invByPB[i.productId]) invByPB[i.productId]={};
        invByPB[i.productId][i.branchId]={ qty:i.qty||0, cost:i.lastCost||p.cost||0 };
      });
      const sortedProds = products.map(p=>({p, a:prodAgg[p.id]||{qty:0,valCost:0,valPrice:0,cost:p.cost||0,price:p.price||0}})).filter(x=>x.a.qty>0).sort((a,b)=>b.a.valCost-a.a.valCost);
      const invSumRows = sortedProds.map(({p,a})=>[pName(p), catName(p.categoryId), a.qty, fmt(a.cost), fmt(a.price), fmt(a.valCost), fmt(a.valPrice)]);
      // 🆕 v2.6.4 — Sub-rows: filiali in cui il prodotto è presente
      const invSumSubRows = sortedProds.map(({p,a})=>{
        const distrib = invByPB[p.id] || {};
        return Object.entries(distrib).filter(([,v])=>v.qty>0).sort((a,b)=>b[1].qty-a[1].qty).map(([bid,v])=>{
          const b=branches.find(x=>x.id===bid);
          const bn = b ? (lang==='ar'?b.nameAr:b.nameEn) : bid;
          return ['↳ '+bn, '', v.qty, fmt(v.cost), fmt(p.price||0), fmt(v.qty*v.cost), fmt(v.qty*(p.price||0))];
        });
      });
      const inventorySummary = { title:t('repInvSummary'), header:[t('colProduct'),t('category'),t('colQty'),t('cost'),t('price'),t('valCost'),t('valPrice')], rows:invSumRows, subRows:invSumSubRows };

      // === 3. Capitale per filiale (snapshot) ===
      const brCapital = {}; // bid -> {valCost,valPrice}
      invAll.forEach(i=>{
        const p=products.find(x=>x.id===i.productId); if(!p) return;
        const qty=i.qty||0;
        const cost=i.lastCost||p.cost||0;
        const price=p.price||0;
        if(!brCapital[i.branchId]) brCapital[i.branchId]={valCost:0,valPrice:0};
        brCapital[i.branchId].valCost += qty*cost;
        brCapital[i.branchId].valPrice += qty*price;
      });
      const totCapital = Object.values(brCapital).reduce((a,b)=>a+b.valCost,0);
      const capRows = visIds.map(bid=>{
        const c=brCapital[bid]||{valCost:0,valPrice:0};
        const pct = totCapital>0 ? Math.round(c.valCost/totCapital*1000)/10 : 0;
        return [bName(bid), fmt(c.valCost), fmt(c.valPrice), fmt(c.valPrice-c.valCost), pct+'%'];
      });
      const capitalByBranch = { title:t('repCapitalSnapshot'), header:[t('branch'),t('valCost'),t('valPrice'),t('marginThe'),t('pctTotal')], rows:capRows };

      // === 4. Ciclo del capitale (Δ periodo) ===
      // Capitale_fine = stock attuale (valore-costo)
      // Capitale_inizio = Capitale_fine + COGS - Acquisti + Trasferimenti_OUT - Trasferimenti_IN
      const flowRows = visIds.map(bid=>{
        const valEnd = brCapital[bid] ? brCapital[bid].valCost : 0;
        let cogsBr=0;
        sales.forEach(s=>{ if(s.voided||s.branchId!==bid) return; const rm=rmFn(s); (s.items||[]).forEach(it=>{ const net=Math.max(0,it.qty-(rm[it.productId]||0)); cogsBr+=net*pCost(it.productId); }); });
        let purchBr=0;
        loadsArr.forEach(l=>{ if(l.branchId===bid) purchBr+=(l.total||0); });
        let trIn=0, trOut=0;
        transfersInRange.forEach(tr=>{
          const p=products.find(x=>x.id===tr.productId);
          const unitCost=p?(p.cost||0):0;
          const val=(tr.qty||0)*unitCost;
          if(tr.toBranchId===bid) trIn+=val;
          if(tr.fromBranchId===bid) trOut+=val;
        });
        const valStart = valEnd + cogsBr - purchBr + trOut - trIn;
        const delta = valEnd - valStart;
        const deltaPct = valStart>0 ? Math.round(delta/valStart*1000)/10 : 0;
        return [bName(bid), fmt(valStart), fmt(purchBr), fmt(cogsBr), fmt(trIn-trOut), fmt(valEnd), fmt(delta), deltaPct+'%'];
      });
      const capitalFlow = { title:t('repCapitalFlow'), header:[t('branch'),t('capStart'),t('purchasesIn'),t('cogsOut'),t('transfersNet'),t('capEnd'),t('deltaCap'),t('deltaPct')], rows:flowRows };

      // === 5. Categorie — Performance ===
      const catAgg = {};
      categories.forEach(c=>{ catAgg[c.id]={prodCount:0,soldQty:0,rev:0,cogs:0,stockQty:0,valCost:0,valPrice:0}; });
      products.forEach(p=>{
        if(!catAgg[p.categoryId]) catAgg[p.categoryId]={prodCount:0,soldQty:0,rev:0,cogs:0,stockQty:0,valCost:0,valPrice:0};
        if(p.active!==false) catAgg[p.categoryId].prodCount++;
        const sm=soldMap[p.id]||{qty:0,rev:0};
        catAgg[p.categoryId].soldQty += sm.qty;
        catAgg[p.categoryId].rev += sm.rev;
        catAgg[p.categoryId].cogs += sm.qty*(p.cost||0);
        const sa=prodAgg[p.id]||{qty:0,valCost:0,valPrice:0};
        catAgg[p.categoryId].stockQty += sa.qty;
        catAgg[p.categoryId].valCost += sa.valCost;
        catAgg[p.categoryId].valPrice += sa.valPrice;
      });
      // Ordinato per revenue desc per Standard mode (top categorie prima)
      const catEntries = Object.entries(catAgg).filter(([cid,v])=>v.prodCount>0||v.stockQty>0).sort((a,b)=>b[1].rev-a[1].rev);
      const catRows = catEntries.map(([cid,v])=>{
        const cN = catName(cid);
        const gp = v.rev - v.cogs;
        const margPct = v.rev>0 ? Math.round(gp/v.rev*1000)/10 : 0;
        return [cN, v.prodCount, v.soldQty, fmt(v.rev), fmt(gp), margPct+'%', v.stockQty, fmt(v.valCost), fmt(v.valPrice)];
      });
      // 🆕 v2.6.4 — Sub-rows: per ogni categoria, lista prodotti ordinati per revenue
      const catSubRows = catEntries.map(([cid,v])=>{
        const prodsInCat = products.filter(p=>p.categoryId===cid).map(p=>{
          const sm=soldMap[p.id]||{qty:0,rev:0};
          const sa=prodAgg[p.id]||{qty:0,valCost:0,valPrice:0};

        }).sort((a,b)=>(b.sm.rev-a.sm.rev) || (b.sa.valCost-a.sa.valCost)).slice(0,10);
        return prodsInCat.map(({p,sm,sa,gp})=>[
          '↳ '+pName(p),
          '', // prodCount vuoto
          sm.qty,
          fmt(sm.rev),
          fmt(gp),
          '', // marginPct
          sa.qty,
          fmt(sa.valCost),
          fmt(sa.valPrice)
        ]);
      });
      const categoriesRep = { title:t('repCategories'), header:[t('category'),t('prodCount'),t('unitsSold'),t('revenue'),t('grossProfit'),t('marginPct'),t('stock'),t('valCost'),t('valPrice')], rows:catRows, subRows:catSubRows };

      // === 6. Cross-filiale — Matrice prodotto×filiale ===
      const stockByPB = {}; // {pid: {bid: qty}}
      const soldByPB  = {}; // {pid: {bid: qty}}
      invAll.forEach(i=>{
        if(!stockByPB[i.productId]) stockByPB[i.productId]={};
        stockByPB[i.productId][i.branchId]=(stockByPB[i.productId][i.branchId]||0)+(i.qty||0);
      });
      sales.forEach(s=>{
        if(s.voided) return;
        const rm=rmFn(s);
        (s.items||[]).forEach(it=>{
          const net=Math.max(0,it.qty-(rm[it.productId]||0));
          if(net<=0) return;
          if(!soldByPB[it.productId]) soldByPB[it.productId]={};
          soldByPB[it.productId][s.branchId]=(soldByPB[it.productId][s.branchId]||0)+net;
        });
      });
      const crossHeader = [t('colProduct')];
      visIds.forEach(bid=>{ crossHeader.push(`${bName(bid)} · ${t('stock')}`, `${bName(bid)} · ${t('sold')}`); });
      const crossRows = products.filter(p=>p.active!==false).map(p=>{
        const row=[pName(p)];
        visIds.forEach(bid=>{

        });

        if(!custStats[cid]) custStats[cid]={count:0,spend:0,lastBuy:0};
        custStats[cid].count++;
        custStats[cid].spend += effTotal(s);
        custStats[cid].lastBuy = Math.max(custStats[cid].lastBuy, s.createdAt||0);
      });
      // 🆕 v2.6.4 — Helper: per ogni cliente, lista ultime 10 fatture

      const topSpendEntries = Object.entries(custStats).sort((a,b)=>b[1].spend-a[1].spend).slice(0,50);
      const topSpendRows = topSpendEntries.map(([cid,st])=>{

      const topSpendSubRows = topSpendEntries.map(([cid])=>{

        return sales.filter(s=>s.customerId===cid && !s.voided)
          .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))
          .slice(0,10)
          .map(s=>{
            const qty = (s.items||[]).reduce((a,it)=>a+it.qty,0);

      const topCustomersBySpend = { title:t('repTopCustomersSpend'), header:[t('clientName'),t('empPhone'),t('invoicesShort'),t('totalSpend'),t('avgSpend'),t('pointsBalance'),t('lastBuy')], rows:topSpendRows, subRows:topSpendSubRows };

      const topFreqEntries = Object.entries(custStats).filter(([,st])=>st.count>=2).sort((a,b)=>b[1].count-a[1].count).slice(0,50);

        const custSales = sales.filter(s=>s.customerId===cid && !s.voided).sort((a,b)=>a.createdAt-b.createdAt);
        let avgDays=0;
        if(custSales.length>=2){
          const totDays=(custSales[custSales.length-1].createdAt-custSales[0].createdAt)/86400000;
          avgDays=Math.round((totDays/(custSales.length-1))*10)/10;
        }
        return [nm, ph, st.count, avgDays, fmt(st.spend)];

      const topFreqSubRows = topFreqEntries.map(([cid])=>{

            const qty = (s.items||[]).reduce((a,it)=>a+it.qty,0);

          });
      });
      const topCustomersByFreq = { title:t('repTopCustomersFreq'), header:[t('clientName'),t('empPhone'),t('invoicesShort'),t('avgDaysBetween'),t('totalSpend')], rows:topFreqRows, subRows:topFreqSubRows };

      // === 9. Best-seller per filiale (top 10 per filiale) ===
      const bestRows = [];
      visIds.forEach(bid=>{
        const prodPerf = brProd[bid] || {};
        const list = Object.entries(prodPerf).sort((a,b)=>b[1].qty-a[1].qty).slice(0,10);
        list.forEach(([pid,v])=>{
          bestRows.push([bName(bid), pNameOf(pid), v.qty, fmt(v.rev), fmt(v.prof)]);
        });

      const bestSellersByBranch = { title:t('repBestSellers'), header:[t('branch'),t('colProduct'),t('unitsSold'),t('revenue'),t('colLineProfit')], rows:bestRows };

      // 🆕 v2.7.0 Stage 4c — Report Offerte: aggrega le vendite con appliedOfferId
      // Mostra performance promozioni: quante volte, qty vendute, ricavo a sconto, mancato ricavo, sconto medio
      const offerAgg = {}; // offerId -> {productId, branches:Set, count, qty, revenue, lostRevenue, discounts:[]}
      sales.forEach(s=>{
        if(s.voided) return;
        const rm = rmFn(s);
        (s.items||[]).forEach(it=>{
          if(!it.appliedOfferId) return;
          const net = Math.max(0, it.qty - (rm[it.productId]||0));
          if(net<=0) return;
          const a = offerAgg[it.appliedOfferId] = offerAgg[it.appliedOfferId] || {
            productId: it.productId, branches:new Set(), count:0, qty:0, revenue:0, lostRevenue:0, discountSum:0, discountN:0
          };
          a.count++;
          a.branches.add(s.branchId);
          a.qty += net;
          a.revenue += net * (it.price||0);
          if(it.originalPrice && it.originalPrice > it.price){
            a.lostRevenue += net * (it.originalPrice - it.price);
            a.discountSum += Math.round((1 - it.price/it.originalPrice)*100);
            a.discountN++;
          }
        });
      });
      // Carica info attuale offerte (per stato + filiali config)
      let offersConfigMap = {};
      try{
        const oqs = await getDocs(collection(db,'offers'));
        oqs.forEach(d=>{ offersConfigMap[d.id] = d.data(); });
      } catch(e){ console.warn('[reports] offers config load failed:', e); }
      const offersRepRows = Object.entries(offerAgg).map(([offerId, a])=>{
        const p = products.find(x=>x.id===a.productId);
        const oCfg = offersConfigMap[offerId] || {};
        const stateLbl = oCfg.active===false
          ? (oCfg.autoEndedReason==='expired' ? t('offerExpired')
             : oCfg.autoEndedReason==='maxUnits' ? t('offerSoldOut')
             : oCfg.autoEndedReason==='stockOut' ? t('offerSoldOut')
             : t('offerInactive'))
          : t('offerActive');
        const avgDiscPct = a.discountN>0 ? Math.round(a.discountSum/a.discountN) : 0;
        const brList = Array.from(a.branches).map(bid=>bName(bid)).join(', ');
        return [
          p?pName(p):'—',
          stateLbl,
          brList || '—',
          a.count,
          a.qty,
          fmt(a.revenue),
          fmt(a.lostRevenue),
          avgDiscPct>0 ? avgDiscPct+'%' : '—'
        ];
      });
      // Ordina per ricavo decrescente
      offersRepRows.sort((a,b)=>parseFloat(String(b[5]).replace(/[^0-9.\-]/g,''))-parseFloat(String(a[5]).replace(/[^0-9.\-]/g,'')));

        rows: offersRepRows
      };

      return {

        usersDetail: _sumColRow(usersDetail, {count:[4], money:[5,6]}),
        users: _sumColRow(usersRep, {count:[3], money:[2]}),

        inventoryByBranch: _sumColRow(inventoryByBranch, {count:[3], money:[5,6,7]}),
        inventorySummary: _sumColRow(inventorySummary, {count:[2], money:[5,6]}),
        capitalByBranch: _sumColRow(capitalByBranch, {money:[1,2,3]}),
        capitalFlow: _sumColRow(capitalFlow, {money:[1,2,3,4,5,6]}),
        categories: _sumColRow(categoriesRep, {count:[1,2,6], money:[3,4,7,8]}),
        crossBranch: _sumColRow(crossBranch, {count: crossBranch.header.map((_,i)=>i).slice(1)}), // tutte le colonne numeriche dopo la prima
        topCustomersBySpend: _sumColRow(topCustomersBySpend, {count:[2], money:[3,5]}),
        topCustomersByFreq: _sumColRow(topCustomersByFreq, {count:[2], money:[4]}),
        bestSellersByBranch: _sumColRow(bestSellersByBranch, {count:[2], money:[3,4]}),
        offersReport: _sumColRow(offersReport, {count:[3,4], money:[5,6]})
      };
    }

    // يبني إعداد الرسم البياني المناسب لكل قسم (يستخدم Chart.js)

      const totalLabel = 'Σ '+t('totalRow');
      const noTotal = (rows) => (rows||[]).filter(r => String(r[0]||'') !== totalLabel);
      if(section==='products'){
        // أعلى 8 منتجات بالإيراد (من تقرير المنتجات: [اسم, مباع, إيراد,...])
        const rows=noTotal(data.products.rows).map(r=>({name:r[0],rev:toNum(r[2])})).filter(x=>x.rev>0).sort((a,b)=>b.rev-a.rev).slice(0,8);
        if(!rows.length) return null;
        return { type:'bar', data:{ labels:rows.map(r=>r.name), datasets:[{ label:t('chartRevenue'), data:rows.map(r=>r.rev), backgroundColor:GREEN }] }, options:{ indexAxis:'y', plugins:{legend:{display:false},title:{display:true,text:t('chartTopProducts')}}, responsive:true } };
      }
      if(section==='shifts'){
        // مقارنة الفروع بالإيراد (من ملخص الفروع: [فرع, إيراد, فواتير, قيمة مخزون])
        const rows=noTotal(data.branches.rows).map(r=>({name:r[0],rev:toNum(r[1])}));
        if(!rows.length || rows.every(r=>r.rev===0)) return null;
        return { type:'bar', data:{ labels:rows.map(r=>r.name), datasets:[{ label:t('chartRevenue'), data:rows.map(r=>r.rev), backgroundColor:[GREEN,GOLD,G2,'#D88E2A','#C04848'] }] }, options:{ plugins:{legend:{display:false},title:{display:true,text:t('chartBranches')}}, responsive:true } };
      }
      if(section==='sales'){
        // المبيعات: إجمالي كل فاتورة (آخر 12)
        const rows=noTotal(data.salesByInvoice.rows).slice(-12);
        if(!rows.length) return null;
        return { type:'bar', data:{ labels:rows.map(r=>r[1]), datasets:[{ label:t('chartRevenue'), data:rows.map(r=>toNum(r[6])), backgroundColor:G2 }] }, options:{ plugins:{legend:{display:false},title:{display:true,text:t('chartRevenue')}}, responsive:true } };
      }
      if(section==='suppliers'){
        // المشتريات حسب المورد (من ملخص الموردين: [مورد, عدد, كمية, تكلفة])
        const rows=noTotal(data.suppliers.rows).map(r=>({name:r[0],val:toNum(r[3])})).filter(x=>x.val>0);
        if(!rows.length) return null;
        return { type:'bar', data:{ labels:rows.map(r=>r.name), datasets:[{ label:t('purchasesTotal'), data:rows.map(r=>r.val), backgroundColor:GOLD }] }, options:{ indexAxis:'y', plugins:{legend:{display:false},title:{display:true,text:t('secPurchases')}}, responsive:true } };
      }
      // 🆕 v2.5.3 — Chart magazzino: Top 10 categorie per valore-costo stock
      if(section==='warehouse'){
        const rows=noTotal(data.categories.rows).map(r=>({name:r[0],val:toNum(r[7])})).filter(x=>x.val>0).sort((a,b)=>b.val-a.val).slice(0,10);
        if(!rows.length) return null;
        return { type:'bar', data:{ labels:rows.map(r=>r.name), datasets:[{ label:t('valCost'), data:rows.map(r=>r.val), backgroundColor:GOLD }] }, options:{ indexAxis:'y', plugins:{legend:{display:false},title:{display:true,text:t('chartCategoriesValCost')}}, responsive:true } };
      }
      // 🆕 v2.5.3 — Chart clienti: Top 10 per spesa
      if(section==='customers'){
        const rows=noTotal(data.topCustomersBySpend.rows).slice(0,10).map(r=>({name:r[0],val:toNum(r[3])})).filter(x=>x.val>0);
        if(!rows.length) return null;

      }
      return null;
    }

            </label>
          </div>
          <button class="btn-forest btn-wide" id="hub-generate" style="padding:14px 0;font-size:14.5px;font-weight:700;">🔍 ${t('hubGenerate')}</button>
          <div id="hub-busy" style="text-align:center;font-size:12px;color:var(--forest);margin-top:10px;min-height:18px;"></div>
          <!-- 📊 RESULTS area -->
          <div id="hub-results" style="margin-top:14px;"></div>
        </div></div>`;
        // Wire events
        $('ov').onclick=(e)=>{ if(e.target.id==='ov') closeSheet(); };
        $('cx').onclick=closeSheet;
        $('hub-search').oninput=(e)=>{ hubState.search=e.target.value; if(_data) renderResults(); };
        $('hub-report-sel').onchange=(e)=>{ hubState.reportKey=e.target.value; if(_data) renderResults(); };
        wireRangeButtons();
        wireBranchChips();
        wireDetailChips();
        wireDateInputs();
        $('hub-compare').onchange=(e)=>{ hubState.compare=e.target.checked; };
        $('hub-generate').onclick=generate;
      }
      // 🆕 v2.7.2 — Update mirato dei chip range senza ricostruire tutto il sheet (evita freeze su click "custom")
      function wireRangeButtons(){
        document.querySelectorAll('.hub-r').forEach(b=>b.onclick=()=>{
          hubState.range.mode=b.dataset.m;
          // Aggiorna SOLO stile pulsanti range + area date, senza render() globale
          $('hub-range-btns').innerHTML = rangeBtns();
          $('hub-custom-range').innerHTML = hubState.range.mode==='custom'
            ? `<div class="row2" style="margin-top:8px;"><div class="field" style="margin:0;"><label class="lbl">${t('repFrom')}</label><input class="input" id="hub-from" type="date" value="${hubState.range.from}"></div><div class="field" style="margin:0;"><label class="lbl">${t('repTo')}</label><input class="input" id="hub-to" type="date" value="${hubState.range.to}"></div></div>`
            : '';
          wireRangeButtons(); wireDateInputs();
        });
      }
      function wireBranchChips(){
        document.querySelectorAll('.hub-b').forEach(b=>b.onclick=()=>{
          hubState.branchFilter=b.dataset.bid;
          $('hub-branch-chips').innerHTML = branchChips();
          wireBranchChips();
          if(_data) renderResults();
        });
      }
      function wireDetailChips(){
        document.querySelectorAll('.hub-d').forEach(b=>b.onclick=()=>{
          hubState.detail=b.dataset.d;
          $('hub-detail-chips').innerHTML = detailChips();
          wireDetailChips();
          if(_data) renderResults();
        });
      }
      function wireDateInputs(){
        const fromIn = $('hub-from'), toIn = $('hub-to');
        if(fromIn) fromIn.onchange=(e)=>{ hubState.range.from=e.target.value; };
        if(toIn) toIn.onchange=(e)=>{ hubState.range.to=e.target.value; };
      }
      // Calcola periodo da hubState
      function computeRange(){
        const r = hubState.range;
        let fromTs, toTs;
        const now=Date.now();
        if(r.mode==='today'){ fromTs=dayStart(now); toTs=now; }
        else if(r.mode==='7'){ fromTs=dayStart(now-6*86400000); toTs=now; }
        else if(r.mode==='30'){ fromTs=dayStart(now-29*86400000); toTs=now; }
        else if(r.mode==='month'){ const d=new Date(); fromTs=new Date(d.getFullYear(),d.getMonth(),1).getTime(); toTs=now; }
        else if(r.mode==='year'){ const d=new Date(); fromTs=new Date(d.getFullYear(),0,1).getTime(); toTs=now; }
        else { fromTs=dayStart(new Date(r.from+'T00:00:00').getTime()); toTs=new Date(r.to+'T23:59:59').getTime(); }
        return [fromTs, toTs];
      }
      // Periodo precedente (per comparison)
      function computeComparePrevRange(fromTs, toTs){
        const span = toTs - fromTs;
        return [fromTs - span - 1, fromTs - 1];
      }
      // Genera report
      async function generate(){
        $('hub-busy').textContent='⏳ '+t('loadingReports');
        $('hub-generate').disabled=true;
        try{
          const [fromTs, toTs] = computeRange();
          _data = await buildReportData(fromTs, toTs);
          if(hubState.compare){
            const [f2, t2] = computeComparePrevRange(fromTs, toTs);
            _data2 = await buildReportData(f2, t2);
          } else { _data2 = null; }
          $('hub-busy').textContent='';
          renderResults();
        }catch(e){ console.error('[hub] generate failed:', e); $('hub-busy').textContent=''; toast(t('errorGen'), true); }
        $('hub-generate').disabled=false;
      }
      // Renderizza risultati
      function renderResults(){
        if(!_data) return;
        const repInfo = REPORTS.find(r=>r.key===hubState.reportKey);
        const rep = _data[hubState.reportKey];
        if(!rep){ $('hub-results').innerHTML=`<div class="empty">${t('noData')}</div>`; return; }
        // Filtra righe per ricerca testuale (esclude riga totale)
        const totalLabel = 'Σ '+t('totalRow');
        const dataRows = rep.rows.filter(r=>String(r[0]||'')!==totalLabel);
        const totalRow = rep.rows.find(r=>String(r[0]||'')===totalLabel);
        let rows = dataRows;
        if(hubState.search.trim()){
          const q = hubState.search.toLowerCase();
          rows = rows.filter(r=>r.some(c=>String(c).toLowerCase().includes(q)));
        }
        // Filtra per filiale: cerca colonna "branch" e filtra
        if(hubState.branchFilter !== 'all'){
          const bIdx = rep.header.findIndex(h => h===t('branch'));
          if(bIdx>=0){
            const bN = (branches.find(b=>b.id===hubState.branchFilter)||{}).nameAr || hubState.branchFilter;
            const bNen = (branches.find(b=>b.id===hubState.branchFilter)||{}).nameEn || hubState.branchFilter;
            rows = rows.filter(r=>{ const v=String(r[bIdx]||''); return v===bN || v===bNen; });
          }
        }
        // 🆕 v2.6.2 — Livello dettaglio: 3 modalità ora effettivamente diverse
        // summary  = solo riga totale (1 riga)
        // standard = top 20 righe più rilevanti (già ordinate dal builder per metrica chiave) + totale
        // full     = tutte le righe + totale
        const STANDARD_LIMIT = 20;
        const beforeDetailCount = rows.length;
        let truncated = false;
        if(hubState.detail==='summary' && totalRow){
          rows = [totalRow];
        } else if(hubState.detail==='standard'){
          if(rows.length > STANDARD_LIMIT){
            rows = rows.slice(0, STANDARD_LIMIT);
            truncated = true;
          }
          if(totalRow) rows = [...rows, totalRow];
        } else if(hubState.detail==='full'){
          if(totalRow) rows = [...rows, totalRow];
        }
        // Build period info
        const [fromTs, toTs] = computeRange();
        const fromS = new Date(fromTs).toISOString().slice(0,10);
        const toS = new Date(toTs).toISOString().slice(0,10);
        const periodLabel = `${fromS} → ${toS}`;
        // Comparison: side-by-side se applicabile
        let compareHtml = '';
        if(hubState.compare && _data2 && _data2[hubState.reportKey]){
          const rep2 = _data2[hubState.reportKey];
          const totalRow2 = rep2.rows.find(r=>String(r[0]||'')===totalLabel);
          if(totalRow && totalRow2){
            // Affianca le righe totale: per ogni colonna numerica mostra "A | B | Δ%"
            const cmpRows = [];
            for(let i=1;i<rep.header.length;i++){
              const a = parseFloat(String(totalRow[i]).replace(/[^0-9.\-]/g,''))||0;
              const b = parseFloat(String(totalRow2[i]).replace(/[^0-9.\-]/g,''))||0;
              if(a===0 && b===0) continue;
              const delta = a - b;
              const deltaPct = b!==0 ? Math.round(delta/Math.abs(b)*1000)/10 : (a>0?100:0);
              const color = delta>0?'var(--forest)':delta<0?'var(--red,#c04848)':'rgba(26,26,26,0.5)';
              const arrow = delta>0?'▲':delta<0?'▼':'━';
              cmpRows.push(`<tr><td style="font-weight:600;">${rep.header[i]}</td><td class="num" style="text-align:end;">${totalRow[i]}</td><td class="num" style="text-align:end;color:rgba(26,26,26,0.55);">${totalRow2[i]}</td><td class="num" style="text-align:end;font-weight:700;color:${color};">${arrow} ${deltaPct>=0?'+':''}${deltaPct}%</td></tr>`);
            }
            const [f2,t2] = computeComparePrevRange(fromTs, toTs);
            const f2S = new Date(f2).toISOString().slice(0,10), t2S = new Date(t2).toISOString().slice(0,10);
            compareHtml = `<div style="background:#fff;border:1px solid var(--gold);border-radius:12px;padding:12px;margin-bottom:12px;">
              <div style="font-size:12px;color:var(--forest);font-weight:700;margin-bottom:8px;">⚖️ ${t('hubCompareResult')}</div>
              <table style="width:100%;font-size:12px;border-collapse:collapse;">
                <thead><tr style="border-bottom:1px solid var(--ivory-dark);"><th style="text-align:start;padding:6px 4px;">${t('metric')}</th><th style="text-align:end;padding:6px 4px;">A: ${fromS}→${toS}</th><th style="text-align:end;padding:6px 4px;color:rgba(26,26,26,0.55);">B: ${f2S}→${t2S}</th><th style="text-align:end;padding:6px 4px;">Δ</th></tr></thead>
                <tbody>${cmpRows.join('')}</tbody>
              </table>
            </div>`;
          }
        }
        // Chart
        let chartHtml = '';
        if(repInfo.chartKey && hubState.view==='chart'){
          chartHtml = `<div style="background:#fff;border:1px solid var(--ivory-dark);border-radius:12px;padding:12px;margin-bottom:12px;"><canvas id="hub-chart" height="220"></canvas></div>`;
        }
        // 🆕 v2.6.4 — Costruzione rows espanse (sub-rows inline) per Full mode
        // tableHtml detecta automaticamente sub-rows tramite "↳" nella prima colonna
        let displayRows = rows;
        if(hubState.detail==='full' && rep.subRows && rep.subRows.length){
          displayRows = [];
          rows.forEach(r=>{
            displayRows.push(r);
            if(String(r[0]||'')!==totalLabel){
              const idx = rep.rows.indexOf(r);
              if(idx>=0 && rep.subRows[idx]){
                rep.subRows[idx].forEach(sub=>displayRows.push(sub));
              }
            }
          });
        }
        const tableSafe = tableHtml(rep.title, rep.header, displayRows);
        const truncatedNote = truncated ? ` · <span style="color:#D88E2A;font-weight:700;">⚠️ ${t('hubTruncated').replace('{shown}', STANDARD_LIMIT).replace('{total}', beforeDetailCount)}</span>` : '';
        $('hub-results').innerHTML = `
          <div style="background:rgba(31,58,46,0.06);border-radius:12px;padding:12px 14px;margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
              <div style="flex:1;min-width:200px;">
                <div style="font-size:14.5px;font-weight:800;color:var(--forest);">${repInfo.icon} ${rep.title}</div>
                <div style="font-size:11.5px;color:rgba(26,26,26,0.55);margin-top:3px;">📅 ${periodLabel} · ${displayRows.length} ${t('rows')}${truncatedNote}</div>
              </div>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
              <!-- 🆕 v2.6.4 — View toggle segmented control -->
              <div style="display:inline-flex;background:#F0EBDF;border-radius:10px;padding:3px;gap:2px;">
                <button id="hub-view-table" style="padding:8px 14px;border:none;background:${hubState.view==='table'?'var(--forest)':'transparent'};color:${hubState.view==='table'?'#fff':'var(--forest)'};border-radius:8px;font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;">📋 ${t('anViewTable')}</button>
                ${repInfo.chartKey?`<button id="hub-view-chart" style="padding:8px 14px;border:none;background:${hubState.view==='chart'?'var(--forest)':'transparent'};color:${hubState.view==='chart'?'#fff':'var(--forest)'};border-radius:8px;font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;">📈 ${t('anViewChart')}</button>`:''}
              </div>
              <!-- 🆕 v2.6.4 — Export buttons grandi con label -->
              <div style="display:inline-flex;gap:6px;margin-${lang==='ar'?'right':'left'}:auto;">
                <button id="hub-pdf" title="${t('anExportPdf')}" style="padding:8px 12px;background:#fff;border:1.5px solid #C9A84C;color:#1F3A2E;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;"><span style="font-size:14px;">📄</span>PDF</button>
                <button id="hub-xls" title="${t('anExportExcel')}" style="padding:8px 12px;background:#fff;border:1.5px solid #C9A84C;color:#1F3A2E;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;"><span style="font-size:14px;">📊</span>XLS</button>
                <button id="hub-csv" title="${t('anExportCsv')}" style="padding:8px 12px;background:#fff;border:1.5px solid #C9A84C;color:#1F3A2E;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;"><span style="font-size:14px;">📑</span>CSV</button>
              </div>
            </div>
          </div>
          ${compareHtml}
          ${hubState.view==='chart' ? chartHtml : `<div id="hub-table">${tableSafe}</div>`}`;
        // Chart render
        if(repInfo.chartKey && hubState.view==='chart'){
          const cfg = chartConfigFor(repInfo.chartKey, _data);
          if(cfg){
            if(_chart) _chart.destroy();
            _chart = new Chart($('hub-chart').getContext('2d'), cfg);
          } else {
            $('hub-results').insertAdjacentHTML('beforeend', `<div class="empty">${t('noChartData')}</div>`);
          }
        }
        // Wire events
        $('hub-view-table')&&($('hub-view-table').onclick=()=>{ hubState.view='table'; renderResults(); });
        $('hub-view-chart')&&($('hub-view-chart').onclick=()=>{ hubState.view='chart'; renderResults(); });
        const fname = `${hubState.reportKey}_${fromS}_${toS}`;
        // 🆕 v2.6.4 — Export usa direttamente displayRows (già espanso se Full mode)
        $('hub-pdf').onclick=()=>printDoc(rep.title, tableHtml(rep.title+` (${periodLabel})`, rep.header, displayRows));
        $('hub-xls').onclick=()=>downloadXLS(fname+'.xls', rep.title, rep.header, displayRows);
        $('hub-csv').onclick=()=>downloadCSV(fname+'.csv', rep.header, displayRows);
      }
      render();
      // Auto-generate alla prima apertura
      generate();
    }

    // ===== إدارة الحساب: تغيير اسم/كلمة مرور (للأدمن نفسه) + إيميل reset للموظفين =====

      document.querySelectorAll('[data-ctab]').forEach(b=>b.onclick=()=>{ document.querySelectorAll('#client-nav .nav-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); clientTab=b.dataset.ctab; renderClientTab(); });

      // فحص دوري لأي طلب استخدام نقاط من الكاشير (كل 15 ثانية لتقليل استهلاك Firebase reads)

      window.__clientPtsTimer = setInterval(checkClientPointsRequest, 15000);
      checkClientPointsRequest();

    let _ptsReqShownId=null;
    async function checkClientPointsRequest(){
      if(!clientProfile) return;
      try{
        const cs=await getDoc(doc(db,'customers',clientProfile.id));
        if(!cs.exists()) return;
        const r=cs.data().pointsRequest;
        if(!r || r.status!=='pending') { _ptsReqShownId=null; return; }
        if(r.id===_ptsReqShownId) return;
        if(Date.now()>r.expiresAt){ try{ await updateDoc(doc(db,'customers',clientProfile.id),{pointsRequest:null}); }catch(e){} return; }
        _ptsReqShownId=r.id; playOrderSound(); showClientPointsRequest(r);

      // الضغط على البلور حوالين الـ popup يقفله (الكاشير هيستنّى تيمآوت تلقائي بعد 90 ثانية)

    // 🔄 إعادة تحميل بيانات العميل من قاعدة البيانات (يستدعى قبل عرض كل صفحة عميل)
    async function refreshClientProfile(){
      if(!clientProfile||!clientProfile.id) return;
      try{
        const cs=await getDoc(doc(db,'customers',clientProfile.id));
        if(cs.exists()){
          const fresh = cs.data();
          clientProfile={...clientProfile, ...fresh, id:clientProfile.id};
          // 🎉 لو وصل لـ ٥٠ نقطة لأول مرة → نعرضله popup مبروك (مرة واحدة بس)
          const pts = fresh.points || 0;
          if(pts >= MIN_POINTS_REDEEM && !fresh.notifiedThresholdReached){

    // Uso: withScrollPreserved(() => renderClientHome())
    // Salva scrollY, chiama fn, ripristina scrollY più volte per coprire render async
    function withScrollPreserved(fn){
      const sy = window.scrollY || document.documentElement.scrollTop || 0;
      const restore = () => window.scrollTo(0, sy);
      const result = fn();
      // Ripristino multiplo: copre re-render sincroni E async (innerHTML in più step)
      requestAnimationFrame(restore);
      setTimeout(restore, 60);
      setTimeout(restore, 200);
      if(result && typeof result.then === 'function'){
        result.finally(restore).catch(()=>{});
      }
    }

          // محاولة عدة schemes احتمالية + رابط متجر التطبيقات كنسخة احتياطية
          const start=Date.now();
          try{ window.location.href='instapay://'; }catch(e){}
          setTimeout(()=>{ if(Date.now()-start<1600 && document.hasFocus()){ window.open('https://play.google.com/store/apps/details?id=com.egyptianbanks.instapay','_blank'); } },1200);
        };
        // رفع الإيصال
        $('pick-proof').onclick=()=>$('proof-input').click();
        $('proof-input').onchange=async e=>{
          const f=e.target.files&&e.target.files[0]; if(!f) return;
          try{ proofData=await compress(f,900,0.75); renderPanel(); }
          catch(err){ console.error(err); toast(t('errorGen'),true); }
        };
        // تأكيد الطلب
        $('cli-confirm-pay').onclick=()=>{
          if(!proofData){ toast(t('proofMissing'),true); return; }
          sendClientOrder('instapay', proofData);
        };
      };
      renderPanel();
    }
    async function sendClientOrder(payMethod, payProof){
      payMethod = payMethod || 'cash';
      if(clientProfile&&clientProfile.suspended){ toast(t('accountSuspended'),true); return; }
      if(!clientCart.length){ toast(t('emptyCartC'),true); return; }
      if(!clientBranchId){ toast(t('chooseBranch'),true); return; }
      if(payMethod==='instapay' && !payProof){ toast(t('proofMissing'),true); return; }
      const b=$('cli-send')||$('cli-confirm-pay'); if(b){ b.disabled=true; b.textContent='...'; }
      try{
        const total=clientCart.reduce((a,i)=>a+i.qty*i.price,0);
        const pts=(clientProfile&&clientProfile.points)||0;
        const usePoints = clientCart.__usePoints===true && pts>=MIN_POINTS_REDEEM;
        const pointsToRedeem = usePoints ? Math.min(pts, Math.ceil(total)) : 0;
        // الطلب: للـ instapay مدفوع بالفعل (paidByClient=true)
        await addDoc(collection(db,'orders'),{
          branchId:clientBranchId, customerId:clientProfile.id, customerName:clientProfile.name,
          customerPhone:clientProfile.phone||'', items:clientCart.map(i=>({productId:i.id,name:i.name,price:i.price,qty:i.qty})),
          total, status:'pending', usePoints, pointsToRedeem,
          payMethod, payProof:payProof||'', paidByClient: payMethod==='instapay',
          createdAt:Date.now()
        });
        clientCart=[]; closeSheet(); playSuccessSound(); toast(t('orderSent'));
        clientTab='orders'; document.querySelectorAll('#client-nav .nav-btn').forEach(x=>x.classList.remove('active'));
        renderClientTab();
      }catch(e){ console.error(e); toast(t('errorGen'),true); if(b){ b.disabled=false; b.textContent='📤 '+t('sendOrder'); } }
    }

    async function refreshChalkboardList(){

      try{
        const qs = await getDocs(collection(db,'announcements'));
        const items=[]; qs.forEach(d=>items.push({id:d.id,...d.data()}));
        items.sort((a,b)=>{
          const pA=(a.pinned?1:0), pB=(b.pinned?1:0);
          if(pA!==pB) return pB-pA;
          return (b.createdAt||0)-(a.createdAt||0);
        });
        if(!items.length){ list.innerHTML=`<div class="empty">${t('chalkboardEmpty')}</div>`; return; }
        const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

          const statusCol = !a.active ? 'rgba(26,26,26,0.4)' : expired ? '#D88E2A' : 'var(--forest)';

              ${(a.messageAr||a.messageEn||a.message)?`<div style="font-size:11.5px;color:rgba(26,26,26,0.65);line-height:1.4;margin-bottom:5px;">${esc((lang==='ar'?(a.messageAr||a.message):(a.messageEn||a.message))||'')}</div>`:''}
