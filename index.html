<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1F3A2E">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Le Coin · POS · v2.5</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=JetBrains+Mono:wght@400;500;600;700&family=Caveat:wght@400;500;600;700&family=Marhey:wght@400;500;700&family=Gochi+Hand&family=Kalam:wght@400;700&family=Lalezar&family=Gulzar&display=swap" rel="stylesheet">
  <!-- 🆕 v2.7.3 — Filtro SVG per effetto gesso ruvido sulle scritte della lavagna -->
  <svg width="0" height="0" style="position:absolute;" aria-hidden="true">
    <filter id="chalk-texture">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    :root {
      --forest:#1F3A2E; --forest-dark:#152821; --gold:#C9A84C; --gold-light:#E0C880;
      --ivory:#FAF6EE; --ivory-dark:#F0EADC; --charcoal:#1A1A1A;
      --red:#C04848; --green:#3D7355; --amber:#D88E2A;
    }
    body { font-family:'Tajawal','Inter',system-ui,sans-serif; background:var(--ivory); color:var(--charcoal); min-height:100vh; }
    body[dir=ltr] { font-family:'Inter',system-ui,sans-serif; }
    .num { font-family:'JetBrains Mono',monospace; font-variant-numeric:tabular-nums; direction:ltr; unicode-bidi:embed; }
    .fr { font-family:'Cormorant Garamond',serif; font-style:italic; direction:ltr; }
    .hidden { display:none !important; }

    /* LOGIN */
    .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; background:var(--forest); }
    .login-card { background:var(--ivory); border-radius:20px; padding:30px 24px; width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
    .login-brand { text-align:center; margin-bottom:24px; }
    .login-brand .lb-name { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:40px; color:var(--forest); font-weight:500; }
    .login-brand .lb-tag { font-size:10px; letter-spacing:3px; color:var(--gold); font-weight:700; text-transform:uppercase; margin-top:2px; }

    header { background:var(--forest); color:var(--ivory); padding:10px 16px; position:sticky; top:0; z-index:20; padding-top:max(10px,env(safe-area-inset-top)); }
    .header-inner { display:flex; justify-content:space-between; align-items:center; max-width:900px; margin:0 auto; gap:10px; }
    .brand-name { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:22px; font-weight:500; }
    #header-logo { height:62px !important; }
    .header-ctrl { display:flex; align-items:center; gap:8px; }
    .branch-sel { background:rgba(255,255,255,0.1); color:var(--ivory); border:1px solid rgba(201,168,76,0.3); border-radius:8px; padding:5px 8px; font-size:11px; font-family:inherit; max-width:120px; }
    .lang-btn { background:rgba(201,168,76,0.2); color:var(--gold); border:none; border-radius:8px; padding:5px 9px; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; }
    .user-btn { background:none; border:none; color:var(--ivory); cursor:pointer; font-size:18px; opacity:0.85; }

    main { max-width:900px; margin:0 auto; padding:16px; padding-bottom:calc(96px + env(safe-area-inset-bottom,0)); }
    .card { background:white; border-radius:16px; padding:16px; box-shadow:0 1px 2px rgba(0,0,0,0.04),0 4px 12px rgba(0,0,0,0.04); margin-bottom:14px; }
    .card-title { font-size:11px; letter-spacing:1px; color:var(--forest); font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:6px; }

    .input { width:100%; padding:11px 12px; font-size:14px; border:1px solid var(--ivory-dark); border-radius:10px; background:var(--ivory); outline:none; color:var(--charcoal); font-family:inherit; }
    .input:focus { border-color:var(--gold); }
    input[type=number].input::-webkit-outer-spin-button, input[type=number].input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
    .input::placeholder { color:rgba(26,26,26,0.35); }
    label.lbl { font-size:10px; letter-spacing:0.5px; color:rgba(26,26,26,0.6); font-weight:600; margin-bottom:5px; display:block; }
    .field { margin-bottom:12px; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    .btn-forest { background:var(--forest); color:var(--ivory); border:none; padding:12px 18px; border-radius:10px; font-weight:600; font-size:13px; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
    .btn-gold { background:var(--gold); color:var(--forest-dark); border:none; padding:12px 22px; border-radius:12px; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 4px 12px rgba(201,168,76,0.3); }
    .btn-secondary { background:white; color:var(--charcoal); border:1px solid var(--ivory-dark); padding:10px 16px; border-radius:10px; font-weight:600; font-size:12px; cursor:pointer; font-family:inherit; }
    .btn-wide { width:100%; justify-content:center; }

    nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid var(--ivory-dark); z-index:40; padding-bottom:env(safe-area-inset-bottom,0); box-shadow:0 -2px 12px rgba(0,0,0,0.06); }
    .nav-inner { max-width:900px; margin:0 auto; display:flex; flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; scroll-snap-type:x proximity; }
    .nav-inner::-webkit-scrollbar { display:none; }
    .nav-btn { flex:0 0 auto; min-width:70px; background:transparent; border:none; padding:9px 6px 7px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; color:rgba(26,26,26,0.5); position:relative; font-family:inherit; scroll-snap-align:center; }
    .nav-btn.active { color:var(--forest); }
    .nav-btn.active::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:32px; height:3px; background:var(--gold); border-radius:0 0 4px 4px; }
    .nav-btn .ico { font-size:22px; }
    .nav-btn .lbl2 { font-size:10.5px; font-weight:600; white-space:nowrap; }

    .overlay { position:fixed; inset:0; background:rgba(26,26,26,0.45); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); display:flex; align-items:flex-end; justify-content:center; z-index:50; }
    @keyframes sheetin { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .sheet { background:var(--ivory); border-radius:20px 20px 0 0; padding:22px; width:100%; max-width:480px; max-height:92vh; overflow-y:auto; animation:sheetin 0.3s cubic-bezier(0.32,0.72,0,1); }
    .sheet-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
    .sheet-sub { font-size:11px; letter-spacing:0.5px; color:var(--gold); font-weight:700; }
    .sheet-title { font-size:22px; font-weight:600; color:var(--forest); }
    .close-x { background:none; border:none; cursor:pointer; font-size:22px; color:var(--charcoal); }

    @keyframes toastin { from{transform:translateX(-50%) translateY(20px);opacity:0} to{transform:translateX(-50%) translateY(0);opacity:1} }
    .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--forest); color:var(--ivory); padding:10px 18px; border-radius:999px; font-size:13px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,0.2); z-index:100; animation:toastin 0.3s ease-out; max-width:90%; text-align:center; }
    .toast.err { background:var(--red); }

    .empty { text-align:center; padding:24px 16px; color:rgba(26,26,26,0.45); font-size:13px; }
    .spinner { width:34px; height:34px; border:3px solid var(--ivory-dark); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:30px auto; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* 🖼️ Lightbox: cursor zoom-in su immagini grandi (segnale visivo) */
    img:not(.logo):not(.brand-name):not([data-no-zoom]):not(#photo-prev) { transition: opacity .15s; }
    img.prod-photo { cursor: zoom-in; }

    /* CATEGORY ROW */
    .cat-row { background:white; border-radius:10px; padding:12px; display:flex; align-items:center; gap:12px; margin-bottom:6px; cursor:pointer; }
    .cat-order { width:28px; height:28px; border-radius:6px; background:var(--ivory); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .cat-names { flex:1; min-width:0; }

    /* PRODUCT CARD */
    .prod-card { background:white; border-radius:12px; padding:10px; display:flex; gap:12px; margin-bottom:8px; cursor:pointer; align-items:center; }
    .prod-photo { width:56px; height:56px; border-radius:10px; object-fit:cover; flex-shrink:0; background:var(--ivory-dark); display:flex; align-items:center; justify-content:center; font-size:22px; color:rgba(26,26,26,0.3); }
    .prod-info { flex:1; min-width:0; }
    .prod-meta { display:flex; gap:10px; margin-top:4px; font-size:11px; }
    .photo-upload { width:100%; height:160px; border:2px dashed var(--ivory-dark); border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; gap:6px; color:rgba(26,26,26,0.5); background:white; overflow:hidden; position:relative; }
    .photo-upload img { width:100%; height:100%; object-fit:cover; }
    .toggle { position:relative; width:44px; height:26px; border-radius:999px; border:none; cursor:pointer; padding:0; flex-shrink:0; }
    .toggle .thumb { position:absolute; top:3px; width:20px; height:20px; background:var(--ivory); border-radius:50%; transition:all 0.2s; }
    body[dir=rtl] .toggle .thumb { right:3px; }
    body[dir=ltr] .toggle .thumb { left:3px; }

    /* CASSA / CASHIER */
    .pos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-bottom:120px; }
    /* تحسين للتابلت والشاشات الكبيرة */
    /* قاعدة عامة: على الموبايل، أي نص صغير (10-11px) يبقى 13px عشان يبان كويس */
    @media (max-width:699px){
      [style*="font-size:10px"]{ font-size:12.5px !important; }
      [style*="font-size:10.5px"]{ font-size:13px !important; }
      [style*="font-size:11px"]{ font-size:13px !important; }
      [style*="font-size:9px"]{ font-size:12px !important; }
      .empty { font-size:14.5px !important; }
      .lbl { font-size:13px !important; }
      .nav-btn .lbl2 { font-size:11px !important; } /* تبويبات الشريط: نخلّيها 11 عشان تكفي 6 أزرار */
      /* 🆕 v2.7.2 — Card prodotto clickable con modal */
      .chalk-product-card {
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        border-radius: 8px;
        padding: 8px;
        margin: -8px;
      }
      .chalk-product-card:hover {
        transform: scale(1.02);
        background: rgba(245,240,220,0.08);
      }
      #chalk-product-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.7);
        z-index: 10000;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      #chalk-product-modal.active {
        display: flex;
      }
      #chalk-product-modal-content {
        background: #1F4D3D;
        border-radius: 12px;
        padding: 20px;
        max-width: 500px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        position: relative;
      }
      #chalk-product-modal-close {
        position: absolute;
        top: 12px;
        right: 12px;
        background: rgba(245,240,220,0.2);
        border: none;
        color: #f5f0dc;
        font-size: 24px;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #chalk-product-modal-content img {
        width: 100%;
        max-height: 400px;
        object-fit: contain;
        border-radius: 8px;
        margin-bottom: 16px;
      }
      /* Mobile: 1 colonna, compatta */
      @media (max-width:600px) {
        #chalkboard-wrap > div:first-child { padding:12px !important; }
        .chalk-two-col { grid-template-columns:1fr !important; gap:12px !important; }
        /* Mobile: nome e prezzo su righe separate */
        .chalk-card-header { display:flex !important; flex-direction:column !important; align-items:flex-start !important; }
        .chalk-card-header > div:last-child { margin-top:4px !important; }
      }
      /* Tablet: 2 colonne */
      @media (min-width:601px) and (max-width:900px) {
        .chalk-two-col { grid-template-columns:1fr 1fr !important; gap:16px !important; }
        /* Tablet: nome e prezzo sulla stessa riga */
        .chalk-card-header { display:flex !important; flex-direction:row !important; align-items:baseline !important; gap:10px !important; }
        .chalk-card-header > div:first-child { flex:1; }
      }
      /* Desktop: 2 colonne full */
      @media (min-width:901px) {
        .chalk-two-col { grid-template-columns:1fr 1fr !important; gap:18px !important; }
        /* Desktop: nome e prezzo sulla stessa riga */
        .chalk-card-header { display:flex !important; flex-direction:row !important; align-items:baseline !important; gap:10px !important; }
        .chalk-card-header > div:first-child { flex:1; }
      }
      .chalk-two-col > div:first-child { border-left:none !important; border-right:none !important; padding-left:0 !important; padding-right:0 !important; padding-bottom:14px !important; border-bottom:1px dashed #1F4D3D !important; }
      #chalkboard-wrap { min-height:0; margin:0 !important; padding:0 !important; }
      #chalkboard-wrap [style*="border-bottom:1px dashed rgba(245,240,220,0.28)"] { border-bottom:1px dashed #1F4D3D !important; }
      #chalkboard-wrap [style*="border-bottom:1px dashed rgba(245,240,220,0.22)"] { border-bottom:1px dashed #1F4D3D !important; }
      /* تباعد الأسطر أوسع شوية على الموبايل */
      body, .card, .prod-info, .prod-card { line-height:1.45; }
      /* الأسماء الرئيسية في الكاشير */
      .pc-name { font-size:14.5px !important; font-weight:700 !important; }
      .pc-desc { font-size:11.5px !important; }
    }
    /* تحسينات الموبايل: نصوص أوضح + لمس مريح (مساحة الضغط) + iOS بدون zoom */
    body { font-size:15px; -webkit-text-size-adjust:100%; }
    .input { font-size:16px; min-height:44px; padding:12px 14px; } /* 16px يمنع iOS من تكبير الصفحة */
    .btn-forest, .btn-gold, .btn-secondary { min-height:44px; padding:12px 18px; font-size:14px; }
    .nav-btn { min-width:74px; padding:10px 6px 8px; }
    .nav-btn .ico { font-size:24px; }
    .nav-btn .lbl2 { font-size:11px; }
    .card { padding:18px; }
    .empty { padding:28px 16px; font-size:14px; }
    .lbl { font-size:12px; margin-bottom:5px; display:block; color:rgba(26,26,26,0.65); font-weight:600; }
    .branch-sel { font-size:13px; padding:8px 12px; max-width:160px; min-height:38px; }
    .lang-btn, .user-btn { min-width:38px; min-height:38px; }
    select.input { min-height:44px; }
    /* مسافة آمنة تحت المحتوى عشان شريط التنقل ما يغطيش */
    main { padding-bottom:120px !important; }
    @media (min-width:700px){
      body { font-size:16px; }
      main { max-width:1100px; padding:22px; padding-bottom:140px !important; }
      .header-inner, .nav-inner, .cart-inner, .cart-panel { max-width:1100px; }
      .pos-grid { grid-template-columns:repeat(auto-fill,minmax(165px,1fr)); gap:14px; }
      #header-logo { height:72px !important; }
      .card { padding:22px; margin-bottom:18px; }
      .input { font-size:15px; padding:13px 16px; min-height:48px; }
      .btn-forest, .btn-gold, .btn-secondary { min-height:48px; font-size:15px; padding:14px 22px; }
      .nav-btn .ico { font-size:26px; }
      .nav-btn .lbl2 { font-size:12px; }
    }
    @media (min-width:1000px){ main { max-width:1200px; } .header-inner,.nav-inner{ max-width:1200px; } }
    /* قائمة الأقسام (drawer) */
    .menu-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    @media (min-width:600px){ .menu-grid { grid-template-columns:repeat(4,1fr); } }
    .menu-tile { background:var(--ivory); border:1px solid var(--ivory-dark); border-radius:16px; padding:18px 8px; display:flex; flex-direction:column; align-items:center; gap:7px; cursor:pointer; font-family:inherit; transition:transform .08s, background .15s; }
    .menu-tile:active { transform:scale(0.96); }
    .menu-tile.active { background:var(--forest); border-color:var(--forest); }
    .menu-tile.active .mt-l, .menu-tile.active .mt-i { color:#fff; }
    .menu-tile .mt-i { font-size:30px; }
    .menu-tile .mt-l { font-size:12.5px; font-weight:700; color:var(--charcoal); text-align:center; line-height:1.2; }
    .pos-card { background:white; border-radius:14px; overflow:hidden; cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,0.04),0 4px 12px rgba(0,0,0,0.05); border:2px solid transparent; transition:border-color 0.15s; text-align:start; display:flex; flex-direction:column; }
    .pos-card:active { border-color:var(--gold); }
    .pos-card .pc-photo { width:100%; aspect-ratio:1/1; object-fit:cover; background:var(--ivory-dark); display:flex; align-items:center; justify-content:center; font-size:34px; color:rgba(26,26,26,0.3); }
    .pos-card .pc-body { padding:8px 10px 10px; }
    .pos-card .pc-name { font-size:14px; font-weight:500; line-height:1.2; }
    .pos-card .pc-desc { font-size:11px; color:rgba(26,26,26,0.55); margin-top:2px; min-height:14px; line-height:1.3; }
    .pos-card .pc-price { font-weight:700; color:var(--forest); margin-top:5px; }
    .pos-card .pc-badge { display:inline-block; margin-top:4px; font-size:10px; padding:1px 6px; border-radius:6px; background:rgba(192,72,72,0.12); color:var(--red); }
    /* 🆕 v2.7.2 — Badge offerta/novità sulla foto del prodotto */
    .pc-badge-tag { position:absolute; z-index:2; font-size:10.5px; font-weight:800; padding:3px 7px; border-radius:10px; white-space:nowrap; line-height:1.2; box-shadow:0 2px 6px rgba(0,0,0,0.18); letter-spacing:0.2px; }
    .pc-badge-offer { background:linear-gradient(135deg,#FF6B35,#FF4500); color:#fff; }
    .pc-badge-new { background:linear-gradient(135deg,var(--forest),#2A5C40); color:#fff; }
    /* CART bar */
    .cart-bar { position:fixed; bottom:62px; left:0; right:0; z-index:35; padding:0 12px; pointer-events:none; }
    .cart-inner { max-width:900px; margin:0 auto; background:var(--forest); color:var(--ivory); border-radius:14px; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 8px 28px rgba(0,0,0,0.28); pointer-events:auto; cursor:pointer; }
    .cart-panel { max-width:900px; margin:0 auto; background:var(--ivory); border-radius:16px 16px 0 0; box-shadow:0 -8px 30px rgba(0,0,0,0.22); pointer-events:auto; overflow:hidden; border:1px solid var(--ivory-dark); }
    .cart-panel-head { background:var(--forest); color:var(--ivory); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
    .cart-panel-items { max-height:38vh; overflow-y:auto; padding:4px 14px; }
    .cart-mini-line { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--ivory-dark); }
    .cart-count { background:var(--gold); color:var(--forest-dark); border-radius:999px; min-width:24px; height:24px; padding:0 7px; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; }
    /* cart sheet rows */
    .cart-line { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--ivory-dark); }
    .cart-line .cl-photo { width:44px; height:44px; border-radius:8px; object-fit:cover; background:var(--ivory-dark); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px; }
    .qty-ctrl { display:flex; align-items:center; gap:8px; }
    .qty-btn { width:30px; height:30px; border-radius:8px; border:1px solid var(--ivory-dark); background:white; font-size:18px; font-weight:700; cursor:pointer; color:var(--forest); display:flex; align-items:center; justify-content:center; }
    .pos-cat-bar { display:flex; gap:8px; overflow-x:auto; padding-bottom:8px; margin-bottom:10px; -webkit-overflow-scrolling:touch; }
    .pos-cat-chip { white-space:nowrap; padding:7px 14px; border-radius:999px; border:1px solid var(--ivory-dark); background:white; font-size:13px; font-weight:600; cursor:pointer; color:rgba(26,26,26,0.6); font-family:inherit; }
    .pos-cat-chip.active { background:var(--forest); color:var(--ivory); border-color:var(--forest); }
  </style></head>
<body>
  <!-- LOGIN -->

    const TZ='Africa/Cairo';
    // ultimo <weekday> del mese (per le regole DST egiziane)
    function _lastWeekday(y,month,wd){ const last=new Date(Date.UTC(y,month+1,0)); const ld=last.getUTCDay(); const diff=(ld-wd+7)%7; return last.getUTCDate()-diff; }
    // offset Egitto (minuti) calcolato da noi: DST (+3) dall'ultimo venerdì di aprile all'ultimo giovedì di ottobre; altrimenti +2
    function tzOffsetMin(ts){
      const d=new Date(ts), y=d.getUTCFullYear();
      const aprDay=_lastWeekday(y,3,5);   // ultimo venerdì di aprile
      const octDay=_lastWeekday(y,9,4);   // ultimo giovedì di ottobre
      const dstStart=Date.UTC(y,3,aprDay,0,0,0)-120*60000;
      const dstEnd=Date.UTC(y,9,octDay,24,0,0)-180*60000;
      return (ts>=dstStart && ts<dstEnd)?180:120;
    }
    const _p2=n=>String(n).padStart(2,'0');
    // formatta usando un offset CONGELATO (salvato al momento della fattura) — così l'ora resta corretta per sempre
    function fmtFromOff(ts, off){ const d=new Date(ts+off*60000); return `${_p2(d.getUTCDate())}/${_p2(d.getUTCMonth()+1)}/${d.getUTCFullYear()}, ${_p2(d.getUTCHours())}:${_p2(d.getUTCMinutes())}`; }
    function fmtFromOffShort(ts, off){ const d=new Date(ts+off*60000); return `${_p2(d.getUTCHours())}:${_p2(d.getUTCMinutes())} · ${_p2(d.getUTCDate())}/${_p2(d.getUTCMonth()+1)}`; }
    // se è disponibile l'offset congelato (tzo) lo usa, altrimenti calcola il fuso del Cairo per quell'istante
    const fmtDT = (ts, tzo) => fmtFromOff(ts, (tzo!=null)?tzo:tzOffsetMin(ts));
    const fmtDate = (ts, tzo) => { const off=(tzo!=null)?tzo:tzOffsetMin(ts); const d=new Date(ts+off*60000); return `${_p2(d.getUTCDate())}/${_p2(d.getUTCMonth()+1)}/${d.getUTCFullYear()}`; };

    // Listener delegato globale: ogni click su <img> apre lightbox

    function _imgShouldZoom(img){
      if(!img || img.tagName!=='IMG' || !img.src) return false;
      if(img.hasAttribute('data-no-zoom')) return false;
      // Esclusioni per id/classe
      const exIds = ['login-logo','header-logo','client-logo','photo-prev'];
      if(exIds.includes(img.id)) return false;
      if(img.classList.contains('logo')) return false; // logo scontrino
      if(img.classList.contains('brand-name')) return false;
      if(img.classList.contains('cl-photo')) return false; // foto inline nel carrello (contesto interattivo)
      if(img.classList.contains('pc-photo')) return false; // 🛒 foto tile cassa: click=addToCart, zoom solo via 🔍 dedicato
      // 🆕 v2.7.3 — Foto dentro card lavagna: il click apre la modal del prodotto, non il lightbox
      if(img.closest('.chalk-product-card')) return false;
      // Dentro un upload box (cliccare = aprire file picker)
      if(img.closest('#photo-box') || img.closest('#u-photo-box') || img.closest('.photo-upload')) return false;
      // Avatar piccoli (lista clienti, staff inline, ecc.) — soglia 48px (post-bug 30/05/2026)
      const r = img.getBoundingClientRect();
      if(r.width < 48 || r.height < 48) return false;
      return true;
    }

            ${isEdit?`<div style="font-size:10.5px;color:rgba(26,26,26,0.5);margin-top:3px;">${t('offerProductLocked')}</div>`:''}
          </div>
          <div class="field" style="margin:0;"><label class="lbl">${t('offerPriceNew')} (${t('currency')})</label><input class="input num" id="off-price" type="number" min="0" step="0.01" value="${o.priceNew||''}" dir="ltr"></div>
          <div>
            <label class="lbl">${t('offerBranches')}</label>
            <label style="display:flex;align-items:center;gap:6px;padding:7px 10px;border:1px solid ${isAll?'var(--gold)':'var(--ivory-dark)'};border-radius:8px;background:${isAll?'rgba(201,168,76,0.1)':'#fff'};cursor:pointer;font-size:12px;margin:6px 0;font-weight:700;">
              <input type="checkbox" id="off-all" ${isAll?'checked':''} style="width:14px;height:14px;cursor:pointer;">

            <div style="font-size:11px;letter-spacing:0.5px;color:var(--forest);font-weight:700;margin-bottom:8px;">⏹ ${t('offerEndConditions')}</div>
            <div class="field" style="margin:0;"><label class="lbl">${t('offerExpiry')} (${t('optional')})</label><input class="input" id="off-exp" type="date" value="${expStr}"></div>
            <div class="field" style="margin:0;margin-top:8px;"><label class="lbl">${t('offerMaxUnits')} (${t('optional')})</label><input class="input num" id="off-max" type="number" min="1" step="1" value="${o.maxUnits||''}" placeholder="∞" dir="ltr"></div>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;margin-top:8px;"><input type="checkbox" id="off-stockout" ${o.endOnStockOut?'checked':''} style="width:14px;height:14px;cursor:pointer;"> ${t('offerEndOnStockOut')}</label>
          </div>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:600;"><input type="checkbox" id="off-active" ${o.active!==false?'checked':''} style="width:16px;height:16px;cursor:pointer;"> ${t('offerActive')}</label>
          <button class="btn-forest btn-wide" id="off-save">✓ ${isEdit?t('save'):t('offerCreate')}</button>
          <button class="btn-secondary btn-wide" id="off-cancel">${t('cancel')}</button>
        </div>
      </div></div>`;
      $('ov2').onclick=closeSheet; $('cx').onclick=closeSheet;
      // "Tutte le filiali" toggle disabilita le checkboxes singole
      $('off-all').onchange=()=>{
        const allOn = $('off-all').checked;
        document.querySelectorAll('.off-br').forEach(cb=>{ cb.checked=false; cb.parentElement.style.opacity=allOn?'0.5':'1'; cb.parentElement.style.pointerEvents=allOn?'none':'auto'; });
        $('off-all').parentElement.style.background = allOn?'rgba(201,168,76,0.1)':'#fff';
        $('off-all').parentElement.style.borderColor = allOn?'var(--gold)':'var(--ivory-dark)';
      };
      $('off-cancel').onclick=()=>{ closeSheet(); openOffersManager(); };
      $('off-save').onclick=async()=>{
        const productId = $('off-prod').value;
        const priceNew = parseFloat($('off-price').value);
        if(!productId){ toast(t('selectProduct'),true); return; }
        if(isNaN(priceNew) || priceNew < 0){ toast(t('offerInvalidPrice'),true); return; }
        const p = products.find(x=>x.id===productId);
        if(p && priceNew >= (p.price||0)){ if(!confirm(t('offerPriceNotLower'))) return; }
        const allOn = $('off-all').checked;
        let branchIds = [];
        if(allOn) branchIds = ['all'];
        else { document.querySelectorAll('.off-br:checked').forEach(cb=>branchIds.push(cb.dataset.bid)); }
        if(!branchIds.length){ toast(t('offerBranchRequired'),true); return; }
        const exp = $('off-exp').value;
        const expTs = exp ? new Date(exp+'T23:59:59').getTime() : null;
        const maxU = parseInt($('off-max').value);
        const maxUnits = isNaN(maxU) || maxU<=0 ? null : maxU;
        const endOnStockOut = $('off-stockout').checked;
        const active = $('off-active').checked;
        if(!expTs && !maxUnits && !endOnStockOut){
          if(!confirm(t('offerNoEndConditions'))) return;
        }
        const btn=$('off-save'); btn.disabled=true; btn.textContent='...';
        try{
          if(isEdit){
            await updateDoc(doc(db,'offers',existing.id), { branchIds, priceNew, expiresAt:expTs, maxUnits, endOnStockOut, active });
            toast(t('offerUpdated'));
          } else {
            await addDoc(collection(db,'offers'), { productId, branchIds, priceNew, expiresAt:expTs, maxUnits, soldUnits:0, endOnStockOut, active, startAt:Date.now(), createdAt:Date.now(), createdBy:user.uid });
            toast(t('offerCreated'));
          }
          invalidateOffersCache();
          closeSheet(); openOffersManager();
          renderChalkboard();
        } catch(e){ console.error(e); toast(t('errorGen'),true); btn.disabled=false; btn.textContent='✓ '+(isEdit?t('save'):t('offerCreate')); }
      };
    }

    // 🆕 v2.7.0 Stage 4 — SISTEMA OFFERTE
    // Schema offers: {id, productId, branchIds[], priceNew, startAt, expiresAt|null,
    //                 maxUnits|null, soldUnits, endOnStockOut, active, createdAt, createdBy}
    let _offersCache = []; let _offersCacheTs = 0;
    async function loadActiveOffers(forceRefresh){
      // Cache 30s per evitare query ripetute (lavagna polla, cassa apre prodotto, ecc.)
      if(!forceRefresh && _offersCache.length>0 && Date.now()-_offersCacheTs < 30000) return _offersCache;
      try{
        const qs = await getDocs(query(collection(db,'offers'), where('active','==',true)));
        const now = Date.now();
        const items = [];
        for(const d of qs.docs){
          const o = {id:d.id, ...d.data()};
          // Auto-lazy-cleanup: offerte scadute → setta active=false
          if(o.expiresAt && o.expiresAt < now){
            try{ await updateDoc(doc(db,'offers',o.id),{active:false,autoEndedReason:'expired'}); } catch(e){ console.warn('[offers] expire failed:', e); }
            continue;
          }
          if(o.maxUnits && (o.soldUnits||0) >= o.maxUnits){
            try{ await updateDoc(doc(db,'offers',o.id),{active:false,autoEndedReason:'maxUnits'}); } catch(e){ console.warn('[offers] maxUnits failed:', e); }
            continue;
          }
          items.push(o);
        }
        _offersCache = items; _offersCacheTs = Date.now();
        return items;
      } catch(e){ console.warn('[offers] load failed:', e); return []; }
    }
    function invalidateOffersCache(){ _offersCache=[]; _offersCacheTs=0; }
    // Helper: trova offerta attiva per (productId, branchId)
    function findActiveOffer(productId, branchId){
      const now = Date.now();
      return _offersCache.find(o => {
        if(!o.active) return false;
        if(o.productId !== productId) return false;
        if(o.expiresAt && o.expiresAt < now) return false;
        if(o.maxUnits && (o.soldUnits||0) >= o.maxUnits) return false;
        // Multi-filiale: 'all' o branchIds include
        if(Array.isArray(o.branchIds) && o.branchIds.length>0){
          if(!o.branchIds.includes('all') && !o.branchIds.includes(branchId)) return false;
        }
        return true;
      });
    }
    // Helper: prezzo effettivo (per cassa)
    // Restituisce { price, isOffer, originalPrice, offer }
    function getEffectivePrice(product, branchId, applyOffer){
      const original = product.price || 0;
      const offer = findActiveOffer(product.id, branchId);
      if(offer && applyOffer){
        return { price: offer.priceNew, isOffer:true, originalPrice:original, offer };
      }
      return { price: original, isOffer:!!offer, originalPrice:original, offer:offer||null };
    }
    // Registra vendita su offerta: increment atomico soldUnits + chiude se raggiunge maxUnits
    async function registerOfferSale(offerId, qty){
      if(!offerId || !qty) return;
      try{
        const ref = doc(db,'offers',offerId);
        // increment atomico
        await updateDoc(ref, { soldUnits: increment(qty) });
        // re-leggere e chiudere se >= maxUnits
        const snap = await getDoc(ref);
        if(snap.exists()){
          const o = snap.data();
          if(o.maxUnits && (o.soldUnits||0) >= o.maxUnits && o.active){
            await updateDoc(ref, {active:false, autoEndedReason:'maxUnits'});
            invalidateOffersCache();
          }
        }
      } catch(e){ console.warn('[offers] registerSale failed:', e); }
    }

    // 🆕 v2.7.0 Stage 3 — NUOVI ARRIVI
    // Restituisce prodotti attivi creati o riattivati negli ultimi N giorni (default 7),
    // filtrati per categorie visibili della filiale del cliente.
    function getNewArrivals(branchId, daysWindow, max){
      const cutoff = Date.now() - (daysWindow||7)*24*60*60*1000;
      const branch = branchId ? branches.find(b=>b.id===branchId) : null;
      const visibleCats = (branch && Array.isArray(branch.clientCategoryIds)) ? branch.clientCategoryIds : null;
      return products
        .filter(p => p.active!==false)
        .filter(p => (p.firstActivatedAt||0) > cutoff)
        .filter(p => !visibleCats || visibleCats.includes(p.categoryId))
        .sort((a,b) => (b.firstActivatedAt||0) - (a.firstActivatedAt||0))
        .slice(0, max||6);
    }

    // 🆕 v2.7.0 — HELPERS STATO FILIALE
    // Calcolano in tempo reale l'orario odierno + stato (aperto/chiuso/in pausa)
    const _DAY_KEYS = ['sun','mon','tue','wed','thu','fri','sat'];
    function getBranchHoursToday(branch, now){
      if(!branch || !branch.hours) return null;
      const d = now || new Date();
      const key = _DAY_KEYS[d.getDay()];
      const h = branch.hours[key];
      if(!h || !h.open || !h.close) return null; // giorno chiuso o non configurato
      return { open: h.open, close: h.close, dayKey: key };
    }
    function _hhmmToMin(hhmm){ const p=(hhmm||'00:00').split(':').map(Number); return (p[0]||0)*60+(p[1]||0); }
    async function getBranchStatus(branchId, now){
      now = now || new Date();
      const branch = branches.find(b => b.id === branchId);
      if(!branch) return { state:'closed', reason:'unknown' };
      const hours = getBranchHoursToday(branch, now);
      // 1. Giorno chiuso o orari mancanti
      if(!hours) return { state:'closed', reason:'closedDay', hoursToday:null };
      // 2. Fuori orario apertura
      const nowMin = now.getHours()*60 + now.getMinutes();
      const openMin = _hhmmToMin(hours.open);
      const closeMin = _hhmmToMin(hours.close);
      if(nowMin < openMin || nowMin >= closeMin){
        return { state:'closed', reason:'outsideHours', hoursToday:hours };
      }
      // 3. Shift attivi (lettura sola, NO modifica schema)
      let activeShifts = [];
      try{
        const qs = await getDocs(query(collection(db,'shifts'), where('branchId','==',branchId), where('status','==','open')));
        qs.forEach(d => activeShifts.push({id:d.id, ...d.data()}));
      } catch(e){ console.warn('[branchStatus] shifts query failed:', e); }
      if(activeShifts.length === 0){
        return { state:'closed', reason:'noStaff', hoursToday:hours };
      }
      // 4. Pausa: se TUTTI gli shift attivi sono in pausa → filiale in pausa
      const allPaused = activeShifts.every(s => isOnPause(s));
      if(allPaused){
        return { state:'paused', hoursToday:hours };
      }
      return { state:'open', hoursToday:hours };
    }

    // 🆕 v2.6.5 / v2.7.0 — Lavagna comunicazioni (chalkboard)
    // Sempre presente nella home cliente (sezione benvenuto). Include:
    //   1. Sezione FISSA: data, orari oggi, stato live (open/closed/paused)
    //   2. Annunci pinnati (se presenti)
    //   3. Nuovi arrivi 7gg (Stage 3, prossimo turno)
    //   4. Offerte attive (Stage 4, prossimo turno)
    async function renderChalkboard(){
      const wrap = $('chalkboard-wrap');
      if(!wrap) return;
      const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
      // ====== Determina filiale di riferimento ======
      // Cliente loggato + filiale scelta → quella. Altrimenti, prima filiale attiva.
      // 🆕 v2.7.2 — Distingue tra branchId per dati (orari/stato) e per filtri (nuovi/offerte)
      const isClientChoice = !!clientBranchId; // true solo se il cliente ha scelto attivamente una filiale
      let branchId = clientBranchId || null;
      if(!branchId){
        const firstActive = branches.find(b=>b.active!==false);
        branchId = firstActive ? firstActive.id : null;
      }
      const branch = branchId ? branches.find(b=>b.id===branchId) : null;
      // ====== Stato filiale (live) ======
      let status = { state:'closed', reason:'unknown' };
      if(branchId){
        try{ status = await getBranchStatus(branchId, new Date()); }
        catch(e){ console.warn('[chalkboard] status failed:', e); }
      }
      // Stile per stato: i colori restano solo sul puntino, la label resta gesso bianco
      const STATUS_STYLE = {
        open:    { dotColor:'#7AE08F', emoji:'🟢', label:t('statusOpen'),   msg:'' },
        paused:  { dotColor:'#FFB84D', emoji:'🟡', label:t('statusPaused'), msg:t('pausedMessage') },
        closed:  { dotColor:'#FF7A7A', emoji:'🔴', label:t('statusClosed'), msg:'' }
      };
      const st = STATUS_STYLE[status.state] || STATUS_STYLE.closed;
      // Data oggi (locale)
      const today = new Date();
      const dateStr = today.toLocaleDateString(lang==='ar'?'ar-EG':'en-GB', { weekday:'long', day:'numeric', month:'long' });
      // 🆕 v2.7.2 — Palette gesso (colori rari)
      const CHALK = '#f5f0dc';            // gesso cream principale
      const CHALK_SOFT = 'rgba(245,240,220,0.75)';  // gesso desaturato
      const CHALK_BG = '#1F4D3D';          // verde lavagna scolastica
      const CHALK_BG_DARK = '#163A2E';     // ombra
      // 🆕 v2.7.3 — Font calligrafici diversi per lingua + effetto gesso ruvido
      const chalkFont = lang==='ar' ? "'Lalezar','Gulzar',cursive" : "'Gochi Hand','Kalam',cursive";
      // Effetto gesso: bagliore polveroso + texture ruvida via filtro SVG
      const chalkDust = `text-shadow:0 0 1px rgba(245,240,220,0.55),0 0 4px rgba(245,240,220,0.18),1px 1px 0 rgba(0,0,0,0.2);`;
      const chalkRough = `filter:url(#chalk-texture);`;
      // Titolo: grande, polveroso, ruvido
      const titleDouble = `font-family:${chalkFont};font-weight:700;color:${CHALK};${chalkDust}${chalkRough}letter-spacing:1px;`;
      const bodyChalk = `font-family:${chalkFont};color:${CHALK};${chalkDust}${chalkRough}letter-spacing:0.3px;`;
      const softChalk = `font-family:${chalkFont};color:${CHALK_SOFT};text-shadow:0 0 2px rgba(245,240,220,0.35);${chalkRough}`;
      // Orari oggi (se ci sono e non chiuso per giorno)
      const hoursLine = status.hoursToday
        ? `<span dir="ltr" style="${bodyChalk};font-size:22px;">${status.hoursToday.open} — ${status.hoursToday.close}</span>`
        : `<span style="${bodyChalk};font-size:20px;opacity:0.7;">${t('hoursClosedToday')}</span>`;
      // === SEZIONE FISSA: data + stato + orari COMPATTA PREMIUM ===
      const GOLD_HDR = '#C9A84C';
      // 🆕 v2.7.3 — Countdown alla chiusura (mostrato quando aperto)
      let closingSoonHtml = '';
      if(status.state==='open' && status.hoursToday && status.hoursToday.close){
        const nowD = new Date();
        const [ch, cm] = String(status.hoursToday.close).split(':').map(Number);
        if(!isNaN(ch)){
          const closeD = new Date(nowD); closeD.setHours(ch, cm||0, 0, 0);
          let diffMs = closeD - nowD;
          if(diffMs < 0) diffMs += 24*3600*1000; // chiusura dopo mezzanotte
          const dH = Math.floor(diffMs/3600000);
          const dM = Math.floor((diffMs%3600000)/60000);
          // 🆕 v2.7.3 — In arabo, ordine 5س 2د forzato con <bdi dir="ltr">
          let timeLeft;
          if(lang==='ar'){
            const parts = [];
            if(dH>0) parts.push(dH+'س');
            parts.push(dM+'د');
            timeLeft = `<bdi dir="ltr">${parts.join(' ')}</bdi>`;
          } else {
            timeLeft = (dH>0?dH+'h ':'') + dM + 'min';
          }
          const closeLbl = lang==='ar' ? 'هنقفل بعد' : 'Closes in';
          closingSoonHtml = `<div style="text-align:center;margin-top:10px;"><span style="display:inline-flex;align-items:center;gap:7px;background:rgba(201,168,76,0.13);border:1px solid rgba(201,168,76,0.4);border-radius:20px;padding:5px 14px;${bodyChalk}font-size:17px;color:${GOLD_HDR};">⏳ ${closeLbl} <span style="font-weight:700;">${timeLeft}</span></span></div>`;
        }
      }
      const fixedSectionHtml = `
        <div style="margin-bottom:18px;padding-bottom:16px;border-bottom:1px dashed rgba(245,240,220,0.22);">
          <!-- Titolo filiale + stato aperto/chiuso ACCANTO -->
          <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
            <span style="font-size:18px;opacity:0.7;filter:drop-shadow(0 0 3px rgba(201,168,76,0.4));">📌</span>
            <span style="${titleDouble};font-size:34px;letter-spacing:1.5px;transform:rotate(-1deg);">${branch ? esc(lang==='ar'?branch.nameAr:branch.nameEn) : t('chalkboardTitle')}</span>
            <span style="display:inline-flex;align-items:center;gap:7px;background:rgba(0,0,0,0.2);border:1px solid ${st.dotColor};border-radius:20px;padding:4px 12px;">
              <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${st.dotColor};box-shadow:0 0 7px ${st.dotColor};"></span>
              <span style="font-family:${chalkFont};font-style:italic;color:#f5f0dc;font-size:16px;font-weight:600;">${esc(st.label)}</span>
            </span>
          </div>
          <!-- Data + Orari sulla stessa riga -->
          <div style="display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;">
            <span style="${bodyChalk};font-size:19px;">📅 ${esc(dateStr)}</span>
            <span style="color:${GOLD_HDR};font-size:14px;opacity:0.8;">◆</span>
            <span style="${bodyChalk};font-size:19px;" dir="ltr">🕐 ${status.hoursToday ? status.hoursToday.open + ' — ' + status.hoursToday.close : t('hoursClosedToday')}</span>
          </div>
          ${closingSoonHtml}
          ${st.msg ? `<div style="text-align:center;margin-top:10px;${bodyChalk};font-size:16px;opacity:0.85;">${esc(st.msg)}</div>` : ''}
        </div>`;
      // === SEZIONE ANNUNCI (esistente) — filtrata per branchId quando v2.7.0 stage 5 attivo ===
      let annItems = [];
      try {
        const qs = await getDocs(query(collection(db,'announcements'), where('active','==',true)));
        const nowMs = Date.now();
        qs.forEach(d => {
          const a = {id:d.id, ...d.data()};
          if(a.expiresAt && a.expiresAt < nowMs) return;
          // Multi-filiale (Stage 5): se branchIds settato, filtra
          if(Array.isArray(a.branchIds) && a.branchIds.length>0){
            if(!a.branchIds.includes('all') && (!branchId || !a.branchIds.includes(branchId))) return;
          }
          annItems.push(a);
        });
        annItems.sort((a,b)=>{ const pA=(a.pinned?1:0),pB=(b.pinned?1:0); if(pA!==pB)return pB-pA; return (b.createdAt||0)-(a.createdAt||0); });
        annItems = annItems.slice(0, 5);
      } catch(e){ console.warn('[chalkboard] announcements failed:', e); }
      let annSectionHtml = '';
      if(annItems.length){
        const isSingleAnn = annItems.length === 1;
        const itemsHtml = annItems.map((a, i) => {
          const ic = a.icon || '📢';
          const pin = a.pinned ? '<span style="font-size:12px;opacity:0.7;">📌</span>' : '';
          const tilt = isSingleAnn ? 0 : (((a.id||'x').charCodeAt(0) % 5) - 2) * 0.4;
          // 🆕 v2.7.3 — Testo nella lingua corrente con fallback al campo legacy
          const annTitle = lang==='ar' ? (a.titleAr||a.title||'') : (a.titleEn||a.title||'');
          const annMsg = lang==='ar' ? (a.messageAr||a.message||'') : (a.messageEn||a.message||'');
          if(isSingleAnn){
            // 🆕 v2.7.3 — Annuncio singolo: grande, centrato, titolo + testo affiancati
            return `<div style="background:rgba(0,0,0,0.13);border:1px solid rgba(201,168,76,0.22);border-radius:16px;padding:20px 28px;max-width:780px;margin:0 auto;display:flex;align-items:center;gap:22px;flex-wrap:wrap;justify-content:center;">
              <div style="font-size:52px;line-height:1;flex-shrink:0;filter:drop-shadow(0 0 6px rgba(245,240,220,0.25));">${ic}</div>
              <div style="${titleDouble};font-size:34px;line-height:1.15;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">${esc(annTitle)} ${pin}</div>
              ${annMsg ? `<div style="${bodyChalk};font-size:24px;line-height:1.25;opacity:0.92;flex:1;min-width:200px;">${esc(annMsg)}</div>` : ''}
            </div>`;
          }
          // Annunci multipli: card "note" in griglia
          return `<div style="background:rgba(0,0,0,0.13);border:1px solid rgba(201,168,76,0.22);border-radius:14px;padding:14px 16px;transform:rotate(${tilt}deg);text-align:center;">
            <div style="font-size:30px;line-height:1;margin-bottom:8px;filter:drop-shadow(0 0 4px rgba(245,240,220,0.2));">${ic}</div>
            <div style="${titleDouble};font-size:21px;line-height:1.2;margin-bottom:5px;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;">${esc(annTitle)} ${pin}</div>
            ${annMsg ? `<div style="${bodyChalk};font-size:17px;line-height:1.3;opacity:0.9;">${esc(annMsg)}</div>` : ''}
          </div>`;
        }).join('');
        // 🆕 v2.7.3 — Per 1 annuncio: layout flex; per più: griglia responsive
        const container = isSingleAnn
          ? itemsHtml
          : `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;justify-content:center;">${itemsHtml}</div>`;
        annSectionHtml = `<div style="margin-bottom:18px;padding-bottom:16px;border-bottom:1px dashed rgba(245,240,220,0.22);">${container}</div>`;
      }
      // === 🆕 SEZIONE NUOVI ARRIVI + OFFERTE — calcolo count PRIMA per scala adattiva ===
      // 🆕 v2.7.3 — Quando una categoria è vuota, l'altra usa la "scala full-width" (card più grandi)
      const currency = t('currency');
      const GOLD = '#C9A84C';
      const newLabel = lang==='ar' ? 'جديد' : 'NEW';
      
      // 1. Carico nuovi arrivi
      let arrivals = [];

        render();

        checkPendingOrders(); // فحص فوري للطلبات الواردة
        clearInterval(window.__custTimer); window.__custTimer=setInterval(()=>{ checkPendingCustody(); checkPendingOrders(); },15000); // كل 15 ثانية (تقليل استهلاك Firebase reads)

    // ============ DATA LOADERS ============
    async function loadBranches(allActive){
      branches=[];
      if(allActive || profile&&profile.role==='admin'){
        const qs=await getDocs(query(collection(db,'branches'),where('active','==',true)));
        qs.forEach(d=>branches.push({id:d.id,...d.data()}));
      } else {
        for(const bid of (profile.branchIds||[])){
          const bs=await getDoc(doc(db,'branches',bid));
          if(bs.exists()&&bs.data().active!==false) branches.push({id:bs.id,...bs.data()});
        }
      }
    }
    // turno aperto del cassiere (in qualsiasi filiale) — definisce la filiale di lavoro
    async function loadMyOpenShift(){
      myShift=null;
      try{
        const qs=await getDocs(query(collection(db,'shifts'),where('userId','==',user.uid),where('status','==','open')));
        qs.forEach(d=>{ if(!myShift) myShift={id:d.id,...d.data()}; });
        if(myShift && myShift.branchId){ currentBranchId=myShift.branchId; } // blocca la filiale sul turno
      }catch(e){ console.error('loadMyOpenShift',e); }
    }
    // 🚀 Cache catalogo: 5 دقائق لتقليل قراءات Firebase
    // التخزين المؤقت يقلل القراءات بنسبة 80%+ خاصة للعملاء اللي بيفتحوا التطبيق كتير
    const CATALOG_CACHE_TTL = 5 * 60 * 1000; // 5 دقائق
    function _readCatalogCache(branchId){
      try{
        const raw = localStorage.getItem('lecoin_catalog_v1');
        if(!raw) return null;
        const obj = JSON.parse(raw);
        if(!obj || !obj.t || (Date.now()-obj.t) > CATALOG_CACHE_TTL) return null;
        if(obj.branchId !== branchId) return null; // المخزون يختلف حسب الفرع
        return obj;
      }catch(e){ return null; }
    }
    function _writeCatalogCache(branchId, cats, prods, inv){
      try{ localStorage.setItem('lecoin_catalog_v1', JSON.stringify({t:Date.now(),branchId,cats,prods,inv})); }catch(e){}
    }
    function invalidateCatalogCache(){ try{ localStorage.removeItem('lecoin_catalog_v1'); }catch(e){} }
    async function loadCatalog(forceReload){
      // محاولة استخدام Cache (إلا لو الكود طلب reload صريح)
      if(!forceReload){
        const cache = _readCatalogCache(currentBranchId);
        if(cache){
          categories = cache.cats || [];
          products = cache.prods || [];
          inventory = cache.inv || {};
          return;
        }
      }
      categories=[]; products=[]; inventory={};
      const cs=await getDocs(collection(db,'categories'));
      cs.forEach(d=>categories.push({id:d.id,...d.data()}));
      categories.sort((a,b)=>(a.order||0)-(b.order||0));
      const ps=await getDocs(collection(db,'products'));
      ps.forEach(d=>products.push({id:d.id,...d.data()}));
      const inv=await getDocs(query(collection(db,'inventory'),where('branchId','==',currentBranchId)));
      inv.forEach(d=>{ const x=d.data(); inventory[x.productId]={qty:x.qty||0,threshold:x.threshold||20,lastCost:x.lastCost||0}; });
      _writeCatalogCache(currentBranchId, categories, products, inventory);
    }
    async function loadInstapayCfg(){
      try{ const s=await getDoc(doc(db,'settings','instapay')); if(s.exists()){ const x=s.data(); instapayCfg={qrDataUrl:x.qrDataUrl||'', alias:x.alias||''}; } }catch(e){ console.warn('loadInstapayCfg',e); }

    // ============ CHROME (top bar, nav) ============

      $('nav-inner').style.gridTemplateColumns=`repeat(${tabs.length},1fr)`;
      $('nav-inner').innerHTML=tabs.map(x=>`<button class="nav-btn ${x.k===activeTab?'active':''}" data-tab="${x.k}"><span class="ico">${x.ico}</span><span class="lbl2">${x.l}</span></button>`).join('');
      document.querySelectorAll('.nav-btn').forEach(b=>b.onclick=()=>{activeTab=b.dataset.tab;_saveActiveTab(activeTab);document.querySelectorAll('.nav-btn').forEach(x=>x.classList.toggle('active',x===b));b.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});render();});
      const av=document.querySelector('.nav-btn.active'); if(av) av.scrollIntoView({inline:'center',block:'nearest'});

    // blocca/sblocca il selettore filiale in alto in base al turno aperto
    function applyBranchLock(){
      const bs=$('branch-select'); if(!bs) return;
      if(myShift){ bs.value=myShift.branchId; bs.style.opacity='0.6'; bs.title=t('branchLocked'); }

    async function render(){
      // refresh nav labels & branch names for language
      const bs=$('branch-select'); if(bs){const cur=bs.value;bs.innerHTML=branches.map(b=>`<option value="${b.id}">${lang==='ar'?b.nameAr:b.nameEn}</option>`).join('');bs.value=cur;}
      document.querySelectorAll('.nav-btn').forEach(b=>{const k=b.dataset.tab;b.querySelector('.lbl2').textContent=k==='analytics'?t('analyticsTitle'):k==='dashboard'?t('dashboard_tab'):k==='cassa'?t('cashier_tab'):k==='shift'?t('shift_tab'):k==='receipts'?t('receipts_tab'):k==='products'?t('products'):k==='categories'?t('categories'):k==='warehouse'?t('warehouse'):k==='suppliers'?t('suppliers_tab'):k==='users'?t('users'):k==='staff'?t('staff_tab'):k==='reports'?t('reports'):k==='branches'?t('branches_tab'):k==='customers'?(lang==='ar'?'العملاء':'Customers'):t('cashier_tab');});
      if(activeTab==='cassa') return await renderCassa();  // 🆕 v2.7.2 — await renderCassa()
      else { const cb=$('cart-bar-root'); if(cb) cb.innerHTML=''; 
        if(activeTab==='analytics') renderAnalytics();
        else if(activeTab==='dashboard') renderAnalytics(); // 🔁 v2.6.0: redirect legacy → analytics
        else if(activeTab==='products') renderProducts();
        else if(activeTab==='categories') renderCategories();
        else if(activeTab==='warehouse') renderWarehouse();
        else if(activeTab==='suppliers') renderSuppliers();
        else if(activeTab==='shift') renderShift();
        else if(activeTab==='receipts') renderReceipts();
        else if(activeTab==='users') renderUsers();
        else if(activeTab==='staff') renderStaff();
        else if(activeTab==='reports') renderAnalytics(); // 🔁 v2.6.0: redirect legacy → analytics
        else if(activeTab==='branches') renderBranches();
        else if(activeTab==='customers') renderCustomers();
        else renderCassa();
      }
    }

    // ============ CASSA / CASHIER (vendita) ============
    let cart=[]; // {id,name,price,photoUrl,qty}
    let posCatFilter='all';
    let cartExpanded=true; // il pannello carrello si apre dal basso e cresce mentre aggiungi
    function cartCount(){ return cart.reduce((s,i)=>s+i.qty,0); }
    function cartTotal(){ return cart.reduce((s,i)=>s+i.price*i.qty,0); }
    function addToCart(p){
      const inv=inventory[p.id]||{qty:0};
      const existing=cart.find(i=>i.id===p.id);
      const inCart=existing?existing.qty:0;
      if(inCart+1>(inv.qty||0)){ toast(t('outOfStock'),true); return; }
      // 🆕 v2.7.0 Stage 4b — Detect offerta disponibile per (prodotto, filiale)
      // Mantiene prezzo pieno; tagga l'item con offerAvailableId per UI badge + bottone "Applica"
      const offer = (typeof findActiveOffer==='function') ? findActiveOffer(p.id, currentBranchId) : null;
      if(existing){
        existing.qty++;
        // se l'offerta non è ancora applicata e ce ne è una disponibile, aggiorna il tag
        if(offer && !existing.appliedOfferId) existing.offerAvailableId = offer.id;
      } else {
        const item = {id:p.id,name:p.name,price:p.price,photoUrl:p.photoUrl||'',qty:1};
        if(offer) item.offerAvailableId = offer.id;
        cart.push(item);
      }
      beep(); // صوت زي السوبر ماركت عند إضافة منتج للبيع
      cartExpanded=true; // si apre/cresce dal basso
      renderCartBar();
    }
    // 🆕 v2.7.0 Stage 4b — Applica/Rimuovi offerta su un item del cart
    function applyOfferToCartItem(itemId){
      const it = cart.find(i=>i.id===itemId); if(!it) return;
      const offer = _offersCache.find(o=>o.id===it.offerAvailableId);
      if(!offer){ toast(t('offerExpired'),true); delete it.offerAvailableId; renderCartBar(); return; }
      // Salva prezzo originale per poter eventualmente fare rollback
      if(it.originalPrice == null) it.originalPrice = it.price;
      it.price = offer.priceNew;
      it.appliedOfferId = offer.id;
      // Manteniamo offerAvailableId per riferimento, ma UI mostra "Applicata"
      toast(t('offerApplied'));
      renderCartBar();
    }
    function unapplyOfferFromCartItem(itemId){
      const it = cart.find(i=>i.id===itemId); if(!it) return;
      if(it.originalPrice != null) it.price = it.originalPrice;
      delete it.appliedOfferId;
      delete it.originalPrice;
      renderCartBar();
    }
    function setQty(id,delta){
      const it=cart.find(i=>i.id===id); if(!it)return;
      const inv=inventory[id]||{qty:0};
      const nv=it.qty+delta;
      if(nv<=0){ cart=cart.filter(i=>i.id!==id); }
      else if(nv>(inv.qty||0)){ toast(t('outOfStock'),true); return; }
      else it.qty=nv;
      renderCartBar();
    }
    function renderCartBar(){
      const root=$('cart-bar-root'); if(!root) return;
      if(cart.length===0){ root.innerHTML=''; return; }
      if(!cartExpanded){
        // barra sottile (cliccare per espandere)
        root.innerHTML=`<div class="cart-bar"><div class="cart-inner" id="open-cart">
          <span style="display:flex;align-items:center;gap:10px;"><span class="cart-count">${cartCount()}</span><span style="font-size:13px;">${t('cart')}</span></span>
          <span class="num" style="font-weight:700;font-size:16px;">${fmt(cartTotal())} ${t('currency')}</span>
        </div></div>`;
        $('open-cart').onclick=()=>{ cartExpanded=true; renderCartBar(); };
        return;
      }
      // pannello espanso con gli articoli (cresce mentre aggiungi)
      const lines=cart.map(i=>{
        // 🆕 v2.7.0 Stage 4b — Badge offerta + bottone Applica/Rimuovi
        const offer = i.offerAvailableId ? _offersCache.find(o=>o.id===i.offerAvailableId) : null;
        const applied = !!i.appliedOfferId;
        let offerBadge = '';
        if(applied){
          const savedTotal = (i.originalPrice - i.price) * i.qty;
          offerBadge = `<div style="display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:4px;padding:4px 8px;background:rgba(122,224,143,0.12);border:1px solid rgba(122,224,143,0.35);border-radius:6px;">
            <span style="font-size:10.5px;color:var(--green);font-weight:700;">✓ ${t('offerApplied')} · −${fmt(savedTotal)} ${t('currency')}</span>
            <button class="cart-offer-rm" data-id="${i.id}" style="background:none;border:none;color:var(--red);font-size:11px;cursor:pointer;font-weight:600;padding:0;">✕</button>
          </div>`;
        } else if(offer){
          const pct = i.price>0 ? Math.round((1-(offer.priceNew/i.price))*100) : 0;
          offerBadge = `<button class="cart-offer-apply" data-id="${i.id}" style="display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:4px;padding:4px 8px;background:rgba(255,184,77,0.15);border:1px solid rgba(255,184,77,0.45);border-radius:6px;cursor:pointer;width:100%;font-family:inherit;">
            <span style="font-size:10.5px;color:var(--amber);font-weight:700;">🔥 ${t('offerAvailable')} ${pct>0?`(−${pct}%)`:''}</span>
            <span style="font-size:11px;color:var(--forest);font-weight:700;">${t('applyOffer')} →</span>
          </button>`;
        }
        return `<div class="cart-mini-line" style="flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:10px;width:100%;">
            ${i.photoUrl?`<img class="cl-photo" src="${i.photoUrl}" style="width:38px;height:38px;border-radius:8px;object-fit:cover;">`:`<div class="cl-photo" style="width:38px;height:38px;border-radius:8px;background:var(--ivory-dark);display:flex;align-items:center;justify-content:center;">🍽️</div>`}
            <div style="flex:1;min-width:0;">
              <div class="fr" dir="ltr" style="font-size:13px;font-weight:500;">${i.name}</div>
              <div class="num" style="font-size:11px;color:var(--forest);font-weight:700;">
                ${applied && i.originalPrice!=null ? `<span style="text-decoration:line-through;color:rgba(26,26,26,0.4);font-weight:500;">${fmt(i.originalPrice*i.qty)}</span> ` : ''}
                ${fmt(i.price*i.qty)} ${t('currency')}
              </div>
            </div>
            <div class="qty-ctrl"><button class="qty-btn" data-dec="${i.id}">−</button><span class="num" style="min-width:18px;text-align:center;font-weight:700;">${i.qty}</span><button class="qty-btn" data-inc="${i.id}">+</button></div>
          </div>
          ${offerBadge}
        </div>`;
      }).join('');
      root.innerHTML=`<div class="cart-bar" style="pointer-events:none;"><div class="cart-panel">
        <div class="cart-panel-head" id="cart-collapse">
          <span style="display:flex;align-items:center;gap:10px;"><span class="cart-count">${cartCount()}</span><span style="font-size:13px;">${t('cart')}</span></span>
          <span style="display:flex;align-items:center;gap:12px;"><span class="num" style="font-weight:700;font-size:16px;">${fmt(cartTotal())} ${t('currency')}</span><span style="font-size:18px;">▾</span></span>
        </div>
        <div class="cart-panel-items">${lines}</div>
        <div style="padding:10px 14px 12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><span style="font-size:14px;font-weight:600;">${t('total')}</span><span class="num" style="font-size:20px;font-weight:700;color:var(--forest);">${fmt(cartTotal())} ${t('currency')}</span></div>
          <div style="display:flex;gap:8px;">
            <button class="btn-forest" id="do-pay" style="flex:1;padding:13px;">✓ ${t('checkout')}</button>
            <button class="btn-secondary" id="clear-cart" style="padding:13px 14px;color:var(--red);border-color:rgba(192,72,72,0.3);">🗑️</button>
          </div>
        </div>
      </div></div>`;
      $('cart-collapse').onclick=()=>{ cartExpanded=false; renderCartBar(); };
      root.querySelectorAll('[data-inc]').forEach(b=>b.onclick=()=>setQty(b.dataset.inc,1));
      root.querySelectorAll('[data-dec]').forEach(b=>b.onclick=()=>setQty(b.dataset.dec,-1));
      // 🆕 v2.7.0 Stage 4b — Bottoni offerta
      root.querySelectorAll('.cart-offer-apply').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); applyOfferToCartItem(b.dataset.id); });
      root.querySelectorAll('.cart-offer-rm').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); unapplyOfferFromCartItem(b.dataset.id); });
      $('do-pay').onclick=openPaymentSheet;
      $('clear-cart').onclick=()=>{ if(!confirm(t('confirmClear')))return; cart=[]; renderCartBar(); };
    }
    // اسم المنتج حسب اللغة مع ريجوع للّغة التانية لو ناقص (يمنع اللخبطة)
    function pName(p){ if(!p) return ''; return lang==='ar' ? (p.nameAr||p.name||'') : (p.name||p.nameAr||''); }
    function pName2(p){ if(!p) return ''; return lang==='ar' ? (p.name||'') : (p.nameAr||''); } // الاسم الثانوي

    async function renderCassa(){
      $('cart-bar-root')||$('content').insertAdjacentHTML('afterend','<div id="cart-bar-root"></div>');
      // الأدمن بس يقدر يبيع من غير وردية. الكاشير والمدير لازم يفتحوا وردية.
      if(!myShift && profile.role!=='admin'){
        const cb=$('cart-bar-root'); if(cb) cb.innerHTML='';
        $('content').innerHTML=`<div class="card" style="text-align:center;padding:32px 18px;">
          <div style="font-size:40px;margin-bottom:10px;">🕐</div>
          <div style="font-weight:700;font-size:16px;margin-bottom:8px;">${t('needShiftToSell')}</div>
          <button class="btn-gold btn-wide" id="go-shift" style="margin-top:10px;">🕐 ${t('openShiftNow')}</button>
        </div>`;
        const g=$('go-shift'); if(g) g.onclick=()=>{ activeTab='shift'; _saveActiveTab(activeTab); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab==='shift')); render(); };
        return;
      }
      const actives=products.filter(p=>p.active!==false);
      if(actives.length===0){ $('content').innerHTML=`<div class="card"><div class="empty">${t('noProdYet')}</div></div>`; renderCartBar(); return; }
      // 🆕 v2.7.2 — Await offerte PRIMA di calcolare i chip (altrimenti al primo render la cache è vuota e il chip "Offerte" non appare)
      if(typeof loadActiveOffers==='function'){ try{ await loadActiveOffers(); }catch(e){} }
      // شريط الطلبات الجاهزة (طلبات عملاء جهّزها الكاشير ومستنية الدفع)
      loadReadyOrdersForCassa();
      // 🆕 v2.7.2 — Pseudo-categorie "Offerte" e "Novità" (condizionali)
      const cassaBranchId = (myShift && myShift.branchId) || currentBranchId;
      const NEW_WINDOW_DAYS = 7;
      const newCutoff = Date.now() - NEW_WINDOW_DAYS*86400000;
      const offerProds = actives.filter(p => typeof findActiveOffer==='function' && findActiveOffer(p.id, cassaBranchId));
      const newProds = actives.filter(p => (p.firstActivatedAt||0) > newCutoff);
      // Se il filtro corrente punta a una pseudo-categoria che è diventata vuota → torna a 'all'
      if((posCatFilter==='_offers' && offerProds.length===0) || (posCatFilter==='_new' && newProds.length===0)){
        posCatFilter = 'all';
      }
      const cats=categories.filter(c=>c.active!==false);
      const offerChip = offerProds.length>0
        ? `<button class="pos-cat-chip ${posCatFilter==='_offers'?'active':''}" data-cat="_offers" style="${posCatFilter==='_offers'?'background:linear-gradient(135deg,#FF6B35,#FF4500);color:#fff;border-color:#FF6B35;':'background:rgba(255,107,53,0.1);color:#FF6B35;border-color:rgba(255,107,53,0.4);'}font-weight:800;">🔥 ${t('offersTitle')}</button>`

    async function doCheckout(paid, payMethod, payProofDataUrl, pointsUsed){
      pointsUsed = pointsUsed || 0;
      if(cart.length===0)return;
      if(!myShift && profile.role!=='admin'){ toast(t('needShiftToSell'),true); closeSheet(); return; } // الأدمن بس يبيع من غير وردية
      payMethod = payMethod==='instapay' ? 'instapay' : 'cash';
      const saleBranchId = myShift ? (myShift.branchId||currentBranchId) : (saleBranchSel||currentBranchId); // فرع الوردية أو الفرع المؤكَّد
      const saleShiftId = myShift ? myShift.id : null;
      const cb=$('pay-confirm'); if(cb){ cb.textContent='...'; cb.disabled=true; }
      try{
        // 🆕 v2.7.0 Stage 4b — Includi appliedOfferId nell'item salvato per audit storico
        const items=cart.map(i=>{
          const it = {productId:i.id,name:i.name,price:i.price,qty:i.qty,subtotal:i.price*i.qty};
          if(i.appliedOfferId){ it.appliedOfferId = i.appliedOfferId; it.originalPrice = i.originalPrice; }
          return it;
        });
        const total=cartTotal();
        const createdAt=Date.now();
        const tzo=tzOffsetMin(createdAt); // congela l'offset (estate/inverno) al momento della fattura
        const receiptNo=Number(String(createdAt).slice(-6)); // numero fattura stabile
        // Instapay: pagamento esatto online (niente resto, non entra nel cash)
        const paidAmt = payMethod==='instapay' ? total : ((paid==null||isNaN(paid))?total:paid);
        const change = payMethod==='instapay' ? 0 : Math.max(0,paidAmt-total);
        // 1) registra la vendita (legata al turno + filiale del turno) con il metodo di pagamento
        const subtotal=total; // إجمالي قبل خصم النقاط
        const finalTotal = Math.max(0, subtotal - (pointsUsed||0));
        const paidActual = payMethod==='instapay' ? finalTotal : Math.max(paid, finalTotal);
        const changeFinal = payMethod==='instapay' ? 0 : Math.max(0, paidActual - finalTotal);
        // النقاط الجديدة على المبلغ المدفوع فعلياً (مش المخصوم)
        const pct = getEffectivePointsPct(currentCustomer, saleBranchId);
        // 🆕 v2.7.2 — Base eligibile per i punti: esclude items in offerta (già scontati)
        const eligibleSubtotalCommit = items.reduce((s,it)=> it.appliedOfferId ? s : s + ((it.price||0) * (it.qty||0)), 0);
        const eligibleForPtsCommit = Math.max(0, eligibleSubtotalCommit - (pointsUsed||0));
        // النقاط المكتسبة (تقريب لأعلى دائماً — حد أدنى 1 نقطة لو فيه دفع وفيه منتجات غير في عرض)
        const pointsEarned = currentCustomer && eligibleForPtsCommit>0 ? Math.max(1, Math.ceil(eligibleForPtsCommit * pct / 100)) : 0;
        const custFields = currentCustomer ? {customerId:currentCustomer.id,customerName:currentCustomer.name||''} : {};
        // احسب رصيد العميل قبل التحديث (نحفظه في الفاتورة عشان يطلع في الإيصال)
        let pointsBalanceAfter = null;
        if(currentCustomer){
          const csnap=await getDoc(doc(db,'customers',currentCustomer.id));
          const curr = csnap.exists() ? (csnap.data().points||0) : 0;
          pointsBalanceAfter = Math.max(0, Math.round((curr - (pointsUsed||0) + pointsEarned) * 100) / 100);
        }
        const ref=await addDoc(collection(db,'sales'),{
          branchId:saleBranchId, shiftId:saleShiftId, userId:user.uid, userName:profile.name||user.email,
          items, total:subtotal, count:cartCount(), receiptNo, paid:paidActual, change:changeFinal, payMethod, payProof:payProofDataUrl||'',
          pointsUsed:pointsUsed||0, pointsEarned, pointsBalanceAfter, ...custFields, createdAt, tzo
        });
        // تحديث رصيد نقاط العميل + سجل الحركات
        if(currentCustomer){
          await updateDoc(doc(db,'customers',currentCustomer.id),{points:pointsBalanceAfter, pointsRequest:null});
          if(pointsUsed>0) await addDoc(collection(db,'pointsLedger'),{customerId:currentCustomer.id,branchId:saleBranchId,type:'spend',amount:pointsUsed,saleId:ref.id,createdAt});
          if(pointsEarned>0) await addDoc(collection(db,'pointsLedger'),{customerId:currentCustomer.id,branchId:saleBranchId,type:'earn',amount:pointsEarned,saleId:ref.id,createdAt});
        }
        // 2) scala l'inventario del branch di vendita
        const sameBranch = (saleBranchId===currentBranchId);
        // 🆕 v2.7.0 Stage 4b — Traccia stockout per auto-end offerte con endOnStockOut
        const stockoutPids = [];
        for(const i of cart){
          let cur;
          if(sameBranch){ cur=inventory[i.id]||{qty:0,threshold:20,lastCost:0}; }
          else { const snap=await getDoc(doc(db,'inventory',`${saleBranchId}_${i.id}`)); cur=snap.exists()?snap.data():{qty:0,threshold:20,lastCost:0}; }
          const nq=Math.max(0,(cur.qty||0)-i.qty);
          await setDoc(doc(db,'inventory',`${saleBranchId}_${i.id}`),{branchId:saleBranchId,productId:i.id,qty:nq,threshold:cur.threshold||20,lastCost:cur.lastCost||0},{merge:true});
          if(sameBranch) inventory[i.id]={qty:nq,threshold:cur.threshold||20,lastCost:cur.lastCost||0};
          if(nq === 0) stockoutPids.push(i.id);
        }
        // 🆕 v2.7.0 Stage 4b — Track vendite su offerte applicate (atomic increment + auto-close se maxUnits)
        for(const i of cart){
          if(i.appliedOfferId && typeof registerOfferSale==='function'){
            await registerOfferSale(i.appliedOfferId, i.qty);
          }
        }
        // 🆕 v2.7.0 Stage 4b — Auto-end offerte con endOnStockOut quando stock=0
        if(stockoutPids.length && typeof loadActiveOffers==='function'){
          try{
            const allOffers = await loadActiveOffers(true);
            for(const o of allOffers){
              if(o.endOnStockOut && stockoutPids.includes(o.productId)){
                const visible = !Array.isArray(o.branchIds) || o.branchIds.length===0 || o.branchIds.includes('all') || o.branchIds.includes(saleBranchId);
                if(visible){
                  try{ await updateDoc(doc(db,'offers',o.id),{active:false,autoEndedReason:'stockOut'}); } catch(e){ console.warn('[offers] stockout end failed:', e); }
                }
              }
            }
            invalidateOffersCache();
          } catch(e){ console.warn('[offers] stockout check failed:', e); }
        }
        const sale={id:ref.id,branchId:saleBranchId,shiftId:saleShiftId,userName:profile.name||user.email,items,total,count:cartCount(),receiptNo,paid:paidAmt,change,payMethod,payProof:payProofDataUrl||'',createdAt,tzo};
        cart=[]; currentCustomer=null; closeSheet(); renderCassa(); toast(t('saleDone'));
        showReceipt(sale); // mostra la fattura automaticamente
      }catch(e){ console.error(e); toast(t('errorGen'),true); if(cb){ cb.textContent='✓ '+t('confirmPay'); cb.disabled=false; } }
    }

    // ============ RICEVUTE / الفواتير (receipts) ============
    function receiptBranchName(bid){ const b=branches.find(x=>x.id===bid); return b?(lang==='ar'?b.nameAr:b.nameEn):''; }
    // يبني نص الفاتورة ويفتح واتساب (العميل يختار جهة الاتصال)
    // يرسم الفاتورة كصورة (Canvas) فيها اللوجو وكل التفاصيل، ويشاركها أو ينزّلها PNG
    function receiptToImage(sale, bn, dt, btn){
      const btnLabel = btn ? btn.textContent : '';
      const W=620, pad=34, ar=(lang==='ar');
      // قياس الارتفاع المطلوب
      const items=sale.items||[];
      const lineH=46, headH=250;
      const net=Math.max(0,(sale.total||0)-(sale.refundTotal||0));
      const extra=(sale.paid!=null?56:0)+((sale.refundTotal>0||sale.voided)?56:0);
      const H=headH + items.length*lineH + 150 + extra;
      const c=document.createElement('canvas'); c.width=W; c.height=H;
      const x=c.getContext('2d');
      // خلفية
      x.fillStyle='#FAF6EE'; x.fillRect(0,0,W,H);
      // شريط أخضر علوي
      x.fillStyle='#1F3A2E'; x.fillRect(0,0,W,150);
      // اللوجو في النص
      try{ const lw=110, lh=logoImg.height?logoImg.width? lw*(logoImg.height/logoImg.width):lw:lw; x.drawImage(logoImg,(W-lw)/2,24,lw,lh); }catch(e){}
      // الفرع
      x.fillStyle='#E0C880'; x.font='bold 22px Arial'; x.textAlign='center';
      x.fillText(bn||'Le Coin', W/2, 178);
      // رقم وتاريخ
      x.fillStyle='#1A1A1A'; x.font='15px Arial';
      x.fillText(`${t('receiptNo')}: #${sale.receiptNo||''}`, W/2, 204);
      x.fillStyle='rgba(26,26,26,0.6)'; x.font='13px Arial';
      x.fillText(dt, W/2, 226);
      // خط فاصل
      let y=252; x.strokeStyle='#E0DCCD'; x.lineWidth=1.5; x.beginPath(); x.moveTo(pad,y); x.lineTo(W-pad,y); x.stroke();
      // العناصر
      y+=14;
      const startX = ar ? W-pad : pad;      // جهة الاسم
      const endX   = ar ? pad   : W-pad;     // جهة السعر
      items.forEach(it=>{
        y+=lineH;
        x.fillStyle='#1A1A1A'; x.font='600 16px Arial';
        x.textAlign = ar ? 'right' : 'left'; x.fillText(it.name, startX, y-12);
        x.fillStyle='rgba(26,26,26,0.55)'; x.font='13px Arial';
        x.fillText(`${it.qty} × ${fmt(it.price)}`, startX, y+8);
        x.fillStyle='#1A1A1A'; x.font='bold 16px Arial';
        x.textAlign = ar ? 'left' : 'right'; x.fillText(`${fmt(it.subtotal)} ${t('currency')}`, endX, y-12);
        x.strokeStyle='#EFE9DB'; x.beginPath(); x.moveTo(pad,y+18); x.lineTo(W-pad,y+18); x.stroke();
      });
      // الإجمالي
      y+=lineH+6;
      x.fillStyle='#1F3A2E'; x.font='bold 19px Arial';
      x.textAlign = ar ? 'right' : 'left'; x.fillText(t('total'), startX, y);
      x.textAlign = ar ? 'left' : 'right'; x.font='bold 26px Arial'; x.fillText(`${fmt(net)} ${t('currency')}`, endX, y);
      // مدفوع/باقي
      if(sale.paid!=null){
        y+=40; x.fillStyle='rgba(26,26,26,0.6)'; x.font='14px Arial';
        x.textAlign = ar ? 'right' : 'left'; x.fillText(`${t('received')}: ${fmt(sale.paid)} ${t('currency')}`, startX, y);
        x.textAlign = ar ? 'left' : 'right'; x.fillText(`${t('changeDue')}: ${fmt(sale.change||0)} ${t('currency')}`, endX, y);
      }
      // ملغاة/مرتجعة
      if(sale.refundTotal>0||sale.voided){
        y+=44; x.fillStyle='#C04848'; x.font='bold 15px Arial'; x.textAlign='center';
        x.fillText(`${sale.voided?t('voidedLbl'):t('refundedLbl')} − ${fmt(sale.refundTotal||0)} ${t('currency')}`, W/2, y);
      }
      // شكراً
      y+=54; x.fillStyle='#C9A84C'; x.font='italic 18px Georgia, serif'; x.textAlign='center';
      x.fillText(t('thankYou'), W/2, y);
      // إخراج: اعرض الصورة في نافذة فيها واتساب + تحميل
      const fname=`receipt_${sale.receiptNo||'lecoin'}.png`;
      const dataUrl=c.toDataURL('image/png');
      if(btn){ btn.disabled=false; btn.textContent=btnLabel; }
      // نحوّل الصورة لـ Blob فوراً (بدون انتظار) عشان التحميل/المشاركة مايتمنعوش من المتصفح
      const imgBlob=(()=>{ try{ const b64=dataUrl.split(',')[1]; const bin=atob(b64); const arr=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i); return new Blob([arr],{type:'image/png'}); }catch(e){ return null; } })();
      const blobUrl=imgBlob?URL.createObjectURL(imgBlob):dataUrl;
      const doDownload=()=>{ const a=document.createElement('a'); a.href=blobUrl; a.download=fname; document.body.appendChild(a); a.click(); setTimeout(()=>document.body.removeChild(a),100); };
      $('sheet-root').innerHTML=`<div class="overlay" id="ov2" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${t('imgReady')}</div><div class="sheet-title">🧾 ${t('receiptImage')}</div></div><button class="close-x" id="cx2">×</button></div>
        <div style="text-align:center;margin-bottom:14px;"><img src="${dataUrl}" alt="receipt" style="max-width:100%;border-radius:14px;box-shadow:0 6px 20px rgba(0,0,0,0.15);"></div>
        <button class="btn-wide" id="rci-wa" style="background:#25D366;color:#fff;border:none;border-radius:12px;font-weight:700;font-family:inherit;padding:13px;cursor:pointer;margin-bottom:8px;">📱 ${t('shareWa')}</button>
        <button class="btn-secondary btn-wide" id="rci-dl">⬇️ ${t('saveImg')}</button>
        <div style="font-size:11px;color:rgba(26,26,26,0.5);text-align:center;margin-top:8px;">${t('attachHint')}</div>
      </div></div>`;
      const back=()=>showReceipt(sale);
      $('ov2').onclick=back; $('cx2').onclick=back;
      // تحميل مباشر — يشتغل على كل الأجهزة (بدون انتظار = المتصفح مايمنعهوش)
      $('rci-dl').onclick=()=>{ doDownload(); toast(t('exportDone')); };
      // مشاركة: موبايل => مشاركة الصورة مباشرة؛ كمبيوتر => تنزيل + فتح واتساب ويب
      $('rci-wa').onclick=()=>{
        const file=imgBlob?new File([imgBlob],fname,{type:'image/png'}):null;
        if(file && navigator.canShare && navigator.canShare({files:[file]})){
          navigator.share({files:[file], title:'Le Coin', text:t('thankYou')}).catch(()=>{});
        } else {
          doDownload();                                   // نزّل الصورة فوراً
          setTimeout(()=>window.open('https://web.whatsapp.com/','_blank'),300);
          toast(t('attachHint'));
        }
      };
    }
